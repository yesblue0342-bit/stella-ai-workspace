<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Stella Cloud</title><style>*{box-sizing:border-box}body{margin:0;padding:18px;background:#fff;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}h1{font-size:34px}.top{display:flex;gap:8px;align-items:center}.top h1{flex:1}.card{border:1px solid #e5e7eb;border-radius:22px;padding:16px;margin:14px 0;box-shadow:0 8px 26px rgba(15,23,42,.05)}a,button{display:inline-flex;align-items:center;justify-content:center;border:1px solid #d1d5db;background:#fff;border-radius:15px;padding:12px 14px;font-weight:900;color:#111827;text-decoration:none;margin:4px}.primary{background:#0f172a;color:#fff}.muted{color:#6b7280}.file{border-top:1px solid #f1f5f9;padding:12px 0}.row{display:flex;gap:8px;flex-wrap:wrap}</style></head><body><div class="top"><h1>Stella Cloud</h1><a href="/">GPT</a><a href="/talk">Talk</a></div><div class="card"><b>Google Drive Cloud</b><p class="muted">기본은 StellaGPT, 필요 시 내 드라이브 전체 또는 #폴더명 검색으로 확장합니다.</p><div class="row"><button class="primary" onclick="load('/api/stella?action=db-directory&scope=root')">내 드라이브</button><button onclick="load('/api/stella?action=db-directory')">StellaGPT</button><button onclick="location.href='/db'">Stella DB</button><button onclick="location.href='/developer'">Developer</button></div></div><div class="card"><b>Cloud 결과</b><div id="out" class="muted">버튼을 누르면 표시됩니다.</div></div><script>async function load(url){out.textContent='불러오는 중...';try{const r=await fetch(url,{cache:'no-store'});const d=await r.json();if(!d.ok){out.textContent=d.message||d.error||'오류';return}const files=d.files||[];out.innerHTML=files.length?files.map(f=>'<div class="file"><b>'+esc(f.name)+'</b><br><span class="muted">'+(f.isFolder?'폴더':f.mimeType||'파일')+'</span></div>').join(''):'표시할 항목이 없습니다.'}catch(e){out.textContent=e.message}}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</script></body></html>
