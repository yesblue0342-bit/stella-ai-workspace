<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Stella Cloud</title><link rel="manifest" href="/manifest-cloud.json"><meta name="theme-color" content="#0ea5e9"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="/icons/cloud-192.png"><style>*{box-sizing:border-box}body{margin:0;padding:18px;background:#fff;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}h1{font-size:36px}.top{display:flex;gap:8px;align-items:center}.top h1{flex:1}.card{border:1px solid #e5e7eb;border-radius:22px;padding:16px;margin:14px 0;box-shadow:0 8px 26px rgba(15,23,42,.05)}a,button{display:inline-flex;align-items:center;justify-content:center;border:1px solid #d1d5db;background:#fff;border-radius:15px;padding:12px 14px;font-weight:900;color:#111827;text-decoration:none;margin:4px}.primary{background:#0f172a;color:#fff}.muted{color:#6b7280}.file{border-top:1px solid #f1f5f9;padding:12px 0}.row{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none!important}</style></head><body><div id="app"><div class="top"><h1>Stella Cloud</h1><a href="/gpt">GPT</a><a href="/talk">Talk</a><button onclick="logout()">로그아웃</button></div><div class="card"><b id="who">Google Drive Cloud</b><p class="muted">StellaGPT 또는 내 드라이브 전체를 조회합니다. Stella GPT에서 로그인한 계정을 사용합니다.</p><div class="row"><button class="primary" onclick="load('/api/drive-list?scope=root')">내 드라이브</button><button onclick="load('/api/drive-list?scope=StellaGPT')">StellaGPT</button><button onclick="location.href='/db'">Stella DB</button><button onclick="location.href='/developer'">Developer</button></div></div><div class="card"><b>Cloud 결과</b><div id="out" class="muted">불러오는 중...</div></div></div><script>const K={session:'stella_session_final_v82'};const $=id=>document.getElementById(id);const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}};function user(){return read(K.session,null)?.user||null}function validSession(){const s=read(K.session,null);if(!s||!s.user||!s.user.id)return null;if(s.savedAt!==-1&&typeof s.savedAt==='number'&&s.savedAt<Date.now()-30*24*60*60*1000)return null;return s.user}function show(){const u=validSession();if(!u){document.getElementById('app').innerHTML='<div class="card" style="max-width:420px;margin:40px auto"><h1 style="margin-top:0">Stella Cloud</h1><p class="muted">Stella GPT 계정으로 로그인하세요.</p><input id="cId" placeholder="아이디 또는 이메일" style="width:100%;border:1px solid #d1d5db;border-radius:14px;padding:13px;margin:6px 0;font-size:16px"><input id="cPw" type="password" placeholder="비밀번호" style="width:100%;border:1px solid #d1d5db;border-radius:14px;padding:13px;margin:6px 0;font-size:16px"><button class="primary" style="width:100%;margin-top:8px" onclick="cloudLogin()">로그인</button><button style="width:100%;margin-top:6px" onclick="location.href=\'/gpt\'">Stella GPT로 이동</button><div id="cMsg" class="muted" style="color:#b91c1c;margin-top:8px"></div></div>';return}who.textContent='Google Drive Cloud / '+(u.name||u.email||u.id);load('/api/drive-list?scope=StellaGPT')}
async function cloudLogin(){const id=document.getElementById('cId').value.trim();const pw=document.getElementById('cPw').value;const msg=document.getElementById('cMsg');if(!id||!pw){msg.textContent='아이디와 비밀번호를 입력하세요.';return}msg.textContent='로그인 중...';
 if(id==='admin'&&pw==='admin'){localStorage.setItem(K.session,JSON.stringify({id:'admin',user:{id:'admin',name:'관리자',email:'admin@stella.local'},savedAt:-1}));location.reload();return}
 try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,password:pw})});const d=await r.json();if(!r.ok||d.ok===false){msg.textContent=d.message||'로그인 실패';return}localStorage.setItem(K.session,JSON.stringify({id:d.user.id,user:d.user,savedAt:-1}));location.reload()}catch(e){msg.textContent=e.message}}function logout(){localStorage.removeItem(K.session);location.href='/gpt'}async function load(url){out.textContent='불러오는 중...';try{const r=await fetch(url,{cache:'no-store'});const d=await r.json();if(!d.ok){out.textContent=d.message||d.error||'오류';return}const files=Array.isArray(d.files)?d.files:[];out.innerHTML=files.length?files.map(f=>'<div class="file"><b>'+esc(f.name)+'</b><br><span class="muted">'+(f.isFolder?'폴더':f.mimeType||'파일')+'</span> '+(f.link?'<a target="_blank" href="'+f.link+'">열기</a>':'')+'</div>').join(''):'표시할 항목이 없습니다.'}catch(e){out.textContent=e.message}}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}show();</script><script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}var _dp=null;window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();_dp=e;showInstall();});function showInstall(){if(document.getElementById('pwaInstall'))return;var b=document.createElement('button');b.id='pwaInstall';b.textContent='⬇ 앱 설치';b.style.cssText='position:fixed;right:14px;bottom:80px;z-index:9998;background:#0ea5e9;color:#fff;border:0;border-radius:24px;padding:12px 18px;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.25);cursor:pointer';b.onclick=function(){if(!_dp)return;_dp.prompt();_dp.userChoice.then(function(){_dp=null;b.remove();});};document.body.appendChild(b);}window.addEventListener('appinstalled',function(){var b=document.getElementById('pwaInstall');if(b)b.remove();});</script></body></html>
