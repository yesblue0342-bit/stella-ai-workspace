<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Stella Cloud</title><style>*{box-sizing:border-box}body{margin:0;padding:18px;background:#fff;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}h1{font-size:34px}.top{display:flex;gap:8px;align-items:center}.top h1{flex:1}.card{border:1px solid #e5e7eb;border-radius:22px;padding:16px;margin:14px 0;box-shadow:0 8px 26px rgba(15,23,42,.05)}a,button{display:inline-flex;align-items:center;justify-content:center;border:1px solid #d1d5db;background:#fff;border-radius:15px;padding:12px 14px;font-weight:900;color:#111827;text-decoration:none;margin:4px}.primary{background:#0f172a;color:#fff}.muted{color:#6b7280}.file{border-top:1px solid #f1f5f9;padding:12px 0}input{width:100%;border:1px solid #d1d5db;border-radius:15px;padding:13px;margin:7px 0;font:inherit}.row{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none!important}.msg{color:#b91c1c;font-size:14px;margin-top:8px}</style></head><body><div id="loginBox" class="card"><h1>Stella Cloud</h1><b>로그인</b><p class="muted">Stella GPT와 동일한 아이디/비밀번호로 접속합니다.</p><input id="loginId" placeholder="아이디 또는 이메일"><input id="loginPw" type="password" placeholder="비밀번호"><button class="primary" onclick="login()">접속</button><button onclick="location.href='/gpt'">Stella GPT로 이동</button><div id="loginMsg" class="msg"></div></div><div id="app" class="hidden"><div class="top"><h1>Stella Cloud</h1><a href="/gpt">GPT</a><a href="/talk">Talk</a><button onclick="logout()">로그아웃</button></div><div class="card"><b id="who">Google Drive Cloud</b><p class="muted">기본은 StellaGPT, 필요 시 내 드라이브 전체 또는 #폴더명 검색으로 확장합니다.</p><div class="row"><button class="primary" onclick="load('/api/stella?action=db-directory&scope=root')">내 드라이브</button><button onclick="load('/api/stella?action=db-directory')">StellaGPT</button><button onclick="location.href='/db'">Stella DB</button><button onclick="location.href='/developer'">Developer</button></div></div><div class="card"><b>Cloud 결과</b><div id="out" class="muted">버튼을 누르면 표시됩니다.</div></div></div><script>const K={users:'stella_users_final_v82',session:'stella_session_final_v82'};const $=id=>document.getElementById(id);const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}};const write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));const hash=p=>btoa(unescape(encodeURIComponent(String(p))));function currentUser(){const s=read(K.session,null);if(!s||!s.id)return null;const users=read(K.users,[]);return users.find(u=>u.id===s.id)||s.user||null}function show(){const u=currentUser();if(u){$('loginBox').classList.add('hidden');$('app').classList.remove('hidden');$('who').textContent='Google Drive Cloud / '+(u.name||u.email||u.id)}else{$('loginBox').classList.remove('hidden');$('app').classList.add('hidden')}}async function login(){const id=$('loginId').value.trim();const pw=$('loginPw').value;if(!id||!pw){$('loginMsg').textContent='아이디와 비밀번호를 입력하세요.';return}try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-store'},body:JSON.stringify({id,email:id,password:pw})});const d=await r.json();if(r.ok&&d.ok!==false){const u=d.user||{id:id,email:id,name:id};write(K.session,{id:String(u.id||id),user:u,savedAt:Date.now()});show();return}}catch(e){}const users=read(K.users,[]);const u=users.find(x=>(x.id===id||String(x.email||'').toLowerCase()===id.toLowerCase())&&(x.passwordHash===hash(pw)||!x.passwordHash));if(!u){$('loginMsg').textContent='Stella GPT 가입 정보와 일치하지 않습니다.';return}write(K.session,{id:u.id,user:u,savedAt:Date.now()});show()}function logout(){localStorage.removeItem(K.session);show()}async function load(url){out.textContent='불러오는 중...';try{const r=await fetch(url,{cache:'no-store'});const d=await r.json();if(!d.ok){out.textContent=d.message||d.error||'오류';return}const files=d.files||[];out.innerHTML=files.length?files.map(f=>'<div class="file"><b>'+esc(f.name)+'</b><br><span class="muted">'+(f.isFolder?'폴더':f.mimeType||'파일')+'</span></div>').join(''):'표시할 항목이 없습니다.'}catch(e){out.textContent=e.message}}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}show();</script></body></html>
