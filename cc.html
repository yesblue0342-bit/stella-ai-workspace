<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella Agent Code</title>
<meta name="theme-color" content="#0d1117">
<!-- 이 페이지가 다크/라이트를 자체 처리함을 브라우저에 알려, 모바일 브라우저의 강제 다크모드
     재색칠(force-dark)이 .step/.status 등 요소별로 엉뚱한 색을 입히는 것을 방지 -->
<meta name="color-scheme" content="dark light">
<style>
/* ── 테마 토큰 (Stella GPT와 동일한 body.dark 방식 + stella_theme 키 공유) ── */
:root{
  --bg:#ffffff; --top-bg:#fbfbfc; --side-bg:#fbfbfc; --card:#f3f4f6; --step-bg:#f6f8fa;
  --ink:#111827; --muted:#6b7280; --line:#e5e7eb; --accent:#1f6feb;
  --input-bg:#ffffff; --send:#238636; --cancel:#da3633; --err:#b91c1c; --ok:#1a7f37; --on-accent:#ffffff;
}
body.dark{
  --bg:#0d1117; --top-bg:#161b22; --side-bg:#0d1117; --card:#161b22; --step-bg:#0f1620;
  --ink:#e6edf3; --muted:#8b949e; --line:#21262d; --accent:#1f6feb;
  --input-bg:#0d1117; --send:#238636; --cancel:#da3633; --err:#f85149; --ok:#3fb950; --on-accent:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column}
a{color:var(--accent)}
.top{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--top-bg);position:sticky;top:0;z-index:5}
.top h1{font-size:1.05rem;font-weight:normal;color:var(--muted)}
.hamb{font-size:1.05rem;line-height:1;border:1px solid var(--line);border-radius:8px;padding:5px 9px;background:var(--card);color:var(--ink);cursor:pointer;flex:0 0 auto}
.nav{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.nav a{font-size:.8rem;text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:5px 9px;color:var(--muted)}
/* 현재 앱 표시 흑백화(파란 배경 제거) — 앱 아이콘 컨벤션과 통일: 라이트=흰바탕+검정, 다크=검은바탕+흰색 */
.nav a.active{background:#fff;border-color:#111;color:#111;font-weight:700}
body.dark .nav a.active{background:#000;border-color:#fff;color:#fff}
.theme-toggle{font-size:.95rem;line-height:1;border:1px solid var(--line);border-radius:8px;padding:5px 8px;background:var(--card);color:var(--ink);cursor:pointer}
.wrap{flex:1;display:flex;min-height:0}
.side{width:230px;flex:0 0 auto;border-right:1px solid var(--line);background:var(--side-bg);overflow:auto;padding:10px}
.side h2{font-size:.72rem;text-transform:uppercase;color:var(--muted);margin:6px 4px 8px;letter-spacing:.5px}
.sitem{padding:8px 9px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:.82rem}
.sitem:hover{border-color:var(--accent);background:var(--card)}
.sitem .t{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sitem .m{color:var(--muted);font-size:.72rem;margin-top:2px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.msgs{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.bubble{max-width:860px;width:100%;margin:0 auto;line-height:1.7}
.bubble.user{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;white-space:pre-wrap}
.step{background:var(--step-bg);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:7px 10px;font-size:.83rem;font-family:ui-monospace,Consolas,monospace;color:var(--ink);overflow-x:auto}
/* 도구명(bash/edit 등)은 강조색 대신 본문과 같은 중립색(--ink) — 눈에 안 띄게 */
.step .nm{color:var(--ink);font-weight:700}
/* 도구 아이콘(🔧✏️📄 등) 이모지의 원색을 흑백으로 — 상단 앱 아이콘(.app-ico)과 동일한 방식 */
.step .nm .mi{display:inline-block;filter:grayscale(1) brightness(0)}
body.dark .step .nm .mi{filter:grayscale(1) brightness(0) invert(1)}
.step .rs{color:var(--muted);white-space:pre-wrap;display:block;margin-top:4px;max-height:200px;overflow:auto}
.answer{white-space:pre-wrap}
.barwrap{border-top:1px solid var(--line);background:var(--top-bg);padding:10px 14px}
.ctl{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:nowrap;overflow-x:auto}
.ctl #model{flex:1 1 120px;min-width:80px}
.ctl .ico{width:18px;height:18px;display:inline-block;vertical-align:middle;color:var(--ink);stroke:currentColor}
.ctl #omc{accent-color:var(--muted);width:auto}
#themeToggle{display:inline-flex;align-items:center;justify-content:center}
select,input,textarea,button{font:inherit;color:var(--ink);background:var(--input-bg);border:1px solid var(--line);border-radius:8px}
select,#budget{padding:6px 8px}
#budget{width:90px}
.lbl{font-size:.78rem;color:var(--muted);white-space:nowrap}
.iorow{display:flex;gap:8px;align-items:flex-end;border:1px solid var(--line);border-radius:22px;padding:6px 6px 6px 14px;background:var(--input-bg)}
#prompt{flex:1;resize:none;padding:8px 2px;min-height:40px;max-height:160px;line-height:1.5;border:none;background:transparent;outline:none}
button.act{cursor:pointer;font-weight:800;padding:0 16px;height:42px;border:none;border-radius:14px}
/* 전송/중단 버튼: 녹색/빨강 강조색 제거 → 주변 아이콘처럼 다크/라이트 테마 중립색(눈에 안 띄게) */
#sendBtn{background:var(--card);color:var(--ink);border:1px solid var(--line)}
#sendBtn:disabled{background:var(--line);color:var(--muted);cursor:not-allowed}
#cancelBtn{background:var(--card);color:var(--ink);border:1px solid var(--line);display:none}
#saveGhBtn{background:var(--card);color:var(--ink);border:1px solid var(--line);font-weight:700;font-size:.78rem;padding:5px 9px;border-radius:8px;cursor:pointer}
.status{font-size:.78rem;color:var(--muted)}
.status .err{color:var(--err)}
/* 완료(성공) 상태도 초록 강조 대신 중립색 — 다른 UI와 톤 통일(눈에 안 띄게) */
.status .ok{color:var(--ink)}
.empty{color:var(--muted);text-align:center;margin:auto;font-size:.9rem}
.side{transition:transform .25s ease}
.resizer{flex:0 0 auto;width:5px;cursor:col-resize;background:var(--line)}
.resizer:hover{background:var(--accent)}
.side-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9}
#fsExit{display:none}
body.side-collapsed .side,body.side-collapsed .resizer{display:none}
body.fullscreen-code .top,body.fullscreen-code .side,body.fullscreen-code .resizer{display:none}
body.fullscreen-code #fsExit{display:block;position:fixed;top:8px;right:10px;z-index:50}
@media(max-width:760px){
  .resizer{display:none}
  .side{position:fixed;top:0;left:0;bottom:0;width:min(280px,82vw);z-index:10;transform:translateX(-110%);box-shadow:2px 0 18px rgba(0,0,0,.35)}
  /* C1: 데스크톱 side-collapsed(기본 접힘)가 모바일 드로어를 막지 않게 무효화 */
  body.side-collapsed .side{display:block}
  body.side-open .side{transform:translateX(0)}
  body.side-open .side-backdrop{display:block}
  /* 햄버거 접힘(모바일): ☰ 단추만 남기고 — 제목·앱아이콘·nav·세션·풀스크린 + 하단 컨트롤(모델/테마/예산/OMC) 전부 숨김 → 개발 영역 최대화. 다시 누르면 복귀 */
  body.cc-navhidden .top h1{display:none}
  body.cc-navhidden .top .nav a{display:none}
  body.cc-navhidden .top #sessBtn,body.cc-navhidden .top #fsBtn{display:none}
  body.cc-navhidden .barwrap .ctl{display:none}
  body.cc-navhidden .top{padding-top:7px;padding-bottom:7px}
  /* 하단 컨트롤 1줄(모델/예산/테마/OMC) */
  .ctl{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  #model{min-width:0}
}
</style>
<script src="/js/source-guard.js"></script>
<script src="/js/attach-encode.js"></script>
<script src="/js/code-copy.js"></script>
</head>
<body>
<style id="appIcoStyle">
/* 앱 아이콘 흑백화: 라이트(기본)=흰바탕+검정테두리/검정아이콘, 다크(body.dark)=검은바탕+흰테두리/흰아이콘 */
.app-ico-wrap{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;border:1.5px solid #111;background:#fff;margin-right:6px;flex:0 0 auto}
.app-ico{display:inline-block;font-size:12px;line-height:1;filter:grayscale(1) brightness(0)}
body.dark .app-ico-wrap{border-color:#fff!important;background:#000!important}
body.dark .app-ico{filter:grayscale(1) brightness(0) invert(1)!important}
body:not(.dark) .app-ico-wrap{border-color:#111!important;background:#fff!important}
body:not(.dark) .app-ico{filter:grayscale(1) brightness(0)!important}
/* 체크박스(OMC/VFF) 흑백화 — 체크 시 파란 배경이 튀지 않게, 앱 아이콘과 동일 톤.
   라이트=흰바탕+검정체크, 다크(body.dark)=검은바탕+흰체크 */
#omc,#ccVffToggle{accent-color:#ffffff}
body.dark #omc,body.dark #ccVffToggle{accent-color:#000000}
</style>
<div class="top">
  <button type="button" class="hamb" id="hambBtn" title="상단 앱 전환 바 접기/펴기 (넓은 화면)">☰</button>
  <h1><span class="app-ico-wrap"><span class="app-ico">🛠️</span></span><span class="app-title-text">Stella Agent Code</span></h1>
  <nav class="nav">
    <a href="/"><span class="app-ico-wrap"><span class="app-ico">🤖</span></span>GPT</a><a href="/talk"><span class="app-ico-wrap"><span class="app-ico">💬</span></span>Talk</a><a href="/db"><span class="app-ico-wrap"><span class="app-ico">🗄</span></span>DB</a><a href="/hub"><span class="app-ico-wrap"><span class="app-ico">🌐</span></span>Hub</a><a href="/abap"><span class="app-ico-wrap"><span class="app-ico">🧑‍💻</span></span>ABAP</a><a href="/cc" class="active"><span class="app-ico-wrap"><span class="app-ico">🛠</span></span>Code</a>
    <button type="button" class="theme-toggle" id="sessBtn" title="세션 목록">🗂</button>
    <button type="button" class="theme-toggle" id="fsBtn" title="코드 풀스크린">⛶</button>
  </nav>
</div>
<div class="wrap">
  <aside class="side">
    <h2>세션 <button id="refreshBtn" style="float:right;font-size:.7rem;padding:2px 6px;cursor:pointer">↻</button></h2>
    <input type="search" id="sessSearch" placeholder="세션 검색…" style="width:100%;margin:0 0 8px;padding:6px 8px;font-size:.8rem">
    <div id="sessionList"><div class="lbl" style="padding:8px">불러오는 중…</div></div>
  </aside>
  <div class="resizer" id="resizer" title="사이드바 너비 조절"></div>
  <main class="main">
    <div class="msgs" id="msgs"><div class="empty" id="emptyHint"></div></div>
    <div class="barwrap">
      <div class="ctl">
        <select id="repoSel" title="에이전트가 작업할 GitHub 레포 (Hub와 동일 목록)"><option value="">레포: 불러오는 중…</option></select>
        <select id="model"></select>
        <span class="lbl">예산$</span>
        <input id="budget" type="number" min="0.5" max="50" step="0.5" value="20">
        <button type="button" class="theme-toggle" id="themeToggle" title="다크/라이트 모드"></button>
        <label class="lbl" style="display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap" title="OMC 멀티에이전트 + 무인 오토파일럿: 구현→테스트→오류 자동수정 루프(질문 없이 RALPH_DONE까지)"><input type="checkbox" id="omc" style="width:auto"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><rect x="4" y="9" width="16" height="11" rx="2"/><path d="M12 9V5"/><circle cx="12" cy="4" r="1"/><circle cx="9" cy="14" r="1"/><circle cx="15" cy="14" r="1"/><path d="M9 17.5h6"/></svg> OMC</label>
        <label class="lbl" style="display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap" title="VFF: Fable 5 수준 응답 품질"><input type="checkbox" id="ccVffToggle" style="width:auto"> VFF</label>
        <button type="button" id="saveGhBtn" title="이 세션 산출물을 Google Drive(StellaGPT/0Program)에 저장" style="display:none">💾 Drive에 저장</button>
        <span class="status" id="status"></span>
      </div>
      <div id="attachStrip" style="display:none;gap:8px;flex-wrap:wrap;padding:4px 6px"></div>
      <div class="iorow">
        <input type="file" id="attachInput" accept="image/*" multiple style="display:none">
        <button class="act" id="attachBtn" type="button" title="이미지 첨부" style="padding:0 12px">📎</button>
        <textarea id="prompt" placeholder="코딩 작업을 입력하세요"></textarea>
        <button class="act" id="sendBtn">전송</button>
        <button class="act" id="cancelBtn">중단</button>
      </div>
    </div>
  </main>
</div>
<div class="side-backdrop" id="sideBackdrop"></div>
<button type="button" class="theme-toggle" id="fsExit" title="풀스크린 종료">✕ 나가기</button>

<script type="module" src="/js/cc-app.js"></script>
</body>
</html>
