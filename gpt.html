<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Stella GPT</title><style>*{box-sizing:border-box}body{margin:0;background:#fff;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}.hidden{display:none!important}.app{height:100dvh;display:grid;grid-template-columns:330px 1fr}.side{border-right:1px solid #e5e7eb;background:#fbfbfc;overflow:auto;padding:14px}.brand{font-size:28px;font-weight:900;margin:8px 0 4px}.muted{color:#6b7280;font-size:13px}.btn,button{border:1px solid #d1d5db;background:#fff;border-radius:14px;padding:10px 12px;font-weight:900;color:#111827;text-decoration:none}.primary{background:#0f172a;color:#fff}.danger{color:#b91c1c}.search{display:flex;gap:8px;margin:14px 0}.search input{flex:1;border:1px solid #d1d5db;border-radius:14px;padding:12px}.section{margin:16px 0 8px;color:#6b7280;font-size:13px;font-weight:900}.tree-item{width:100%;display:block;text-align:left;border:0;background:transparent;border-radius:12px;padding:10px;margin:3px 0;font-weight:800}.tree-item.active,.tree-item:hover{background:#eef2ff}.main{height:100dvh;display:flex;flex-direction:column}.top{height:62px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;padding:10px 14px}.hamb{display:none}.title{font-weight:900;font-size:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.spacer{flex:1}.msgs{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:14px}.row{display:flex;gap:9px}.row.me{justify-content:flex-end}.bubble{max-width:820px;line-height:1.65;word-break:break-word}.row.me .bubble{border:1px solid #d1d5db;border-radius:18px 18px 4px 18px;padding:11px;background:#fff}.row.ai .bubble{padding:2px 4px}.bubble table{border-collapse:collapse;width:100%;margin:10px 0}.bubble th,.bubble td{border:1px solid #e5e7eb;padding:8px;vertical-align:top}.bubble a{color:#2563eb;text-decoration:underline}.compose{border-top:1px solid #e5e7eb;padding:10px 14px}.bar{display:flex;gap:8px;align-items:flex-end;border:1px solid #d1d5db;border-radius:22px;padding:8px}.bar textarea{flex:1;border:0;outline:0;resize:none;min-height:42px;max-height:130px;font:inherit}.modal{position:fixed;inset:0;z-index:20;background:rgba(15,23,42,.35);display:flex;align-items:center;justify-content:center;padding:20px}.card{width:min(520px,100%);background:#fff;border-radius:24px;padding:24px;box-shadow:0 24px 80px rgba(15,23,42,.20)}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#f3f4f6;border-radius:16px;padding:5px;margin:16px 0}.tab{border:0;background:transparent}.tab.active{background:#fff}.field{margin:10px 0}.field label{display:block;font-weight:900;margin-bottom:6px}.field input{width:100%;border:1px solid #d1d5db;border-radius:14px;padding:13px}.msg{color:#b91c1c;margin-top:10px;min-height:20px}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}.chip{border:1px solid #d1d5db;border-radius:999px;padding:6px 10px;background:#f8fafc}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:fixed;z-index:10;left:0;top:0;bottom:0;width:min(84vw,360px);transform:translateX(-105%);transition:.18s;box-shadow:20px 0 60px rgba(15,23,42,.18)}.side.open{transform:translateX(0)}.hamb{display:inline-flex}.bubble{max-width:82vw}}</style></head><body><div id="auth" class="modal"><div class="card"><h1>Stella</h1><p class="muted">회원 전용 AI 작업공간. 로그인은 로그아웃 전까지 유지됩니다.</p><div class="tabs"><button id="loginTab" class="tab active" onclick="setMode('login')">로그인</button><button id="signupTab" class="tab" onclick="setMode('signup')">회원가입</button></div><form id="authForm"><div class="field signupOnly hidden"><label>이름</label><input id="name" value="김경훈"></div><div class="field"><label>아이디 또는 이메일</label><input id="loginId" autocomplete="username" placeholder="yesblue0342"></div><div class="field signupOnly hidden"><label>이메일</label><input id="email" type="email" value="yesblue0342@naver.com"></div><div class="field signupOnly hidden"><label>생년월일</label><input id="birth" value="1982-04-30"></div><div class="field"><label>비밀번호</label><input id="password" type="password" autocomplete="current-password"></div><button id="submit" class="primary" type="submit">로그인</button><button type="button" class="btn" onclick="forgot()">비밀번호를 잊으셨나요?</button><div id="authMsg" class="msg"></div></form></div></div><div id="app" class="app hidden"><aside id="side" class="side"><div class="brand">Stella GPT</div><div id="who" class="muted"></div><div style="display:flex;gap:8px;margin:10px 0"><button onclick="newChat()">＋ 새 채팅</button><button onclick="logout()">로그아웃</button></div><div class="search"><input id="q" placeholder="게시글/회의록/채팅 검색" onfocus="keepSide()" oninput="renderSide()"><button onclick="renderSide()">⌕</button></div><div class="section">프로젝트 카테고리</div><div id="chatList"></div><div class="section">게시판 카테고리</div><button class="tree-item" onclick="openBoard()">▱ 기본 게시판</button><button class="tree-item" onclick="location.href='/cloud'">▱ DB / Stella Cloud</button><div class="section">바로가기</div><a class="tree-item" href="/cloud">Stella Cloud</a><a class="tree-item" href="/talk">Stella Talk</a><a class="tree-item" href="/developer">Developer</a></aside><main class="main"><div class="top"><button class="btn hamb" onclick="toggleSide()">☰</button><div id="title" class="title">새 채팅</div><div class="spacer"></div><select id="model"><option value="gpt-5.5">GPT-5.5 최신</option><option value="gpt-4o">GPT-4o</option><option value="gpt-4o-mini">GPT-4o Mini</option><option value="claude-3-5-sonnet-20241022">Claude</option></select></div><div id="msgs" class="msgs"></div><div class="compose"><div class="chips" id="chips"></div><div class="bar"><input id="file" type="file" multiple style="display:none" onchange="pickFiles(this.files)"><button onclick="file.click()">＋</button><textarea id="input" placeholder="무엇이든 물어보세요."></textarea><button class="primary" id="send" onclick="send()">↑</button></div></div></main></div><script>const K={session:'stella_session_final_v82',chats:'stella_chats_server_v1'};let mode='login',user=null,chats=[],active=null,files=[];const $=id=>document.getElementById(id);const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}};const write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);function setMode(m){mode=m;$('loginTab').classList.toggle('active',m==='login');$('signupTab').classList.toggle('active',m==='signup');document.querySelectorAll('.signupOnly').forEach(x=>x.classList.toggle('hidden',m!=='signup'));$('submit').textContent=m==='login'?'로그인':'회원가입';$('authMsg').textContent=''}function saveSession(u){write(K.session,{id:u.id,user:u,savedAt:Date.now()})}function boot(){const s=read(K.session,null);if(s&&s.user){user=s.user;openApp()}else $('auth').classList.remove('hidden')}async function api(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-store'},body:JSON.stringify(body)});const t=await r.text();let d;try{d=JSON.parse(t)}catch{d={message:t}};if(!r.ok||d.ok===false)throw new Error(d.message||d.error||t||'API 오류');return d}$('authForm').onsubmit=async e=>{e.preventDefault();$('authMsg').textContent='처리 중...';const id=$('loginId').value.trim();const password=$('password').value;if(!id||!password){$('authMsg').textContent='아이디와 비밀번호를 입력하세요.';return}try{let d;if(mode==='signup'){d=await api('/api/signup',{id,email:$('email').value.trim(),name:$('name').value.trim(),birth:$('birth').value.trim(),password})}else{d=await api('/api/login',{id,email:id,password})}user=d.user||{id,name:id,email:id};saveSession(user);$('authMsg').textContent='성공';openApp()}catch(err){$('authMsg').textContent=err.message||'실패'}};async function forgot(){const id=prompt('가입 이메일 또는 아이디');if(!id)return;try{const d=await api('/api/password-reset-request',{id,email:id});alert(d.message||'요청 완료')}catch(e){alert(e.message)}}function openApp(){$('auth').classList.add('hidden');$('app').classList.remove('hidden');$('who').textContent=(user.name||user.id)+' · '+(user.email||user.id);chats=read(K.chats,[]).filter(x=>x.userId===user.id);if(!chats.length)newChat(false);active=active||chats[0]?.id;render()}function logout(){localStorage.removeItem(K.session);location.reload()}function newChat(select=true){const c={id:'r_'+uid(),userId:user.id,title:'새 채팅',messages:[{role:'ai',text:'안녕하세요. Stella입니다. 무엇이든 물어보세요.'}],createdAt:new Date().toISOString()};chats.unshift(c);active=c.id;saveLocal();render()}function saveLocal(){write(K.chats,[...read(K.chats,[]).filter(x=>x.userId!==user.id),...chats])}function cur(){return chats.find(x=>x.id===active)}function render(){renderSide();const c=cur();$('title').textContent=c?.title||'새 채팅';$('msgs').innerHTML=(c?.messages||[]).map(m=>'<div class="row '+(m.role==='user'?'me':'ai')+'"><div class="bubble">'+md(m.text)+'</div></div>').join('');$('msgs').scrollTop=$('msgs').scrollHeight;$('chips').innerHTML=files.map(f=>'<span class="chip">'+esc(f.name)+'</span>').join('')}function renderSide(){const q=$('q')?.value?.toLowerCase()||'';$('chatList').innerHTML=chats.filter(c=>(c.title+' '+c.messages.map(m=>m.text).join(' ')).toLowerCase().includes(q)).map(c=>'<button class="tree-item '+(c.id===active?'active':'')+'" onclick="active=\''+c.id+'\';render();closeSideMobile()">▱ '+esc(c.title)+'<br><span class="muted">'+c.messages.length+'개 메시지</span></button>').join('')||'<div class="muted">결과 없음</div>'}function keepSide(){}function toggleSide(){$('side').classList.toggle('open')}function closeSideMobile(){if(innerWidth<=900)$('side').classList.remove('open')}function openBoard(){alert('게시판은 Stella Cloud/DB 저장 구조와 연결됩니다. DB / Stella Cloud 메뉴를 사용하세요.')}function pickFiles(list){files=[...list];render()}async function send(){const text=$('input').value.trim();if(!text&&!files.length)return;const c=cur();c.messages.push({role:'user',text:text||'[첨부 파일]',at:new Date().toISOString()});if(c.title==='새 채팅')c.title=(text||'첨부 파일').slice(0,30);$('input').value='';render();$('send').disabled=true;try{const d=await api('/api/chat',{model:$('model').value,message:text,history:c.messages.slice(-10).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}))});c.messages.push({role:'ai',text:d.text||d.answer||d.message||'응답 없음',at:new Date().toISOString()});await saveHybrid(c);files=[];saveLocal();render()}catch(e){c.messages.push({role:'ai',text:'API 연결 오류: '+e.message});saveLocal();render()}finally{$('send').disabled=false}}async function saveHybrid(c){try{await api('/api/hybrid-chat-save',{userId:user.id,roomId:c.id,title:c.title,messages:c.messages})}catch(e){console.warn(e)}}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function md(s){let h=esc(s);h=h.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a target="_blank" rel="noopener" href="$2">$1</a>');h=h.replace(/(https?:\/\/[^\s<]+)/g,'<a target="_blank" rel="noopener" href="$1">$1</a>');h=h.replace(/\n/g,'<br>');return h}boot();</script></body></html>
