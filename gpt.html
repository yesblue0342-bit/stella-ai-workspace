<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Stella GPT</title><link rel="manifest" href="/manifest-gpt.json"><meta name="theme-color" content="#0f172a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="/icons/gpt-192.png"><style>*{box-sizing:border-box}body{margin:0;background:#fff;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}.hidden{display:none!important}.auth{min-height:100dvh;background:linear-gradient(135deg,#f8fafc,#9ca3af);display:flex;align-items:center;justify-content:center;padding:24px}.card{width:min(560px,100%);background:#fff;border-radius:28px;padding:28px;box-shadow:0 28px 90px rgba(15,23,42,.22)}h1{font-size:44px;margin:0 0 14px}.muted{color:#6b7280}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#f3f4f6;border-radius:18px;padding:6px;margin:20px 0}.tabs button{border:0;background:transparent;border-radius:14px;padding:14px;font-weight:900}.tabs button.active{background:#fff}.field{margin:12px 0}.field label{display:block;font-weight:900;margin-bottom:7px}.field input{width:100%;border:1px solid #d1d5db;border-radius:16px;padding:14px;font:inherit}.btn,button{border:1px solid #d1d5db;border-radius:16px;background:#fff;padding:12px 14px;font-weight:900;color:#111827;touch-action:manipulation}.primary{background:#0f172a;color:#fff}.check{display:flex;align-items:center;gap:8px;margin:10px 0}.msg{min-height:22px;color:#b91c1c;margin-top:10px}.app{height:100dvh;display:grid;grid-template-columns:330px 1fr}.side{border-right:1px solid #e5e7eb;background:#fbfbfc;overflow:auto;padding:14px}.brand{font-size:30px;font-weight:900}.search{display:flex;gap:8px;margin:14px 0}.search input{flex:1;border:1px solid #d1d5db;border-radius:14px;padding:12px}.section{margin:18px 0 8px;color:#6b7280;font-size:13px;font-weight:900}.tree{display:block;width:100%;text-align:left;border:0;background:transparent;border-radius:12px;padding:10px;margin:3px 0}.tree.active,.tree:hover{background:#eef2ff}.main{height:100dvh;display:flex;flex-direction:column}.top{height:62px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;padding:10px 14px}.hamb{display:none}.title{font-size:20px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.spacer{flex:1}.msgs{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:14px}.row{display:flex}.row.me{justify-content:flex-end}.bubble{max-width:820px;line-height:1.65;word-break:break-word}.row.me .bubble{border:1px solid #d1d5db;border-radius:18px 18px 4px 18px;padding:11px}.bubble a{color:#2563eb;text-decoration:underline}.compose{border-top:1px solid #e5e7eb;padding:10px 14px}.bar{display:flex;gap:8px;align-items:flex-end;border:1px solid #d1d5db;border-radius:22px;padding:8px}.bar textarea{flex:1;border:0;outline:0;resize:none;min-height:42px;max-height:130px;font:inherit}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:fixed;z-index:10;left:0;top:0;bottom:0;width:min(84vw,360px);transform:translateX(-105%);transition:.18s;box-shadow:20px 0 60px rgba(15,23,42,.18)}.side.open{transform:translateX(0)}.hamb{display:inline-flex}.bubble{max-width:82vw}}

</style></head><body><div id="auth" class="auth"><div class="card"><h1>Stella</h1><p class="muted">회원 전용 AI 작업공간. 로그인은 로그아웃 전까지 유지됩니다.</p><div class="tabs"><button id="loginTab" class="active" type="button">로그인</button><button id="signupTab" type="button">회원가입</button></div><form id="authForm"><div class="field signupOnly hidden"><label>이름</label><input id="name" placeholder="이름" autocomplete="name"></div><div class="field"><label>아이디 또는 이메일</label><input id="loginId" placeholder="아이디 또는 이메일" autocomplete="username"></div><div class="field signupOnly hidden"><label>이메일</label><input id="email" placeholder="이메일" autocomplete="email"></div><div class="field signupOnly hidden"><label>생년월일</label><input id="birth" placeholder="YYYY-MM-DD"></div><div class="field"><label>비밀번호</label><input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password"></div><label class="check loginOnly"><input id="rememberId" type="checkbox"> 아이디 기억하기</label><button id="submitBtn" class="primary" type="button" onclick="auth(event)">로그인</button><button type="button" id="forgotBtn">비밀번호를 잊으셨나요?</button><div id="authMsg" class="msg"></div></form></div></div><div id="app" class="app hidden"><aside id="side" class="side"><div class="brand">Stella GPT</div><div id="who" class="muted"></div><div style="display:flex;gap:8px;margin:10px 0"><button type="button" onclick="newChat()">＋ 새 채팅</button><button type="button" onclick="logout()">로그아웃</button></div><div class="search"><input id="q" placeholder="게시글/회의록/채팅 검색" onfocus="keepSide()" oninput="renderSide()"><button type="button" onclick="renderSide()">⌕</button></div><div class="section">프로젝트 카테고리</div><div id="chatList"></div><div class="section">게시판 카테고리</div><button class="tree" type="button" onclick="location.href='/cloud'">▱ 기본 게시판</button><button class="tree" type="button" onclick="location.href='/cloud'">▱ DB / Stella Cloud</button><div class="section">바로가기</div><a class="tree" href="/cloud">Stella Cloud</a><a class="tree" href="/talk">Stella Talk</a><a class="tree" href="/developer">Developer</a></aside><main class="main"><div class="top"><button class="btn hamb" type="button" onclick="toggleSide()">☰</button><div id="title" class="title">새 채팅</div><div class="spacer"></div><button class="btn themeBtn" type="button" onclick="toggleTheme()" id="themeBtn">🌙</button></div><div id="msgs" class="msgs"></div><div class="compose"><div class="composeModel"><div class="modelWrap"><button class="modelBtn" type="button" onclick="toggleModelMenu()" id="modelBtn">Opus 4.8</button></div><select id="model" style="display:none"><optgroup label="── GPT ──"><option value="chatgpt-5.5-latest">GPT-5.5 최신</option><option value="gpt-5">GPT-5</option><option value="gpt-4o">GPT-4o</option><option value="gpt-4.1">GPT-4.1</option><option value="gpt-4.1-mini">GPT-4.1 Mini</option><option value="gpt-4o-mini">GPT-4o Mini</option></optgroup><optgroup label="── Claude ──"><option value="claude-fable-5">Claude Fable 5 (최신)</option><option value="claude-opus-4-8">Claude Opus 4.8</option><option value="claude-opus-4-7">Claude Opus 4.7</option><option value="claude-opus-4-6">Claude Opus 4.6</option><option value="claude-sonnet-4-6">Claude Sonnet 4.6</option><option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option></optgroup></select></div><div class="bar"><textarea id="input" placeholder="메시지를 입력하세요. (Enter 줄바꿈)" rows="1"></textarea><button class="primary" type="button" onclick="send()">↑</button></div></div></main></div><script>const K={session:'stella_session_final_v82',remember:'stella_remember_id_v1',chats:'stella_chats_server_v2'};let mode='login',user=null,chats=[],active=null;const $=id=>document.getElementById(id);const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}};const write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));function setMode(m){mode=m;$('loginTab').classList.toggle('active',m==='login');$('signupTab').classList.toggle('active',m==='signup');document.querySelectorAll('.signupOnly').forEach(x=>x.classList.toggle('hidden',m!=='signup'));document.querySelectorAll('.loginOnly').forEach(x=>x.classList.toggle('hidden',m!=='login'));$('submitBtn').textContent=m==='login'?'로그인':'회원가입';$('authMsg').style.color='#b91c1c';$('authMsg').textContent='';$('pw').value='';if(m==='signup'){$('loginId').value='';$('email').value='';$('name').value='';$('birth').value='';}else loadRemember()}function loadRemember(){const v=localStorage.getItem(K.remember)||'';$('loginId').value=v;$('rememberId').checked=!!v}async function api(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-store'},body:JSON.stringify(body)});const t=await r.text();let d;try{d=JSON.parse(t)}catch{d={message:t}};if(!r.ok||d.ok===false){const m=(d.message||'API 오류')+(d.error?(' ('+d.error+')'):'');throw new Error(m)}return d}async function auth(e){if(e&&e.preventDefault)e.preventDefault();const id=$('loginId').value.trim(),code=$('pw').value;if(!id||!code){$('authMsg').textContent='아이디와 비밀번호를 입력하세요.';return}$('authMsg').textContent='처리 중...';try{let d;if(mode==='signup'){d=await api('/api/signup',{id,email:$('email').value.trim()||id,name:$('name').value.trim(),birth:$('birth').value.trim(),password:code})}else{d=await api('/api/auth/login',{id,password:code})}user=d.user;if(mode==='login'&&$('rememberId').checked)localStorage.setItem(K.remember,id);else if(mode==='login')localStorage.removeItem(K.remember);write(K.session,{id:user.id,user,savedAt:-1});if(mode==='signup'){$('authMsg').style.color='#16a34a';$('authMsg').textContent='회원가입 성공! 로그인합니다...';setTimeout(openApp,800);}else{openApp();}}catch(err){$('authMsg').style.color='#b91c1c';$('authMsg').textContent=err.message||'처리 실패'}}function boot(){$('loginTab').onclick=()=>setMode('login');$('signupTab').onclick=()=>setMode('signup');$('authForm').onsubmit=auth;applyTheme();syncModelBtn();const ip=$('input');if(ip){ip.addEventListener('input',()=>{ip.style.height='auto';ip.style.height=Math.min(ip.scrollHeight,160)+'px'});}if($('model'))$('model').addEventListener('change',()=>{syncModelBtn();});$('forgotBtn').onclick=()=>{const id=$('loginId').value.trim();if(!id){alert('아이디 또는 이메일을 먼저 입력하세요.');return;}$('authMsg').textContent='비밀번호 초기화 이메일을 발송했습니다.(준비중)';};loadRemember();const s=read(K.session,null);if(s&&s.user&&(s.savedAt===-1||s.savedAt>Date.now()-30*24*60*60*1000)){user=s.user;openApp()}else $('auth').classList.remove('hidden')}function openApp(){$('auth').classList.add('hidden');$('app').classList.remove('hidden');$('who').textContent=(user.name||user.id)+' · '+(user.email||user.id);chats=read(K.chats,[]).filter(x=>x.userId===user.id);if(!chats.length)newChat();else{active=chats[0].id;render()}}function logout(){localStorage.removeItem(K.session);location.reload()}function newChat(){const c={id:'r_'+Date.now(),userId:user.id,title:'새 채팅',messages:[{role:'ai',text:'안녕하세요. Stella입니다. 무엇이든 물어보세요.'}]};chats.unshift(c);active=c.id;saveLocal();render()}function saveLocal(){write(K.chats,[...read(K.chats,[]).filter(x=>x.userId!==user.id),...chats])}function cur(){return chats.find(x=>x.id===active)}function render(){renderSide();const c=cur();$('title').textContent=c?.title||'새 채팅';$('msgs').innerHTML=(c?.messages||[]).map(m=>'<div class="row '+(m.role==='user'?'me':'ai')+'"><div class="bubble">'+md(m.text)+'</div></div>').join('');$('msgs').scrollTop=$('msgs').scrollHeight}function renderSide(){const q=($('q')?.value||'').toLowerCase();$('chatList').innerHTML=chats.filter(c=>(c.title+' '+c.messages.map(m=>m.text).join(' ')).toLowerCase().includes(q)).map(c=>'<button class="tree '+(c.id===active?'active':'')+'" onclick="active=\''+c.id+'\';render();closeSideMobile()">▱ '+esc(c.title)+'<br><span class="muted">'+c.messages.length+'개 메시지</span></button>').join('')||'<div class="muted">결과 없음</div>'}function keepSide(){/* 검색창 포커스 시 사이드바 유지 - 닫지 않음 */}function toggleSide(){$('side').classList.toggle('open')}function closeSideMobile(){if(innerWidth<=900)$('side').classList.remove('open')}async function send(){const text=$('input').value.trim();if(!text)return;const c=cur();c.messages.push({role:'user',text});if(c.title==='새 채팅')c.title=text.slice(0,30);$('input').value='';render();try{const d=await api('/api/chat',{model:$('model').value,message:text,history:c.messages.slice(-10).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}))});c.messages.push({role:'ai',text:d.text||d.answer||d.message||'응답 없음'});try{await api('/api/hybrid-chat-save',{userId:user.id,roomId:c.id,title:c.title,messages:c.messages})}catch{}saveLocal();render()}catch(e){c.messages.push({role:'ai',text:'API 연결 오류: '+e.message});saveLocal();render()}}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function md(s){const blocks=[];let raw=String(s||'');raw=raw.replace(/```(\w*)\n?([\s\S]*?)```/g,(m,lang,code)=>{const idx=blocks.length;blocks.push('<pre class="code"><button class="copyBtn" onclick="copyCode(this)">복사</button><code>'+esc(code.replace(/\n$/,''))+'</code></pre>');return '\u0000BLOCK'+idx+'\u0000'});let h=esc(raw);h=h.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a target="_blank" rel="noopener" href="$2">$1</a>');h=h.replace(/(https?:\/\/[^\s<]+)/g,'<a target="_blank" rel="noopener" href="$1">$1</a>');h=h.replace(/`([^`]+)`/g,'<code style="background:rgba(127,127,127,.2);padding:2px 5px;border-radius:5px">$1</code>');h=h.replace(/\n/g,'<br>');h=h.replace(/\u0000BLOCK(\d+)\u0000/g,(m,i)=>blocks[Number(i)]);return h}
function toggleTheme(){const d=document.body.classList.toggle('dark');localStorage.setItem('stella_theme',d?'dark':'light');$('themeBtn').textContent=d?'☀️':'🌙'}
function applyTheme(){const t=localStorage.getItem('stella_theme')||'light';if(t==='dark'){document.body.classList.add('dark');if($('themeBtn'))$('themeBtn').textContent='☀️'}}
function toggleModelMenu(){const s=$('model');s.style.display=s.style.display==='none'?'inline-block':'none'}
function syncModelBtn(){const s=$('model');if(!s||!$('modelBtn'))return;const o=s.options[s.selectedIndex];$('modelBtn').textContent=o?o.textContent:'모델';s.style.display='none'}
function copyCode(btn){const pre=btn.parentElement;const code=pre.querySelector('code')||pre;const t=code.innerText.replace(/복사$|복사됨$/,'');navigator.clipboard.writeText(t).then(()=>{btn.textContent='복사됨';setTimeout(()=>btn.textContent='복사',1200)})}
boot();</script><script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}var _dp=null;window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();_dp=e;showInstall();});function showInstall(){if(document.getElementById('pwaInstall'))return;var b=document.createElement('button');b.id='pwaInstall';b.textContent='⬇ 앱 설치';b.style.cssText='position:fixed;right:14px;bottom:80px;z-index:9998;background:#0f172a;color:#fff;border:0;border-radius:24px;padding:12px 18px;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.25);cursor:pointer';b.onclick=function(){if(!_dp)return;_dp.prompt();_dp.userChoice.then(function(){_dp=null;b.remove();});};document.body.appendChild(b);}window.addEventListener('appinstalled',function(){var b=document.getElementById('pwaInstall');if(b)b.remove();});</script></body></html>
