<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stella 데이터 복원</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#f1f5f9;padding:20px;max-width:500px;margin:0 auto}
h1{color:#a78bfa;font-size:1.3rem;margin-bottom:4px}
.sub{color:#64748b;font-size:.85rem;margin-bottom:20px}
.card{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:12px}
.card h3{font-size:.9rem;color:#94a3b8;margin-bottom:10px}
input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:11px 14px;font-size:.95rem;color:#f1f5f9;margin-bottom:10px}
button{width:100%;border:none;border-radius:10px;padding:12px;font-size:.95rem;cursor:pointer;font-weight:700;margin-bottom:8px}
.btn-main{background:#7c3aed;color:#fff}
.btn-sec{background:#1e3a5f;color:#93c5fd}
.btn-go{background:#065f46;color:#6ee7b7}
.log{background:#0f172a;border-radius:10px;padding:12px;margin-top:10px;font-size:.82rem;max-height:300px;overflow-y:auto;display:none}
.ok{color:#34d399}.err{color:#f87171}.warn{color:#fbbf24}.info{color:#94a3b8}
.badge{display:inline-block;background:#7c3aed;color:#fff;border-radius:20px;padding:2px 10px;font-size:.78rem;margin-left:6px}
.step{color:#a78bfa;font-weight:700}
</style>
</head>
<body>
<h1>🔄 Stella 데이터 복원</h1>
<p class="sub">Drive·서버에서 채팅·노트·프로젝트를 복원합니다</p>

<div class="card">
  <h3>로그인 아이디</h3>
  <input id="userId" placeholder="yesblue0342" value="yesblue0342">
</div>

<div class="card">
  <h3><span class="step">1단계</span> 서버 데이터 확인</h3>
  <button class="btn-main" onclick="scanAll()">🔍 서버·Drive 전체 스캔</button>
  <div class="log" id="scanLog"></div>
</div>

<div class="card">
  <h3><span class="step">2단계</span> 데이터 복원</h3>
  <button class="btn-sec" onclick="restoreAll()">✅ 전체 복원 (채팅+노트+프로젝트)</button>
  <div class="log" id="restoreLog"></div>
</div>

<div class="card">
  <h3><span class="step">3단계</span> 메인으로 이동</h3>
  <button class="btn-go" onclick="location.href='/'">🏠 메인 페이지로 이동</button>
</div>

<script>
const K = {
  rooms: 'stella_rooms_final_v82',
  projects: 'stella_projects_final_v82',
  posts: 'stella_posts_final_v82',
  session: 'stella_session_final_v82'
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function getId(){ return document.getElementById('userId').value.trim(); }
function getSessionUserId(){
  // localStorage 세션에서 실제 로그인된 user.id 확인
  try{
    const s = JSON.parse(localStorage.getItem('stella_session_final_v82')||'{}');
    return s.id || (s.user && s.user.id) || null;
  }catch(e){ return null; }
}
function getOwner(){
  // 세션의 user.id가 있으면 그걸 owner로 사용 (loadData 필터와 일치시키기)
  return getSessionUserId() || getId();
}

function log(logId, msg, cls='info'){
  const el = document.getElementById(logId);
  el.style.display = 'block';
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

async function scanAll(){
  const userId = getId(); if(!userId) return;
  const el = document.getElementById('scanLog');
  el.innerHTML = ''; el.style.display = 'block';
  const sessionUid = getSessionUserId();
  log('scanLog', '👤 세션 user.id: ' + (sessionUid||'없음(미로그인)') + ' | 입력 userId: ' + userId, 'info');
  log('scanLog', '🔍 Azure SQL 확인 중...', 'warn');

  // 1. workspace_state
  try{
    const r = await fetch(`/api/workspace?owner=${encodeURIComponent(userId)}`);
    const d = await r.json();
    if(d.ok){
      log('scanLog', `✅ workspace_state: 채팅 ${(d.rooms||[]).length}개 / 노트 ${(d.posts||[]).length}개 / 프로젝트 ${(d.projects||[]).length}개`, 'ok');
      if(d.updated_at) log('scanLog', `   마지막 저장: ${new Date(d.updated_at).toLocaleString('ko-KR')}`, 'info');
    } else {
      log('scanLog', '⚠️ workspace_state 없음 - 저장된 적 없거나 빈 상태', 'warn');
    }
  }catch(e){ log('scanLog', '❌ workspace 조회 실패: '+e.message, 'err'); }

  // 2. chat_index
  try{
    const r = await fetch(`/api/hybrid-chat-list?userId=${encodeURIComponent(userId)}`);
    const d = await r.json();
    const items = d.rooms || d.items || [];
    log('scanLog', `✅ chat_index: ${items.length}개 채팅방`, 'ok');
    items.slice(0,5).forEach(i => log('scanLog', `   💬 ${i.title||i.room_id} (${i.message_count||0}개 메시지)`, 'info'));
    if(items.length > 5) log('scanLog', `   ... 외 ${items.length-5}개`, 'info');
  }catch(e){ log('scanLog', '❌ chat_index 조회 실패: '+e.message, 'err'); }

  // 3. Drive 노트
  try{
    const r = await fetch(`/api/note?action=list&userId=${encodeURIComponent(userId)}`);
    const d = await r.json();
    const notes = d.notes || [];
    log('scanLog', `✅ Drive 노트: ${notes.length}개`, notes.length > 0 ? 'ok' : 'warn');
    notes.slice(0,5).forEach(n => log('scanLog', `   📝 ${n.title||'(제목없음)'}`, 'info'));
    if(notes.length > 5) log('scanLog', `   ... 외 ${notes.length-5}개`, 'info');
  }catch(e){ log('scanLog', '❌ Drive 노트 조회 실패: '+e.message, 'err'); }

  log('scanLog', '─────────────────', 'info');
  log('scanLog', '▶ 2단계 [전체 복원] 버튼을 눌러 복원하세요', 'warn');
}

async function restoreAll(){
  const userId = getId(); if(!userId) return;
  const el = document.getElementById('restoreLog');
  el.innerHTML = ''; el.style.display = 'block';

  let totalRestored = 0;

  // ── 채팅 복원 ──
  log('restoreLog', '💬 채팅 복원 중...', 'warn');
  try{
    // workspace_state에서 rooms
    const ws = await fetch(`/api/workspace?owner=${encodeURIComponent(userId)}`);
    const wd = await ws.json();
    const wsRooms = (wd.ok && Array.isArray(wd.rooms)) ? wd.rooms : [];

    // chat_index에서 목록
    const ci = await fetch(`/api/hybrid-chat-list?userId=${encodeURIComponent(userId)}`);
    const cd = await ci.json();
    const ciItems = cd.rooms || cd.items || [];

    // 현재 localStorage
    let rooms = [];
    try{ rooms = JSON.parse(localStorage.getItem(K.rooms)||'[]'); }catch(e){}
    const existIds = new Set(rooms.map(r=>r.id));

    // workspace_state의 rooms 복원
    wsRooms.forEach(sr => {
      if(!sr.id || existIds.has(sr.id)) return;
      rooms.push({
        id: sr.id, owner: getOwner(),
        name: sr.name||'복원된 채팅',
        messages: Array.isArray(sr.messages) ? sr.messages : [],
        projectId: sr.projectId||'',
        createdAt: sr.createdAt||new Date().toISOString()
      });
      existIds.add(sr.id);
      totalRestored++;
    });

    // chat_index에서 추가 (workspace에 없는 것)
    ciItems.forEach(item => {
      const id = item.room_id || item.id;
      if(!id || existIds.has(id)) return;
      rooms.push({
        id, owner: getOwner(),
        name: item.title||'복원된 채팅',
        messages: [],
        driveFileId: item.drive_file_id||'',
        projectId: item.project_id||'',
        createdAt: item.created_at||new Date().toISOString()
      });
      existIds.add(id);
      totalRestored++;
    });

    localStorage.setItem(K.rooms, JSON.stringify(rooms));
    log('restoreLog', `✅ 채팅 ${rooms.length}개 복원 완료`, 'ok');
  }catch(e){ log('restoreLog', '❌ 채팅 복원 실패: '+e.message, 'err'); }

  // ── 노트 복원 ──
  log('restoreLog', '📝 노트 복원 중...', 'warn');
  try{
    let posts = [];
    try{ posts = JSON.parse(localStorage.getItem(K.posts)||'[]'); }catch(e){}
    const existIds = new Set(posts.map(p=>p.id||p.postId));

    // workspace_state의 posts
    const ws2 = await fetch(`/api/workspace?owner=${encodeURIComponent(userId)}`);
    const wd2 = await ws2.json();
    const wsPosts = (wd2.ok && Array.isArray(wd2.posts)) ? wd2.posts : [];
    wsPosts.forEach(p => {
      const id = p.id||p.postId;
      if(!id || existIds.has(id) || p.deleted) return;
      posts.unshift({ id, owner: getOwner(), title: p.title||'(제목없음)', body: p.body||p.content||'', category: p.category||'노트', createdAt: p.createdAt, updatedAt: p.updatedAt });
      existIds.add(id); totalRestored++;
    });

    // Drive 노트 (note.js - Board/boards/users 모두 탐색)
    const nr = await fetch(`/api/note?action=list&userId=${encodeURIComponent(userId)}`);
    const nd = await nr.json();
    (nd.notes||[]).forEach(n => {
      const id = n.id||n.postId;
      if(!id || existIds.has(id) || n.deleted) return;
      posts.unshift({ id, owner: getOwner(), title: n.title||'(제목없음)', body: n.body||n.content||'', category: n.category||'노트', createdAt: n.createdAt, updatedAt: n.updatedAt });
      existIds.add(id); totalRestored++;
    });

    localStorage.setItem(K.posts, JSON.stringify(posts));
    log('restoreLog', `✅ 노트 ${posts.length}개 복원 완료`, 'ok');
    posts.slice(0,5).forEach(p => log('restoreLog', `   📝 ${p.title}`, 'info'));
  }catch(e){ log('restoreLog', '❌ 노트 복원 실패: '+e.message, 'err'); }

  // ── 프로젝트 복원 ──
  log('restoreLog', '📁 프로젝트 복원 중...', 'warn');
  try{
    const ws3 = await fetch(`/api/workspace?owner=${encodeURIComponent(userId)}`);
    const wd3 = await ws3.json();
    const wsProj = (wd3.ok && Array.isArray(wd3.projects)) ? wd3.projects : [];

    let projects = [];
    try{ projects = JSON.parse(localStorage.getItem(K.projects)||'[]'); }catch(e){}
    const existIds = new Set(projects.map(p=>p.id));
    wsProj.forEach(p => {
      if(!p.id || existIds.has(p.id)) return;
      projects.push({ id: p.id, owner: getOwner(), name: p.name||p.id, createdAt: p.createdAt||new Date().toISOString() });
      existIds.add(p.id); totalRestored++;
    });
    localStorage.setItem(K.projects, JSON.stringify(projects));
    log('restoreLog', `✅ 프로젝트 ${projects.length}개 복원 완료`, 'ok');
  }catch(e){ log('restoreLog', '❌ 프로젝트 복원 실패: '+e.message, 'err'); }

  log('restoreLog', '─────────────────', 'info');
  if(totalRestored > 0){
    log('restoreLog', `🎉 총 ${totalRestored}개 항목 복원 완료!`, 'ok');
    log('restoreLog', '▶ 3단계: 메인 페이지로 이동하세요', 'warn');
  } else {
    log('restoreLog', '⚠️ 복원할 데이터가 없습니다', 'warn');
    log('restoreLog', '→ 서버에 저장이 안 됐을 수 있습니다', 'info');
    log('restoreLog', '→ 모바일에서 채팅/노트 저장을 먼저 해주세요', 'info');
  }
}
</script>
</body>
</html>
