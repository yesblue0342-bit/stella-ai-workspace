<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Stella Talk</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#b7c9d8;color:#111827}body.light{background:#fff}.top{position:sticky;top:0;padding:14px;background:rgba(183,201,216,.92);backdrop-filter:blur(var(--blur,0px));display:flex;gap:8px;z-index:3}.top b{font-size:20px;margin-right:auto}.wrap{padding:12px 12px 120px}.msg{display:flex;margin:10px 0}.msg.me{justify-content:flex-end}.bubble{max-width:76%;background:#fff;border-radius:18px;padding:10px 12px}.msg.me .bubble{background:#fee500}.composer{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:10px;display:flex;gap:8px;z-index:3}textarea{flex:1;border:1px solid #d1d5db;border-radius:18px;padding:10px;font:inherit}button,select,input{font:inherit}button{border:1px solid #d1d5db;background:#fff;border-radius:13px;padding:10px}.send{background:#0f172a;color:#fff}.panel{position:fixed;left:10px;right:10px;bottom:76px;background:#fff;border-radius:20px;padding:14px;display:none;z-index:5;box-shadow:0 20px 60px rgba(15,23,42,.18)}.panel.show{display:block}.muted{color:#64748b;font-size:12px}.row{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin:8px 0}.dark{background:#111827;color:#f8fafc}.dark .top{background:rgba(17,24,39,.85)}.dark .composer,.dark .panel{background:#1f2937;color:#f8fafc}.dark textarea,.dark select,.dark input{background:#111827;color:#f8fafc;border-color:#374151}</style></head><body><div class="top"><button onclick="location.href='/gpt'">←</button><b>Stella Talk</b><button onclick="toggleSettings()">설정</button></div><div id="list" class="wrap"></div><div id="settingsPanel" class="panel"><b>Stella Talk 설정</b><p class="muted">회사 사용을 위해 무음/진동/소리, 밝은 화면/다크모드, 흐림 정도를 저장합니다.</p><div class="row"><span>알림</span><select id="mode"><option value="off">알림 끄기</option><option value="silent">무음</option><option value="vibrate">진동</option><option value="sound">소리</option><option value="both">소리+진동</option></select></div><div class="row"><span>사운드</span><select id="tone"><option value="stella">스텔라~</option><option value="byeoltalk">별톡</option><option value="byeolping">별핑</option><option value="princess">별하공주님~</option><option value="ddong">김별똥~</option><option value="uri">우리 별하~</option></select></div><div class="row"><span>테마</span><select id="theme"><option value="white">흰색</option><option value="talk">카카오톡 느낌</option><option value="dark">다크모드</option></select></div><div class="row"><span>배경 흐림</span><input id="blur" type="range" min="0" max="16" value="0"></div><button onclick="saveSettings()">저장</button> <button onclick="previewTone()">미리듣기</button></div><div class="composer"><textarea id="text" placeholder="메시지 입력"></textarea><button class="send" onclick="send()">전송</button></div><script>const K='stella_talk_demo_v2',KS='stella_talk_settings_v2';let msgs=JSON.parse(localStorage.getItem(K)||'[]');let opt=JSON.parse(localStorage.getItem(KS)||'{"mode":"off","tone":"stella","theme":"white","blur":"0"}');function apply(){mode.value=opt.mode;tone.value=opt.tone;theme.value=opt.theme;blur.value=opt.blur||0;document.body.className=opt.theme==='dark'?'dark':(opt.theme==='white'?'light':'');document.documentElement.style.setProperty('--blur',(opt.blur||0)+'px')}function render(){list.innerHTML=msgs.map(m=>'<div class="msg '+(m.me?'me':'')+'"><div class="bubble">'+esc(m.text)+'<br><small>'+m.time+'</small></div></div>').join('')||'<p class="muted">Stella Talk 대기 중</p>'}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}async function send(){const v=text.value.trim();if(!v)return;msgs.push({text:v,me:true,time:new Date().toLocaleTimeString()});text.value='';localStorage.setItem(K,JSON.stringify(msgs));render();notify()}function toggleSettings(){settingsPanel.classList.toggle('show')}function saveSettings(){opt={mode:mode.value,tone:tone.value,theme:theme.value,blur:blur.value};localStorage.setItem(KS,JSON.stringify(opt));apply();alert('저장 완료')}function words(){return {stella:'스텔라~',byeoltalk:'별톡',byeolping:'별핑',princess:'별하공주님~',ddong:'김별똥~',uri:'우리 별하~'}[tone.value]||'스텔라'}function previewTone(){if(['sound','both'].includes(mode.value)){const u=new SpeechSynthesisUtterance(words());u.lang='ko-KR';u.pitch=1.5;u.rate=1.0;speechSynthesis.speak(u)}if(['vibrate','both'].includes(mode.value)&&navigator.vibrate)navigator.vibrate([120,60,120])}function notify(){if(opt.mode==='off')return;if(['vibrate','both'].includes(opt.mode)&&navigator.vibrate)navigator.vibrate([120,60,120]);if(['sound','both'].includes(opt.mode))previewTone()}apply();render();</script></body></html>
