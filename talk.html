<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stella Talk</title><style>body{margin:0;font-family:system-ui;background:#b7c9d8}.top{position:sticky;top:0;padding:14px;background:#b7c9d8;display:flex;gap:8px}.top b{font-size:20px;margin-right:auto}.wrap{padding:12px 12px 120px}.msg{display:flex;margin:10px 0}.msg.me{justify-content:flex-end}.bubble{max-width:76%;background:#fff;border-radius:18px;padding:10px 12px}.msg.me .bubble{background:#fee500}.composer{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:10px;display:flex;gap:8px}textarea{flex:1;border:1px solid #d1d5db;border-radius:18px;padding:10px;font:inherit}button,select{font:inherit}button{border:1px solid #d1d5db;background:#fff;border-radius:13px;padding:10px}.send{background:#0f172a;color:#fff}.panel{position:fixed;left:10px;right:10px;bottom:76px;background:#fff;border-radius:20px;padding:14px;display:none}.panel.show{display:block}.muted{color:#64748b;font-size:12px}</style></head><body><div class="top"><button onclick="location.href='/'">←</button><b>Stella Talk</b><button onclick="toggleSettings()">알림</button></div><div id="list" class="wrap"></div><div id="settingsPanel" class="panel"><b>알림 설정</b><p class="muted">기본값은 무음, 팝업 OFF입니다.</p><select id="mode"><option value="silent">무음</option><option value="vibrate">진동</option><option value="sound">소리</option><option value="both">소리+진동</option></select><br><br><select id="tone"><option value="stella">Stella / 스텔라~~</option><option value="byeoltalk">별톡</option><option value="byeolping">별핑</option><option value="princess">별하공주님~~~</option><option value="ddong">김별똥~</option><option value="uri">우리 별하~</option></select><br><br><button onclick="saveSettings()">저장</button> <button onclick="previewTone()">미리듣기</button></div><div class="composer"><textarea id="text" placeholder="메시지 입력"></textarea><button class="send" onclick="send()">전송</button></div><script>const K='stella_talk_demo_v1',KS='stella_talk_settings_v1';let msgs=JSON.parse(localStorage.getItem(K)||'[]');let opt=JSON.parse(localStorage.getItem(KS)||'{"mode":"silent","tone":"stella"}');mode.value=opt.mode;tone.value=opt.tone;function render(){list.innerHTML=msgs.map(m=>'<div class="msg '+(m.me?'me':'')+'"><div class="bubble">'+esc(m.text)+'<br><small>'+m.time+'</small></div></div>').join('')||'<p class="muted">Stella Talk 대기 중</p>'}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function send(){const v=text.value.trim();if(!v)return;msgs.push({text:v,me:true,time:new Date().toLocaleTimeString()});text.value='';localStorage.setItem(K,JSON.stringify(msgs));render()}function toggleSettings(){settingsPanel.classList.toggle('show')}function saveSettings(){localStorage.setItem(KS,JSON.stringify({mode:mode.value,tone:tone.value}));alert('저장 완료')}function previewTone(){const w={stella:'스텔라~~',byeoltalk:'별톡',byeolping:'별핑',princess:'별하공주님~~~',ddong:'김별똥~',uri:'우리 별하~'}[tone.value]||'스텔라';const u=new SpeechSynthesisUtterance(w);u.lang='ko-KR';u.pitch=1.8;u.rate=1.1;speechSynthesis.speak(u)}render();</script></body></html>
