<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella Hub</title>
<meta name="theme-color" content="#0d1117">
<script src="/lib/hub-utils.js"></script>
<!-- 문법 강조: highlight.js (eval 미사용, 출력은 HTML 이스케이프됨 → XSS 안전). 실패 시 평문 폴백 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
/* ── 테마 토큰 (Stella DB와 동일: :root 다크 / body.light 라이트, stella_db_theme 키) ── */
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#c9d1d9;--accent:#e6edf3;--danger:#f85149;--primary:#1f6feb}
body.light{--bg:#f6f8fa;--bg2:#fff;--bg3:#f3f4f6;--border:#d1d5db;--text:#111827;--text2:#6b7280;--text3:#374151;--accent:#111827;--danger:#dc2626;--primary:#1f6feb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
a{color:var(--primary)}
.top{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:5}
.top h1{font-size:1.05rem;font-weight:900;white-space:nowrap}
.nav{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.nav a{font-size:.85rem;text-decoration:none;border:1px solid var(--border);border-radius:10px;padding:8px 13px;color:var(--text2);display:inline-flex;align-items:center;min-height:38px;white-space:nowrap}
.nav a:hover{border-color:var(--primary);color:var(--text)}
.nav a.active{background:var(--primary);border-color:var(--primary);color:#fff}
.icon-btn{font-size:1rem;line-height:1;border:1px solid var(--border);border-radius:10px;padding:0 12px;min-height:38px;background:var(--bg3);color:var(--text);cursor:pointer;display:inline-flex;align-items:center}
.icon-btn:hover{border-color:var(--primary)}
.wrap{flex:1;display:flex;min-height:0}
.side{width:300px;flex:0 0 auto;border-right:1px solid var(--border);background:var(--bg);overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.side h2{font-size:.72rem;text-transform:uppercase;color:var(--text2);margin:4px 4px;letter-spacing:.5px}
.searchbar{display:flex;gap:6px}
.searchbar input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--text);font-size:.82rem;outline:none}
.repo{padding:8px 9px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.82rem;background:var(--bg2)}
.repo:hover{border-color:var(--primary)}
.repo.active{border-color:var(--primary);background:var(--bg3)}
.repo .t{font-weight:700}
.repo .m{color:var(--text2);font-size:.72rem;margin-top:2px}
.repo-badge{font-size:.64rem;font-weight:700;padding:1px 6px;border-radius:999px;vertical-align:middle;white-space:nowrap}
.repo-badge.priv{background:#7c2d12;color:#fed7aa}
.repo-badge.pub{background:#14532d;color:#bbf7d0}
body.light .repo-badge.priv{background:#fde68a;color:#92400e}
body.light .repo-badge.pub{background:#dcfce7;color:#166534}
.tree{font-size:.83rem}
.node{padding:3px 4px;border-radius:6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node:hover{background:var(--bg3)}
.node.file.sel{background:var(--bg3);outline:1px solid var(--primary)}
.children{margin-left:14px;border-left:1px solid var(--border);padding-left:6px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.pv-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.pv-path{font-family:ui-monospace,Consolas,monospace;font-size:.82rem;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{font-size:.78rem;border:1px solid var(--border);border-radius:8px;padding:6px 10px;background:var(--bg3);color:var(--text);cursor:pointer;text-decoration:none;display:inline-block}
.btn:hover{border-color:var(--primary)}
.btn[disabled],.btn.disabled{opacity:.5;cursor:not-allowed}
.pv-body{flex:1;overflow:auto;padding:14px}
pre.code{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;overflow:auto;font-family:ui-monospace,Consolas,monospace;font-size:.82rem;line-height:1.55;white-space:pre;color:var(--text3)}
pre.code code{background:none;padding:0;font:inherit;color:inherit}
/* highlight.js 토큰 색 (테마 무관 자체 정의 — 외부 CSS 불필요) */
.hljs-keyword,.hljs-selector-tag,.hljs-built_in,.hljs-doctag{color:#ff7b72}
.hljs-string,.hljs-attr,.hljs-meta-string{color:#a5d6ff}
.hljs-comment,.hljs-quote{color:#8b949e;font-style:italic}
.hljs-number,.hljs-literal,.hljs-bullet{color:#79c0ff}
.hljs-title,.hljs-section,.hljs-function .hljs-title{color:#d2a8ff}
.hljs-name,.hljs-tag,.hljs-selector-id,.hljs-selector-class{color:#7ee787}
.hljs-meta,.hljs-symbol,.hljs-type{color:#8b949e}
body.light .hljs-keyword,body.light .hljs-selector-tag,body.light .hljs-built_in,body.light .hljs-doctag{color:#cf222e}
body.light .hljs-string,body.light .hljs-attr{color:#0a3069}
body.light .hljs-number,body.light .hljs-literal,body.light .hljs-bullet{color:#0550ae}
body.light .hljs-title,body.light .hljs-section{color:#8250df}
body.light .hljs-name,body.light .hljs-tag,body.light .hljs-selector-class{color:#116329}
.pv-img{max-width:100%;border-radius:10px;border:1px solid var(--border)}
.empty{color:var(--text2);text-align:center;margin:auto;font-size:.9rem;padding:30px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--text2);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.note{color:var(--text2);font-size:.78rem}
.err{color:var(--danger);font-size:.82rem}
@media(max-width:760px){.side{position:fixed;inset:48px 0 0 0;width:100%;z-index:20;display:none}.side.open{display:flex}.hamb{display:inline-block!important}}
.hamb{display:none}
.node .nck{margin-right:4px;vertical-align:middle;display:none}
.tree.multi .node .nck{display:inline-block}
.btn.on{background:var(--primary);border-color:var(--primary);color:#fff}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);background:#1f6feb;color:#fff;padding:10px 16px;border-radius:10px;font-size:.84rem;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}
</style>
</head>
<body>
<div class="top">
  <button class="icon-btn hamb" id="hambBtn" title="레포 목록">☰</button>
  <h1>🌐 Stella Hub</h1>
  <nav class="nav">
    <a href="/">🤖 GPT</a><a href="/abap">🧑‍💻 ABAP</a><a href="/db">🗄 DB</a><a href="/talk">💬 Talk</a>
    <button class="icon-btn" id="refreshBtn" title="새로고침">↻</button>
    <button class="icon-btn" id="themeToggle" title="다크/라이트 모드">🌙</button>
  </nav>
</div>
<div class="wrap">
  <aside class="side" id="side">
    <div class="searchbar">
      <input id="fileSearch" placeholder="파일명 검색(현재 레포)" autocomplete="off">
    </div>
    <h2>내 레포</h2>
    <div id="repoList"><div class="note" style="padding:8px">불러오는 중… <span class="spin"></span></div></div>
    <h2 id="treeTitle" style="display:none">파일 트리</h2>
    <div class="tree" id="tree"></div>
  </aside>
  <main class="main">
    <div class="pv-head">
      <span class="pv-path" id="pvPath">레포와 파일을 선택하세요</span>
      <a class="btn" id="dlBtn" style="display:none" title="원본 그대로 다운로드(프록시)">⬇ 다운로드</a>
      <button class="btn" id="xlsxBtn" style="display:none" onclick="exportExcel()" title="Excel로 내보내기(안 열릴 때 폴백)">📊 Excel</button>
      <button class="btn" id="upBtn" onclick="pickUpload()" title="현재 레포에 파일 업로드">⬆ 업로드</button>
      <button class="btn" id="mkdirBtn" onclick="doMkdir()" title="새 폴더 만들기">＋ 폴더</button>
      <button class="btn" id="copyBtn" onclick="doCopy()" title="선택 파일 복사">📋 복사</button>
      <button class="btn" id="moveBtn" onclick="doMove(false)" title="선택 파일 이동">📁 이동</button>
      <button class="btn" id="renameBtn" onclick="doMove(true)" title="이름 변경">✏️ 이름</button>
      <button class="btn" id="delBtn" onclick="doDelete()" title="선택 파일 삭제">🗑 삭제</button>
      <button class="btn" id="selBtn" onclick="toggleMulti()" title="다중 선택 모드">☑ 다중</button>
      <input type="file" id="uploadInput" style="display:none" onchange="onUploadPick(this)">
    </div>
    <div class="pv-body" id="pvBody"><div class="empty">왼쪽에서 레포 → 폴더/파일을 선택하면 여기서 미리보기·다운로드할 수 있습니다.<br><span class="note">업로드/삭제/이동/복사/이름변경/새폴더는 GITHUB_TOKEN(쓰기 권한) 설정 시 동작합니다. 토큰이 없으면 안내 메시지가 표시됩니다.</span></div></div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script>
const H = window.StellaHub;
const $ = (id) => document.getElementById(id);
const OWNER = H.OWNER;
let curRepo = null;        // {name, default_branch}
let curRepoFiles = [];     // 현재 레포 루트 파일(검색 필터용)
let curFile = null;        // 현재 선택/미리보기 중인 파일 {path,sha,size,name}
let multiMode = false;     // 다중 선택 모드
const selected = new Map();// path -> {path,sha}

let _toastT=null;
function toast(msg, isErr){ const t=$('toast'); if(!t)return; t.textContent=msg; t.className='toast show'+(isErr?' err':''); clearTimeout(_toastT); _toastT=setTimeout(()=>t.className='toast',2200); }

// ── 테마 (Stella DB와 동일: body.light + stella_db_theme) ──
function applyTheme(){
  let t; try{ t=localStorage.getItem('stella_db_theme'); }catch(e){}
  // 저장값이 없으면 시스템 설정(prefers-color-scheme)을 따른다.
  if(t!=='light'&&t!=='dark'){
    t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';
  }
  document.body.classList.toggle('light', t==='light');
  $('themeToggle').textContent = t==='light' ? '☀️' : '🌙';
  const m=document.querySelector('meta[name=theme-color]'); if(m) m.setAttribute('content', t==='light'?'#f6f8fa':'#0d1117');
}
function toggleTheme(){
  const light=document.body.classList.toggle('light');
  try{ localStorage.setItem('stella_db_theme', light?'light':'dark'); }catch(e){}
  $('themeToggle').textContent = light?'☀️':'🌙';
  const m=document.querySelector('meta[name=theme-color]'); if(m) m.setAttribute('content', light?'#f6f8fa':'#0d1117');
}
applyTheme();
$('themeToggle').addEventListener('click', toggleTheme);

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 방어적 JSON 파싱: 서버가 평문(타임아웃·에러 페이지 등)을 보내도
// "Unexpected token" 대신 깔끔한 한국어 메시지를 보장한다.
async function safeJson(r){
  const text = await r.text();
  try{ return JSON.parse(text); }
  catch(e){
    throw new Error(r.ok
      ? '서버 응답 형식 오류로 데이터를 불러오지 못했습니다. 잠시 후 다시 시도하세요.'
      : ('서버 오류('+r.status+')로 요청을 처리하지 못했습니다. 잠시 후 다시 시도하세요.'));
  }
}

// ── GitHub 비인증 API ──
async function ghApi(path){
  const r = await fetch('https://api.github.com'+path, { headers:{ 'Accept':'application/vnd.github+json' } });
  let body=null; try{ body=await r.json(); }catch(e){}
  if(!r.ok){
    if(H.isRateLimited(r.status, body)) throw new Error('GitHub API 요청 한도 초과(비로그인 시간당 60회). 잠시 후 다시 시도하세요.');
    throw new Error('GitHub '+r.status+': '+((body&&body.message)||''));
  }
  return body;
}

// ── 레포 목록 (공개+비공개; 토큰 있으면 비공개 포함, 서버 프록시 경유) ──
async function loadRepos(){
  $('repoList').innerHTML='<div class="note" style="padding:8px">불러오는 중… <span class="spin"></span></div>';
  try{
    let repos, authed=false;
    try{
      const d = await safeJson(await fetch('/api/github?action=repos'));
      if(d && d.ok && Array.isArray(d.repos)){ repos=d.repos; authed=!!d.authenticated; }
      else throw new Error((d&&d.message)||'repos 로드 실패');
    }catch(_){
      // 폴백: 비인증 공개만 (토큰 미설정/프록시 오류 시)
      const pub = await ghApi('/users/'+OWNER+'/repos?per_page=100&sort=updated');
      repos = (pub||[]).filter(r=>!r.private).map(r=>({ name:r.name, owner:OWNER, default_branch:r.default_branch||'main', private:false, language:r.language||'', description:r.description||'', stargazers_count:r.stargazers_count||0 }));
    }
    if(!repos.length){ $('repoList').innerHTML='<div class="note" style="padding:8px">표시할 레포가 없습니다.</div>'; return; }
    const privN = repos.filter(r=>r.private).length;
    const head = authed ? '<div class="note" style="padding:4px 8px">공개+비공개 '+repos.length+'개 (🔒 '+privN+')</div>' : '<div class="note" style="padding:4px 8px">공개 '+repos.length+'개 (토큰 설정 시 비공개도 표시)</div>';
    $('repoList').innerHTML = head + repos.map(r=>{
      const badge = r.private ? '<span class="repo-badge priv">🔒 비공개</span>' : '<span class="repo-badge pub">🌐 공개</span>';
      return '<div class="repo" data-name="'+esc(r.name)+'" data-owner="'+esc(r.owner||OWNER)+'" data-branch="'+esc(r.default_branch||'main')+'" data-private="'+(r.private?1:0)+'">'
        + '<div class="t">'+esc(r.name)+' '+badge+'</div>'
        + '<div class="m">'+esc(r.language||'')+(r.stargazers_count?(' · ★'+r.stargazers_count):'')+(r.description?(' · '+esc(r.description)):'')+'</div></div>';
    }).join('');
    $('repoList').querySelectorAll('.repo').forEach(el=>el.addEventListener('click',()=>openRepo(el.dataset.name, el.dataset.branch, el, el.dataset.owner, el.dataset.private==='1')));
  }catch(e){ $('repoList').innerHTML='<div class="err" style="padding:8px">'+esc(e.message)+'</div>'; }
}

// ── 레포 열기 → 루트 트리 ──
async function openRepo(name, branch, el, owner, isPrivate){
  curRepo = { name, default_branch: branch||'main', owner: owner||OWNER, private: !!isPrivate };
  document.querySelectorAll('.repo').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  $('treeTitle').style.display='';
  $('tree').innerHTML='<div class="note">불러오는 중… <span class="spin"></span></div>';
  $('pvPath').textContent = name;
  $('pvBody').innerHTML='<div class="empty">파일을 선택하세요.</div>';
  $('dlBtn').style.display='none';
  try{
    const items = await loadDir('');
    curRepoFiles = items;
    $('tree').innerHTML='';
    if(!items.length){
      $('tree').innerHTML='<div class="note" style="padding:8px">📭 이 레포지토리는 비어 있습니다.<br><span class="note">아직 커밋된 파일이 없습니다.</span></div>';
      $('pvBody').innerHTML='<div class="empty">📭 비어 있는 레포지토리입니다.<br><span class="note">파일을 커밋하면 여기에 표시됩니다.</span></div>';
      return;
    }
    renderNodes($('tree'), items, '');
  }catch(e){
    // 빈 레포(커밋 없음)는 GitHub가 "This repository is empty." 를 반환 → 에러 대신 안내
    if(/empty/i.test(e.message||'')){
      $('tree').innerHTML='<div class="note" style="padding:8px">📭 이 레포지토리는 비어 있습니다.<br><span class="note">아직 커밋된 파일이 없습니다.</span></div>';
    }else{
      $('tree').innerHTML='<div class="err">'+esc(e.message)+'</div>';
    }
  }
}

async function loadDir(path){
  try{
    const u='/api/github?action=contents&owner='+encodeURIComponent(curRepo.owner)+'&repo='+encodeURIComponent(curRepo.name)+'&path='+encodeURIComponent(path)+'&ref='+encodeURIComponent(curRepo.default_branch);
    const d=await safeJson(await fetch(u));
    if(d && d.ok && d.type==='dir') return H.sortContents(d.items||[]);
    throw new Error((d&&d.message)||'contents 로드 실패');
  }catch(err){
    if(curRepo.private) throw err; // 비공개는 비인증 폴백 불가
    const items = await ghApi('/repos/'+curRepo.owner+'/'+curRepo.name+'/contents/'+path.split('/').map(encodeURIComponent).join('/'));
    return H.sortContents(Array.isArray(items)?items:[]);
  }
}

function nodeLabel(it, open){ return (it.type==='dir'?(open?'📂 ':'📁 '):'📄 ')+it.name; }
function makeCheckbox(it){
  const cb=document.createElement('input'); cb.type='checkbox'; cb.className='nck';
  cb.checked=selected.has(it.path);
  cb.addEventListener('click', e=>{ e.stopPropagation();
    if(cb.checked) selected.set(it.path,{path:it.path,sha:it.sha,type:it.type}); else selected.delete(it.path);
  });
  return cb;
}
function renderNodes(host, items, parentPath){
  items.forEach(it=>{
    const row=document.createElement('div');
    row.className='node '+(it.type==='dir'?'dir':'file');
    row.dataset.path=it.path;
    const cb=makeCheckbox(it);
    const lbl=document.createElement('span'); lbl.textContent=nodeLabel(it,false);
    row.appendChild(cb); row.appendChild(lbl);
    if(it.type==='dir'){
      const kids=document.createElement('div'); kids.className='children'; kids.style.display='none';
      let loaded=false;
      row.addEventListener('click', async (e)=>{
        e.stopPropagation();
        if(kids.style.display==='none'){
          kids.style.display=''; lbl.textContent=nodeLabel(it,true);
          if(!loaded){ loaded=true; kids.innerHTML='<div class="note">…</div>';
            try{ const sub=await loadDir(it.path); kids.innerHTML=''; renderNodes(kids, sub, it.path); }
            catch(err){ kids.innerHTML='<div class="err">'+esc(err.message)+'</div>'; } }
        }else{ kids.style.display='none'; lbl.textContent=nodeLabel(it,false); }
      });
      host.appendChild(row); host.appendChild(kids);
    }else{
      row.addEventListener('click', (e)=>{ e.stopPropagation();
        document.querySelectorAll('.node.file.sel').forEach(n=>n.classList.remove('sel'));
        row.classList.add('sel'); curFile={path:it.path,sha:it.sha,size:it.size||0,name:it.name}; openFile(it); });
      host.appendChild(row);
    }
  });
}

// ── 안전한 텍스트/코드/JSON 렌더 (eval 미사용) ──
// JSON: JSON.parse+stringify(pretty). 코드: highlight.js(출력 이스케이프됨). 폴백: textContent(평문).
var HUB_LANG={js:'javascript',mjs:'javascript',cjs:'javascript',jsx:'javascript',ts:'typescript',tsx:'typescript',py:'python',java:'java',c:'c',h:'cpp',cpp:'cpp',go:'go',sh:'bash',rb:'ruby',php:'php',rs:'rust',kt:'kotlin',swift:'swift',html:'xml',htm:'xml',xml:'xml',css:'css',scss:'scss',json:'json',md:'markdown',markdown:'markdown',sql:'sql',yml:'yaml',yaml:'yaml',toml:'ini',ini:'ini',abap:'abap'};
function renderText(name, content){
  var body=$('pvBody');
  var ext=H.ext(name);
  if(ext==='json'){ try{ content=JSON.stringify(JSON.parse(content), null, 2); }catch(e){} }
  var lang=HUB_LANG[ext];
  if(window.hljs && lang && hljs.getLanguage && hljs.getLanguage(lang)){
    try{
      var out=hljs.highlight(content, {language:lang, ignoreIllegals:true}).value; // HTML 이스케이프된 안전 문자열
      body.innerHTML='<pre class="code"><code class="hljs">'+out+'</code></pre>';
      return;
    }catch(e){}
  }
  // 폴백: textContent(이스케이프) — eval/innerHTML(원문) 미사용
  body.innerHTML='';
  var pre=document.createElement('pre'); pre.className='code';
  pre.textContent=content;
  body.appendChild(pre);
}

// ── 다운로드 프록시 URL (공개·비공개 모두 동작, 항상 열리는 파일) ──
function proxyUrl(path, disp){
  return '/api/gh-download?owner='+encodeURIComponent(curRepo.owner)+'&repo='+encodeURIComponent(curRepo.name)
    +'&path='+encodeURIComponent(path)+'&ref='+encodeURIComponent(curRepo.default_branch)+(disp?('&disp='+disp):'');
}
function excelUrl(path){
  return '/api/gh-export-excel?owner='+encodeURIComponent(curRepo.owner)+'&repo='+encodeURIComponent(curRepo.name)
    +'&path='+encodeURIComponent(path)+'&ref='+encodeURIComponent(curRepo.default_branch);
}
// AbortController 타임아웃 fetch ("Failed to fetch" 방어)
async function fetchT(url, opts, ms){
  const ac=new AbortController(); const t=setTimeout(()=>ac.abort(), ms||30000);
  try{ return await fetch(url, Object.assign({signal:ac.signal}, opts||{})); }
  finally{ clearTimeout(t); }
}
const PREVIEW_MAX = 512*1024; // 512KB 초과는 인라인 미리보기 생략

// ── 파일 미리보기/다운로드 ──
async function openFile(it){
  curFile={path:it.path,sha:it.sha,size:it.size||0,name:it.name};
  $('pvPath').textContent=curRepo.name+'/'+it.path;
  const kind=H.classify(it.name);
  const dl=$('dlBtn');
  // 다운로드/엑셀: 항상 프록시(서버가 토큰으로 원본 스트리밍 + 올바른 헤더)
  dl.style.display=''; dl.href=proxyUrl(it.path,'attachment'); dl.removeAttribute('download');
  $('xlsxBtn').style.display='';
  const sizeKB = it.size?Math.round(it.size/1024):0;

  if(kind==='image'){
    if((it.size||0)>PREVIEW_MAX){ $('pvBody').innerHTML=bigMsg(it,'이미지가 큽니다'); return; }
    $('pvBody').innerHTML='<img class="pv-img" alt="'+esc(it.name)+'" src="'+esc(proxyUrl(it.path,'inline'))+'" onerror="this.parentNode.innerHTML=\'<div class=&quot;err&quot;>이미지 미리보기 실패 — 다운로드를 이용하세요.</div>\'">';
    return;
  }
  if(kind==='binary'){ $('pvBody').innerHTML=bigMsg(it,'바이너리 파일입니다'); return; }
  if((it.size||0)>PREVIEW_MAX){ $('pvBody').innerHTML=bigMsg(it,'텍스트가 큽니다('+sizeKB+'KB)'); return; }
  // 텍스트: 프록시로 받아 안전 렌더 (공개·비공개 동일 경로 → "Failed to fetch" 방지)
  $('pvBody').innerHTML='<div class="note">불러오는 중… <span class="spin"></span></div>';
  try{
    const r=await fetchT(proxyUrl(it.path,'inline'),{},30000);
    if(!r.ok){ const d=await safeJson(r); throw new Error(d.message||('미리보기 실패('+r.status+')')); }
    const txt=await r.text();
    renderText(it.name, txt);
  }catch(e){
    const msg = (e.name==='AbortError')?'미리보기 시간 초과 — 다운로드를 이용하세요.':('미리보기 실패: '+(e.message||e));
    $('pvBody').innerHTML='<div class="err">'+esc(msg)+'</div><div class="note" style="margin-top:8px">「⬇ 다운로드」 또는 「📊 Excel」로 받으세요.</div>';
  }
}
function bigMsg(it, why){
  return '<div class="empty">'+esc(why)+'.<br><span class="note">'+esc(it.name)+(it.size?(' · '+Math.round(it.size/1024)+'KB'):'')+'</span><br>「⬇ 다운로드」로 원본을, 안 열리면 「📊 Excel」로 받으세요.</div>';
}
function exportExcel(){ if(!curFile){toast('파일을 먼저 선택하세요',true);return;} window.open(excelUrl(curFile.path),'_blank'); }

// ── 파일관리자 쓰기 작업 (현재 선택 레포 대상, 토큰은 서버 env) ──
async function ghWrite(payload){
  const r=await fetchT('/api/github',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)},45000);
  const d=await safeJson(r);
  if(!d.ok) throw new Error(d.message||('요청 실패('+r.status+')'));
  return d;
}
function needRepo(){ if(!curRepo){toast('레포를 먼저 여세요',true);return false;} return true; }
function curDir(){ if(curFile && curFile.path.includes('/')) return curFile.path.replace(/\/[^/]*$/,''); return ''; }
function selectedList(){ return Array.from(selected.values()); }
async function refreshTree(){
  if(!curRepo) return; selected.clear();
  $('tree').innerHTML='<div class="note">새로고침… <span class="spin"></span></div>';
  try{ const items=await loadDir(''); curRepoFiles=items; $('tree').innerHTML=''; renderNodes($('tree'),items,''); $('tree').classList.toggle('multi',multiMode); }
  catch(e){ $('tree').innerHTML='<div class="err">'+esc(e.message)+'</div>'; }
}
function pickUpload(){ if(needRepo()) $('uploadInput').click(); }
function onUploadPick(input){
  const f=input.files[0]; if(!f)return;
  const dir=curDir(); const path=prompt('업로드 경로(레포 기준)', (dir?dir+'/':'')+f.name);
  if(!path){ input.value=''; return; }
  const reader=new FileReader();
  reader.onload=async()=>{
    try{ const b64=String(reader.result).split(',')[1]||''; // data URL → base64 (바이너리-safe)
      toast('업로드 중…'); await ghWrite({action:'upload',owner:curRepo.owner,repo:curRepo.name,branch:curRepo.default_branch,path:path,content:b64});
      toast('업로드 완료'); await refreshTree();
    }catch(e){ toast('업로드 실패: '+(e.message||e),true); }
    finally{ input.value=''; }
  };
  reader.onerror=()=>{ toast('파일 읽기 실패',true); input.value=''; };
  reader.readAsDataURL(f);
}
async function doMkdir(){
  if(!needRepo())return;
  const dir=curDir(); const name=prompt('새 폴더 경로', (dir?dir+'/':'')+'new-folder'); if(!name)return;
  try{ toast('폴더 생성 중…'); await ghWrite({action:'mkdir',owner:curRepo.owner,repo:curRepo.name,branch:curRepo.default_branch,path:name}); toast('폴더 생성됨'); await refreshTree(); }
  catch(e){ toast('폴더 생성 실패: '+(e.message||e),true); }
}
async function doDelete(){
  if(!needRepo())return;
  const list = (multiMode && selected.size) ? selectedList() : (curFile?[{path:curFile.path,sha:curFile.sha}]:[]);
  if(!list.length){ toast('삭제할 파일을 선택하세요',true); return; }
  if(!confirm(list.length+'개 항목을 삭제할까요? 되돌릴 수 없습니다.\n\n'+list.map(x=>x.path).join('\n').slice(0,600))) return;
  try{ toast('삭제 중…');
    if(list.length===1) await ghWrite({action:'delete',owner:curRepo.owner,repo:curRepo.name,branch:curRepo.default_branch,path:list[0].path,sha:list[0].sha});
    else { const d=await ghWrite({action:'batch',op:'delete',owner:curRepo.owner,repo:curRepo.name,branch:curRepo.default_branch,items:list});
      if(d.errors) toast(d.done+'/'+d.total+' 삭제(일부 실패)',true); }
    toast('삭제 완료'); curFile=null; await refreshTree();
  }catch(e){ toast('삭제 실패: '+(e.message||e),true); }
}
async function doCopy(){
  if(!needRepo()||!curFile){ toast('복사할 파일을 먼저 선택하세요',true); return; }
  const dest=prompt('복사 대상 경로', curFile.path.replace(/(\.[^.\/]+)?$/, '_copy$1')); if(!dest)return;
  try{ toast('복사 중…'); await ghWrite({action:'copy',owner:curRepo.owner,repo:curRepo.name,branch:curRepo.default_branch,path:curFile.path,dest:dest}); toast('복사 완료'); await refreshTree(); }
  catch(e){ toast('복사 실패: '+(e.message||e),true); }
}
async function doMove(isRename){
  if(!needRepo()||!curFile){ toast((isRename?'이름 변경':'이동')+'할 파일을 선택하세요',true); return; }
  const dest=prompt(isRename?'새 이름(경로)':'이동 대상 경로', curFile.path); if(!dest||dest===curFile.path)return;
  if(!confirm((isRename?'이름 변경':'이동')+':\n'+curFile.path+'\n→ '+dest)) return;
  try{ toast('처리 중…'); const d=await ghWrite({action:'move',owner:curRepo.owner,repo:curRepo.name,branch:curRepo.default_branch,path:curFile.path,dest:dest});
    toast(d.warning ? d.warning : ((isRename?'이름 변경':'이동')+' 완료'), !!d.warning); curFile=null; await refreshTree();
  }catch(e){ toast('실패: '+(e.message||e),true); }
}
function toggleMulti(){ multiMode=!multiMode; $('selBtn').classList.toggle('on',multiMode); $('tree').classList.toggle('multi',multiMode); if(!multiMode)selected.clear(); toast(multiMode?'다중 선택 ON (체크박스로 선택 후 삭제)':'다중 선택 OFF'); }

// ── 검색(현재 레포 루트 파일명 필터) ──
$('fileSearch').addEventListener('input', function(){
  if(!curRepo){ return; }
  const filtered=H.filterFiles(curRepoFiles, this.value);
  $('tree').innerHTML=''; renderNodes($('tree'), filtered, '');
});
$('refreshBtn').addEventListener('click', ()=>{ if(curRepo){ const n=curRepo.name,b=curRepo.default_branch; loadRepos().then(()=>openRepo(n,b)); } else loadRepos(); });
$('hambBtn').addEventListener('click', ()=>$('side').classList.toggle('open'));

loadRepos();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }
</script>
