<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella DB</title>
<link rel="manifest" href="/manifest-db.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stella DB">
<link rel="apple-touch-icon" href="/icons/db-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/db-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#c9d1d9;--accent:#c9d1d9;--danger:#cf6b66;--primary:#3b6db5;--icon:#8b949e;--chk-border:#6e7681;--chk-fill:#6e7681;--chk-mark:#e6edf3}
body.light{--bg:#f6f8fa;--bg2:#fff;--bg3:#f3f4f6;--border:#d1d5db;--text:#1f2328;--text2:#6b7280;--text3:#374151;--accent:#374151;--danger:#c2554f;--primary:#3b6db5;--icon:#6b7280;--chk-border:#808890;--chk-fill:#6b7280;--chk-mark:#ffffff}
body{font-family:system-ui,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;transition:background .2s,color .2s}
.top{display:flex;align-items:center;gap:6px;padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.top h1{font-size:.95rem;font-weight:900;color:var(--text)}
.btn{border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:9px;padding:6px 12px;cursor:pointer;font-size:.8rem;font-weight:700;white-space:nowrap;transition:background .15s,border-color .15s;filter:saturate(.7)}
.btn:hover{opacity:.85}.btn:active{opacity:.6}
.btn svg{vertical-align:-2px}
.theme-btn{color:var(--text2)}
.theme-btn svg{display:block}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn.upload-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.breadcrumb{padding:6px 12px;font-size:.78rem;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;flex-wrap:wrap;flex-shrink:0}
.bc-seg{cursor:pointer;color:var(--accent);padding:2px 4px;border-radius:5px}.bc-seg:hover{opacity:.75}
.bc-sep{color:var(--border)}
.bc-copy{cursor:pointer;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:.72rem;color:var(--text2);margin-left:4px;white-space:nowrap}
.bc-copy:hover{color:var(--text)}
.toolbar{display:flex;gap:6px;padding:7px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;align-items:center}
.filter-in{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:6px 11px;color:var(--text);font-size:.8rem;flex:1;min-width:0}
.filter-in::placeholder{color:var(--text2)}
.sel-bar{display:none;gap:6px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;font-size:.8rem;color:var(--text2);flex-shrink:0}
.sel-bar.show{display:flex}
.status{padding:5px 12px;font-size:.73rem;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.file-list{flex:1;overflow-y:auto}
.file-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.file-row:hover{background:var(--bg2)}.file-row.sel{background:var(--bg3)}
/* 체크박스: 다른 파일앱처럼 얇은 테두리·은은하게. 선택 시에만 차분한 회색으로 살짝 강조(쨍한 색 없음) */
.file-chk{-webkit-appearance:none;appearance:none;width:17px;height:17px;flex-shrink:0;cursor:pointer;margin:0;position:relative;background:transparent;border:1.5px solid var(--chk-border);border-radius:4px;transition:background .12s,border-color .12s}
.file-chk:hover{border-color:var(--text2)}
.file-chk:checked{background:var(--chk-fill);border-color:var(--chk-fill)}
.file-chk:checked::after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;border:solid var(--chk-mark);border-width:0 2px 2px 0;transform:rotate(45deg)}
.file-chk:focus-visible{outline:2px solid var(--chk-border);outline-offset:2px}
/* 아이콘: 폴더는 무채색 SVG, 파일 이모지는 채도 낮춰 차분하게(중간 회색 톤) */
.file-icon{font-size:1.1rem;width:24px;flex-shrink:0;color:var(--icon);filter:saturate(.5);display:flex;align-items:center;justify-content:center}
.file-info{flex:1;min-width:0}
.file-name{font-size:.86rem;font-weight:700;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{font-size:.72rem;color:var(--text2);margin-top:1px}
.file-acts{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.file-row:hover .file-acts{opacity:1}
.enter-folder{flex:0 0 auto;width:32px;height:32px;border:none;background:transparent;color:var(--text2);font-size:1.5rem;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px}
.enter-folder:hover,.enter-folder:active{background:var(--bg3);color:var(--text)}
@media (hover:none){.file-acts{opacity:1}}
.act{background:var(--bg3);color:var(--text3);border:1px solid var(--border);border-radius:7px;padding:3px 8px;cursor:pointer;font-size:.72rem;filter:saturate(.6)}
.act.del{border-color:var(--danger);color:var(--danger)}
.empty{padding:40px;text-align:center;color:var(--text2);font-size:.88rem}
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.gate-card{width:min(380px,100%);background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:24px}
.gate-card h2{color:var(--text);margin-bottom:6px;font-size:1.15rem}
.gate-card p{color:var(--text2);font-size:.83rem;margin-bottom:14px}
.gate-card input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text);font-size:.9rem;margin-bottom:8px}
.gate-card input::placeholder{color:var(--text2)}
.gate-btn{width:100%;padding:11px;border-radius:10px;cursor:pointer;font-weight:800;border:1px solid var(--border);font-size:.9rem;margin-top:4px;background:var(--bg3);color:var(--text)}
.gate-btn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.err{color:var(--danger);font-size:.78rem;min-height:16px;margin-top:4px}
.upoverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center}
.upoverlay.on{display:flex}
.upcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;width:min(340px,90%);text-align:center}
.upcard h3{color:var(--text);margin-bottom:10px;font-size:.95rem}
.upcard p{color:var(--text2);font-size:.82rem}
.mvmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center}
.mvmodal.on{display:flex}
.mvcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:min(340px,90%)}
.mvcard h3{color:var(--text);margin-bottom:10px;font-size:.92rem}
.mvcard input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px;color:var(--text);font-size:.85rem;margin-bottom:10px}
.mvcard input::placeholder{color:var(--text2)}

/* ── 드래그&드롭 ── */
.file-list.drag-over{outline:3px dashed var(--text2);outline-offset:-4px;background:transparent}
.drop-hint{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.55);border:4px dashed #fff;pointer-events:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-size:1.4rem;font-weight:900;color:#fff}
.drop-hint.on{display:flex}

/* ── 우클릭 메뉴 ── */
.ctx-menu{display:none;position:fixed;z-index:3000;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:6px 0;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.ctx-menu.on{display:block}
.ctx-item{padding:9px 16px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:9px;font-size:.84rem;transition:background .1s}
.ctx-item:hover{background:var(--bg3)}
.ctx-item.danger{color:var(--danger)}
.ctx-item.disabled{opacity:.4;pointer-events:none}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}
/* ── 폴더 피커 ── */
.picker-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;align-items:center;justify-content:center}
.picker-bg.on{display:flex}
.picker{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:min(480px,94vw);max-height:80vh;display:flex;flex-direction:column}
.picker-head{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px}
.picker-head span{flex:1}
.picker-path{padding:6px 18px;font-size:.75rem;color:var(--text2);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap}
.picker-list{flex:1;overflow-y:auto;max-height:350px}
.pk-row{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.pk-row:hover{background:var(--bg3)}
.pk-row.sel{background:var(--bg3);font-weight:700}
.pk-icon{font-size:1.1rem;flex-shrink:0;color:var(--icon);filter:saturate(.5)}
.pk-name{flex:1;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.picker-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.picker-foot button{padding:8px 16px;border-radius:10px;cursor:pointer;font-size:.84rem;font-weight:700;border:1px solid var(--border);background:var(--bg3);color:var(--text)}
.picker-foot .pri{background:var(--primary);color:#fff;border-color:var(--primary)}
/* ── 클립보드 상태 표시 ── */
.clip-bar{display:none;gap:6px;padding:6px 12px;background:var(--bg3);border-bottom:1px solid var(--border);align-items:center;font-size:.8rem;color:var(--text);flex-shrink:0}
.clip-bar.on{display:flex}
.clip-bar button{font-size:.78rem}
</style>
</head>
<body>
<div id="gate">
<div class="gate-card">
<h2>Stella DB</h2>
<p>관리자 계정으로 로그인하세요</p>
<input id="gId" placeholder="아이디" autocomplete="username" onkeydown="if(event.key==='Enter')dbLogin()">
<input id="gPw" type="password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')dbLogin()">
<button class="gate-btn pri" onclick="dbLogin()">접속</button>
<button class="gate-btn" onclick="location.href='/'">Stella GPT로 돌아가기</button>
<div class="err" id="gErr"></div>
</div>
</div>

<div id="appWrap" style="display:none;flex-direction:column;height:100dvh">
<div class="top">
<h1><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" style="color:var(--text2);vertical-align:-2px;margin-right:4px" aria-hidden="true"><rect x="3" y="4" width="18" height="5" rx="1.5"/><rect x="3" y="10.5" width="18" height="5" rx="1.5"/><rect x="3" y="17" width="13" height="3" rx="1.5"/></svg>Stella DB</h1>
<span id="userLabel" style="font-size:.72rem;color:var(--text2)"></span>
<button class="btn" onclick="goUp()" id="upBtn">⬆ 상위</button>
<button class="btn" onclick="refresh()">↻</button>
<button class="btn" onclick="selectAll()" id="selAllBtn">☑ 전체선택</button>
<button class="btn theme-btn" onclick="toggleTheme()" id="themeBtn" title="테마 전환" aria-label="테마 전환"></button>
<button class="btn" onclick="location.href='/'">GPT</button>
<button class="btn" id="installBtn" onclick="installPWA()" style="display:none">📲 설치</button>
<button class="btn" onclick="dbLogout()">나가기</button>
</div>

<!-- 브레드크럼 + 경로복사 -->
<div class="breadcrumb" id="breadcrumb"></div>

<!-- 선택 작업 바 -->
<div class="sel-bar" id="selBar">
<span id="selCount">0개 선택</span>
<button class="btn" onclick="downloadSelected()">⬇ 다운로드</button>
<button class="btn" onclick="compressSelected()">🗜️ 압축</button>
<button class="btn danger" onclick="deleteSelected()">🗑 삭제</button>
<button class="btn" onclick="moveSelected()">📂 이동</button>
<button class="btn" onclick="clearSel()">✕ 해제</button>
</div>

<div class="clip-bar" id="clipBar">
  <span id="clipInfo">📋 복사됨</span>
  <button class="btn" onclick="pasteClipboard()">📌 여기에 붙여넣기</button>
  <button class="btn" onclick="clearClipboard()">✕ 취소</button>
</div>
<div class="toolbar">
<input class="filter-in" id="filterIn" placeholder="파일/폴더 필터..." oninput="renderFiles()">
<button class="btn" onclick="mkdirPrompt()">＋ 폴더</button>
<button class="btn upload-btn" onclick="document.getElementById('fileUploadIn').click()">⬆ 업로드</button>
<button class="btn" onclick="downloadSelected()" id="dlBtn" title="선택 항목 다운로드">⬇ 다운로드</button>
<input type="file" id="fileUploadIn" multiple hidden onchange="uploadFiles(this.files)">
</div>
<div class="status" id="statusBar">로딩 중...</div>
<div class="file-list" id="fileList"></div>
</div>

<div class="upoverlay" id="upoverlay">
<div class="upcard">
<h3>⬆ 업로드 중...</h3>
<p id="upProgress">준비 중...</p>
</div>
</div>

<!-- 파일 미리보기 모달 -->
<div id="filePreviewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9500;align-items:center;justify-content:center;padding:14px">
<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:min(640px,100%);max-height:88vh;display:flex;flex-direction:column;overflow:hidden">
<div style="display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border)">
<span id="fpTitle" style="flex:1;font-weight:800;font-size:.92rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">파일</span>
<button onclick="closeFilePreview()" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 11px;cursor:pointer;color:var(--text);font-size:.82rem">✕</button>
</div>
<div id="fpBody" style="flex:1;overflow:auto;padding:16px;background:var(--bg)"></div>
<div style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap">
<button id="fpDownload" style="flex:1;min-width:100px;padding:10px;border-radius:10px;cursor:pointer;font-weight:800;background:var(--primary);color:#fff;border:none;font-size:.85rem">⬇ 다운로드</button>
<button id="fpOpen" style="flex:1;min-width:100px;padding:10px;border-radius:10px;cursor:pointer;font-weight:800;background:var(--bg3);color:var(--text);border:1px solid var(--border);font-size:.85rem">🔗 Drive에서 열기</button>
<button id="fpCopyName" style="padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:800;background:var(--bg3);color:var(--text);border:1px solid var(--border);font-size:.85rem">📋</button>
</div>
</div>
</div>

<div class="mvmodal" id="mvmodal">
<div class="mvcard">
<h3>📂 폴더 이동</h3>
<p style="color:var(--text2);font-size:.8rem;margin-bottom:10px">이동할 폴더 ID를 입력하세요</p>
<input id="mvTargetId" placeholder="이동할 폴더 ID">
<div style="display:flex;gap:6px">
<button class="btn" onclick="confirmMove()" style="flex:1">이동</button>
<button class="btn" onclick="document.getElementById('mvmodal').classList.remove('on')" style="flex:1">취소</button>
</div>
</div>
</div>

<script>
const SK='stella_session_final_v82';
const ADMINS=['admin','admin@stella.local','yesblue0342','yesblue0342@naver.com','yesblue0342@gmail.com','김경훈','이후'];
let _user=null,_stack=[],_files=[],_curId='',_sel=new Set(),_theme='dark';

// ── 유틸 ──
function isAdmin(u){if(!u)return false;const id=String(u.id||'').toLowerCase(),em=String(u.email||'').toLowerCase();return ADMINS.some(a=>a.toLowerCase()===id||a.toLowerCase()===em)||id==='admin'||String(u.role)==='admin';}
function getSession(){try{const s=JSON.parse(localStorage.getItem(SK)||'null');if(s&&s.user)return s.user;}catch(e){}return null;}
function saveSession(u){localStorage.setItem(SK,JSON.stringify({id:u.id,user:u,savedAt:-1}));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'';const dt=new Date(d);return dt.toLocaleDateString('ko-KR')+' '+dt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function fmtSize(s){if(!s)return'';const n=Number(s);if(n<1024)return n+'B';if(n<1048576)return(n/1024).toFixed(1)+'KB';return(n/1048576).toFixed(1)+'MB';}
function getIcon(f){if(f.isFolder)return'📁';const n=String(f.name||'');if(n.endsWith('.json'))return'📋';if(n.endsWith('.html'))return'🌐';if(n.endsWith('.js'))return'⚡';if(n.endsWith('.pdf'))return'📄';if(/\.(png|jpg|jpeg|gif|webp)$/.test(n))return'🖼';if(/\.(xlsx|csv|xls)$/.test(n))return'📊';if(/\.(mp4|mov|avi)$/.test(n))return'🎬';if(/\.zip$/.test(n))return'🗜️';if(/\.(tar|gz|7z|rar)$/.test(n))return'📦';return'📃';}
// 폴더는 무채색 SVG로(쨍한 노란 이모지 대신). fill=currentColor → .file-icon 의 var(--icon) 회색 상속.
function folderIconSVG(){return '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>';}
// 아이콘 렌더: 폴더=SVG, 파일=기존 이모지(채도는 CSS filter 로 낮춤)
function iconHTML(f){return f.isFolder?folderIconSVG():esc(getIcon(f));}
// 테마 토글 아이콘: 가는 라인 SVG(차분한 회색). dark=해(라이트 전환), light=달(다크 전환)
function themeIconSVG(theme){
  if(theme==='dark'){
    return '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v2M12 19.5v2M4.6 4.6l1.4 1.4M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4l1.4-1.4M18 6l1.4-1.4"/></svg>';
  }
  return '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/></svg>';
}
function setThemeIcon(theme){var b=document.getElementById('themeBtn');if(b)b.innerHTML=themeIconSVG(theme);}
function status(t){document.getElementById('statusBar').textContent=t;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── 공통: 타임아웃 fetch · 방어적 JSON 파싱 · 에러 surface (작업 A·B·C 공유) ──
function fetchWithTimeout(url,opts,ms){
  opts=opts||{};
  var ctrl=new AbortController();
  var t=setTimeout(function(){try{ctrl.abort();}catch(_){}} ,ms||30000);
  var merged={};for(var k in opts){merged[k]=opts[k];}merged.signal=ctrl.signal;
  return fetch(url,merged).finally(function(){clearTimeout(t);});
}
// 에러 응답이 HTML/plain text여도 res.json()이 터지지 않게 방어
async function parseJsonSafe(res){
  var txt='';
  try{txt=await res.text();}catch(e){return{data:null,raw:'',parseError:true};}
  try{return{data:JSON.parse(txt),raw:txt};}
  catch(e){return{data:null,raw:txt,parseError:true};}
}
function isAbortError(e){return e&&(e.name==='AbortError'||/abort/i.test(String((e&&e.message)||'')));}

// ── 폴더 탐색 ──
async function loadFolder(folderId,name){
  status('로딩 중...');
  document.getElementById('fileList').innerHTML='<div class="empty">⏳ 로딩 중...</div>';
  clearSel();
  _curId=folderId||'';
  // folderId 없으면 루트, 있으면 해당 폴더(0download 등)
  const url='/api/drive-list'+(folderId?'?folderId='+encodeURIComponent(folderId):'');
  try{
    // 타임아웃 30초 — 응답이 없어도 멈추지 않고 에러로 전환
    const r=await fetchWithTimeout(url,{cache:'no-store'},30000);
    // 토큰 만료(401) → 재로그인 안내
    if(r.status===401){
      status('로그인이 만료됐습니다.');
      renderListError('로그인이 만료됐습니다. 다시 로그인하세요.',function(){dbLogout();});
      return;
    }
    // 응답 파싱 방어(에러 시 HTML/plain text가 와도 JSON.parse 안 터짐)
    const parsed=await parseJsonSafe(r);
    if(parsed.parseError){
      status('오류: 응답 파싱 실패 (HTTP '+r.status+')');
      renderListError('서버 응답을 해석할 수 없습니다 (HTTP '+r.status+').\n'+String(parsed.raw||'').slice(0,200),function(){loadFolder(folderId,name);});
      return;
    }
    const d=parsed.data;
    if(!r.ok||!d||!d.ok){
      // 0download 폴더 ID 해석 실패 등도 여기서 에러로 surface (빈 채/멈춘 채 방지)
      const em=(d&&(d.message||d.error))||('HTTP '+r.status);
      status('오류: '+em);
      renderListError('폴더를 불러오지 못했습니다.\n'+em,function(){loadFolder(folderId,name);});
      return;
    }
    _files=Array.isArray(d.files)?d.files:[];
    // 루트('')에서도 압축/업로드/폴더생성/붙여넣기가 동작하도록 실제 폴더 id 해석.
    // 루트는 'root' 별칭 — Drive parents[] 가 수용하므로 빈 문자열 대신 사용해 dead-end 제거.
    if(!folderId && d.folder && d.folder.id) _curId=d.folder.id;
    const cid=folderId||'ROOT';
    // 스택: 같은 위치면 중복 추가 안 함
    if(!_stack.length||_stack[_stack.length-1].id!==cid){
      _stack.push({id:cid,name:name||folderId||'내 드라이브'});
    }
    renderBreadcrumb();renderFiles();
    const cur=_stack[_stack.length-1];
    status(((cur&&cur.name)||'내 드라이브')+' — '+_files.length+'개 항목');
  }catch(e){
    if(isAbortError(e)){
      status('오류: 시간 초과(30초)');
      renderListError('응답이 30초 내에 오지 않았습니다. 네트워크를 확인하고 재시도하세요.',function(){loadFolder(folderId,name);});
    }else{
      status('오류: '+e.message);
      renderListError('폴더 로딩 오류: '+e.message,function(){loadFolder(folderId,name);});
    }
  }
}

// ── 브레드크럼 + 경로복사 ──
function getPathText(){
  return _stack.map(function(s){return s.name;}).join(' > ');
}
function copyPath(){
  const path=getPathText();
  navigator.clipboard.writeText(path).then(function(){
    status('📋 경로 복사됨: '+path);
  }).catch(function(){
    // fallback
    const el=document.createElement('textarea');
    el.value=path;document.body.appendChild(el);el.select();
    document.execCommand('copy');document.body.removeChild(el);
    status('📋 경로 복사됨: '+path);
  });
}
function renderBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  const segs=_stack.map(function(s,i){
    return '<span class="bc-seg" onclick="gotoStack('+i+')">'+esc(s.name)+'</span>'+(i<_stack.length-1?'<span class="bc-sep">›</span>':'');
  }).join('');
  bc.innerHTML=segs+'<button class="bc-copy" onclick="copyPath()" title="경로 복사">경로복사</button>';
  document.getElementById('upBtn').disabled=_stack.length<=1;
}

// ── 스택 이동 ──
function gotoStack(idx){
  // idx 위치까지 자르고 해당 폴더로 이동
  _stack=_stack.slice(0,idx);
  const s=_stack.length>0?_stack[_stack.length-1]:{id:'ROOT',name:'내 드라이브'};
  _stack=_stack.slice(0,_stack.length>0?_stack.length-1:0);
  loadFolder(s.id==='ROOT'?'':s.id,s.name);
}

// ── 상위 이동 ──
function goUp(){
  if(_stack.length<=1)return;
  _stack.pop(); // 현재 폴더 제거
  const prev=_stack.pop(); // 이전 폴더
  loadFolder(prev.id==='ROOT'?'':prev.id,prev.name);
}

// ── 새로고침 ──
function refresh(){
  if(!_stack.length)return;
  const cur=_stack[_stack.length-1];
  _stack.pop();
  loadFolder(cur.id==='ROOT'?'':cur.id,cur.name);
}

// ── 파일 렌더 ──
function renderFiles(){
  const q=(document.getElementById('filterIn').value||'').toLowerCase();
  let list=Array.isArray(_files)?_files.filter(f=>!q||String(f.name||'').toLowerCase().includes(q)):[];
  list=list.slice().sort(function(a,b){
    if(a.isFolder!==b.isFolder)return a.isFolder?-1:1;
    return String(a.name||'').localeCompare(String(b.name||''));
  });
  const el=document.getElementById('fileList');
  el.innerHTML='';
  if(!list.length){el.innerHTML='<div class="empty">📭 항목이 없습니다.</div>';return;}
  list.forEach(function(f){
    const row=document.createElement('div');
    row.className='file-row'+(_sel.has(f.id)?' sel':'');
    row.id='row_'+f.id;

    // 체크박스
    const chk=document.createElement('input');
    chk.type='checkbox';chk.className='file-chk';
    chk.checked=_sel.has(f.id);
    chk.onclick=function(e){e.stopPropagation();toggleSel(f.id);};
    row.appendChild(chk);

    // 아이콘
    const icon=document.createElement('div');
    icon.className='file-icon';icon.innerHTML=iconHTML(f);
    icon.onclick=function(){openItem(f.id,f.name,f.isFolder);};
    row.appendChild(icon);

    // 파일 정보
    const info=document.createElement('div');
    info.className='file-info';
    info.onclick=function(){openItem(f.id,f.name,f.isFolder);};
    const nm=document.createElement('div');nm.className='file-name';nm.textContent=f.name||'(이름없음)';
    const mt=document.createElement('div');mt.className='file-meta';
    mt.textContent=fmtDate(f.modifiedTime)+(f.size?' · '+fmtSize(f.size):'');
    info.appendChild(nm);info.appendChild(mt);
    row.appendChild(info);

    // 폴더: 하위 폴더 이동(열기) 아이콘 — 항상 표시(모바일 탭 진입 명확화)
    if(f.isFolder){
      const enter=document.createElement('button');
      enter.type='button';enter.className='enter-folder';enter.textContent='›';
      enter.title='폴더 열기';enter.setAttribute('aria-label','폴더 열기');
      enter.onclick=function(e){e.stopPropagation();loadFolder(f.id,f.name);};
      row.appendChild(enter);
    }

    // 액션 버튼
    const acts=document.createElement('div');acts.className='file-acts';

    // ZIP 압축풀기 버튼
    if(String(f.name||'').toLowerCase().endsWith('.zip')){
      const uzBtn=document.createElement('button');
      uzBtn.className='act';uzBtn.textContent='🗜️ 풀기';uzBtn.title='압축 풀기';
      uzBtn.onclick=function(e){e.stopPropagation();unzipItem(f.id,f.name);};
      acts.appendChild(uzBtn);
    }

    // 다운로드 버튼 (폴더 제외, 모든 파일)
    if(!f.isFolder){
      const dlBtn=document.createElement('button');
      dlBtn.className='act';dlBtn.textContent='⬇';dlBtn.title='다운로드';
      dlBtn.onclick=function(e){e.stopPropagation();downloadFile(f.id,f.name);};
      acts.appendChild(dlBtn);
    }

    // 이름 변경 버튼
    const rnBtn=document.createElement('button');
    rnBtn.className='act';rnBtn.textContent='✏️';
    rnBtn.onclick=function(e){e.stopPropagation();renameItem(f.id,f.name);};
    acts.appendChild(rnBtn);

    // 삭제 버튼
    const delBtn=document.createElement('button');
    delBtn.className='act del';delBtn.textContent='🗑';
    delBtn.onclick=function(e){e.stopPropagation();deleteItem(f.id,f.name);};
    acts.appendChild(delBtn);

    row.appendChild(acts);
    // 우클릭 컨텍스트 메뉴

      e.preventDefault();
      showCtxMenu(e.clientX, e.clientY, f);
    });
    el.appendChild(row);
  });
}

function openItem(id,name,isFolder){
  if(isFolder){loadFolder(id,name);return;}
  // 파일 - 미리보기/다운로드 모달
  const f=_files.find(function(x){return x.id===id;});
  openFilePreview(f||{id:id,name:name});
}

// 미리보기 콘텐츠는 서버 OAuth(/api/download)로 인증 fetch → blob → objectURL.
// 공개 공유가 안 된 비공개 Drive 파일도 표시됨(과거 drive.google.com 공개 URL은 비공개 파일에서 실패→빈 화면).
var _fpObjUrl=null;
function _fpRevoke(){if(_fpObjUrl){try{URL.revokeObjectURL(_fpObjUrl);}catch(_){}_fpObjUrl=null;}}
function _fpError(body,msg,name,id){
  body.innerHTML='';
  var w=document.createElement('div');w.style.cssText='padding:30px;text-align:center;color:var(--text2)';
  var m=document.createElement('div');
  m.style.cssText='color:var(--danger);margin-bottom:14px;white-space:pre-wrap;word-break:break-word';
  m.textContent=msg;
  var b=document.createElement('button');b.className='btn';b.textContent='⬇ 다운로드';
  b.onclick=function(){downloadFile(id,name);};
  w.appendChild(m);w.appendChild(b);body.appendChild(w);
}
async function openFilePreview(f){
  const name=f.name||'파일';
  const id=f.id;
  const lower=name.toLowerCase();
  const mime=String(f.mimeType||'').toLowerCase();
  // mimeType 우선, 누락/오류 시 확장자로 폴백
  const isImg=/^image\//.test(mime)||/\.(png|jpg|jpeg|gif|webp|bmp|svg)$/.test(lower);
  const isPdf=mime==='application/pdf'||/\.pdf$/.test(lower);
  const isVid=/^video\//.test(mime)||/\.(mp4|webm|mov|m4v)$/.test(lower);
  const isAudio=/^audio\//.test(mime)||/\.(mp3|wav|ogg|m4a|aac)$/.test(lower);
  const isText=/^text\//.test(mime)||/\.(txt|json|js|css|html|md|csv|xml|log|yml|yaml)$/.test(lower);
  const contentUrl='/api/download?fileId='+encodeURIComponent(id);
  const driveView=f.link||('https://drive.google.com/file/d/'+id+'/view');

  const modal=document.getElementById('filePreviewModal');
  const body=document.getElementById('fpBody');
  document.getElementById('fpTitle').textContent=name;
  // 다운로드는 same-origin 인증 스트리밍(/api/download) 재사용
  document.getElementById('fpDownload').onclick=function(){downloadFile(id,name);};
  document.getElementById('fpOpen').onclick=function(){window.open(driveView,'_blank');};
  document.getElementById('fpCopyName').onclick=function(){navigator.clipboard.writeText(name).catch(function(){});status('📋 복사됨: '+name);};
  modal.style.display='flex';

  _fpRevoke();
  body.innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">⏳ 불러오는 중...</div>';

  const previewable=isImg||isPdf||isVid||isAudio||isText;
  if(!previewable){
    body.innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)"><div style="font-size:3rem;margin-bottom:10px">'+esc(getIcon(f))+'</div><div>미리보기를 지원하지 않는 형식입니다.</div><div style="margin-top:8px;font-size:.8rem">아래 다운로드 버튼을 사용하세요.</div></div>';
    return;
  }

  try{
    const r=await fetchWithTimeout(contentUrl,{cache:'no-store'},45000);
    if(r.status===401){_fpError(body,'로그인이 만료됐습니다. 다시 로그인 후 시도하세요.',name,id);return;}
    if(!r.ok){
      // 에러 본문이 JSON이면 메시지 추출(빈 화면 대신 사유 표시)
      let em='HTTP '+r.status;
      try{const t=await r.clone().text();const j=JSON.parse(t);em=j.error||j.message||em;}catch(_){}
      _fpError(body,'미리보기를 불러오지 못했습니다 ('+em+').',name,id);
      return;
    }
    const blob=await r.blob();
    if(isText){
      const txt=await blob.text();
      body.innerHTML='';
      const pre=document.createElement('pre');
      pre.style.cssText='white-space:pre-wrap;word-break:break-word;font-size:.8rem;color:var(--text);max-height:62vh;overflow:auto;margin:0';
      pre.textContent=txt.slice(0,200000);
      body.appendChild(pre);
      return;
    }
    _fpRevoke();
    _fpObjUrl=URL.createObjectURL(blob);
    body.innerHTML='';
    if(isImg){
      const img=document.createElement('img');img.src=_fpObjUrl;
      img.style.cssText='max-width:100%;max-height:62vh;border-radius:10px;display:block;margin:0 auto';
      img.onerror=function(){_fpError(body,'이미지를 표시할 수 없습니다.',name,id);};
      body.appendChild(img);
    } else if(isPdf){
      const fr=document.createElement('iframe');fr.src=_fpObjUrl;
      fr.style.cssText='width:100%;height:62vh;border:0;border-radius:10px';
      body.appendChild(fr);
    } else if(isVid){
      const v=document.createElement('video');v.src=_fpObjUrl;v.controls=true;
      v.style.cssText='max-width:100%;max-height:62vh;border-radius:10px;display:block;margin:0 auto';
      body.appendChild(v);
    } else if(isAudio){
      const a=document.createElement('audio');a.src=_fpObjUrl;a.controls=true;a.style.cssText='width:100%';
      body.appendChild(a);
    }
  }catch(e){
    _fpError(body,isAbortError(e)?'시간 초과로 미리보기를 불러오지 못했습니다.':('오류: '+((e&&e.message)||e)),name,id);
  }
}

// ── 파일 다운로드 (서버가 attachment 스트리밍 → same-origin 앵커 클릭) ──
function downloadFile(fileId, name){

// ── zip 파일명 한글(CP949) 깨짐 처리 (브라우저 네이티브, 의존성 0) ──
// 서버 unzip이 복구하지만, 클라이언트에서 이름을 다룰 경우를 대비해 동일 로직 제공.
var __ZN_HANGUL = /[가-힣㄰-㆏]/;
var __ZN_HIGH = /[\x80-\xFF]/;
function decodeZipName(rawBytes, isUtf8Flag){
  var u8 = rawBytes instanceof Uint8Array ? rawBytes : Uint8Array.from(rawBytes);
  if(isUtf8Flag) return new TextDecoder('utf-8').decode(u8);
  try{
    var asUtf8 = new TextDecoder('utf-8', {fatal:true}).decode(u8);
    if(__ZN_HANGUL.test(asUtf8) || !__ZN_HIGH.test(asUtf8)) return asUtf8;
  }catch(_){}
  try{ return new TextDecoder('euc-kr').decode(u8); }catch(_){ return new TextDecoder('utf-8').decode(u8); }
}
function repairMojibakeName(name){
  var s = String(name||'');
  if(__ZN_HANGUL.test(s)) return s;
  if(!__ZN_HIGH.test(s)) return s;
  var bytes = Uint8Array.from(s, function(c){ return c.charCodeAt(0) & 0xff; });
  var fixed;
  try{ fixed = new TextDecoder('euc-kr').decode(bytes); }catch(_){ return s; }
  return __ZN_HANGUL.test(fixed) ? fixed : s;
}
function repairMojibakePath(path){
  return String(path||'').split('/').map(repairMojibakeName).join('/');
}

// ── 압축 풀기 ──
async function unzipItem(fileId, name){
  if(!_curId){alert('폴더 안에서 실행하세요.');return;}
  if(!confirm('"'+name+'" 압축을 현재 폴더에 풀겠습니까?'))return;
  status('🗜️ 압축 해제 중... 잠시 기다려주세요');
  const ov=document.getElementById('upoverlay'),pr=document.getElementById('upProgress');
  ov.classList.add('on');
  pr.textContent='ZIP 파일 다운로드 및 압축 해제 중...';
  try{
    const r=await fetch('/api/drive-manage?action=unzip',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fileId, parentId:_curId})
    });
    const d=await r.json();
    ov.classList.remove('on');
    if(d.ok){
      const errMsg=d.errors&&d.errors.length?' (오류 '+d.errors.length+'개)':'';
      status('✅ 압축 해제 완료: '+d.uploaded+'/'+(d.total||d.uploaded)+'개 파일'+errMsg);
      refresh();
    } else {
      status('❌ 압축 해제 실패: '+(d.error||d.message));
      alert('압축 해제 실패: '+(d.error||d.message));
    }
  }catch(e){
    ov.classList.remove('on');
    status('❌ 오류: '+e.message);
    alert('오류: '+e.message);
  }
}

// ── 선택 항목 다운로드 (단일 파일=바로, 여러 개·폴더 포함=ZIP으로 묶어 받기) ──
async function downloadSelected(){
  const items=(Array.isArray(_files)?_files:[]).filter(function(f){return _sel.has(f.id);});
  if(!items.length){status('⬇ 먼저 다운로드할 항목을 선택하세요. (전체선택 또는 체크박스)');return;}
  const onlyFiles=items.filter(function(f){return !f.isFolder;});
  // 단일 파일이면 곧바로 다운로드
  if(items.length===1 && onlyFiles.length===1){
    downloadFile(onlyFiles[0].id, onlyFiles[0].name);
    status('⬇ 다운로드: '+onlyFiles[0].name);
    return;
  }
  // 여러 개거나 폴더 포함 → 서버에서 ZIP으로 묶어 다운로드(브라우저 다중 다운로드 차단 회피)
  // ZIP은 현재 폴더에 저장된 뒤 다운로드된다(저장본이 남음) — 문구로 명시.
  if(!confirm(items.length+'개 항목을 ZIP으로 묶어 현재 폴더에 저장 후 다운로드합니다. 진행할까요?'))return;
  await zipSelected(items, true);
}

function compressItem(f){

}

// 공통: 항목 배열을 서버 zip 액션으로 압축. downloadAfter=true면 생성된 zip을 즉시 다운로드.
async function zipSelected(items, downloadAfter){
  if(!items||!items.length)return;
  if(!_curId){alert('폴더 안에서 실행하세요.');return;}
  const ids=items.map(function(f){return f.id;});
  // 단일 항목이면 그 이름을 기본 zip명으로(확장자 제거), 여러 개면 서버가 타임스탬프명 사용
  const baseName=(items.length===1)?String(items[0].name||'').replace(/\.[^.]+$/,''):'';
  const ov=document.getElementById('upoverlay'),pr=document.getElementById('upProgress');
  ov.classList.add('on');
  pr.textContent='🗜️ 압축 중... ('+ids.length+'개 항목) 파일이 많으면 시간이 걸릴 수 있습니다.';
  status('🗜️ 압축 중...');
  try{
    const r=await fetchWithTimeout('/api/drive-manage?action=zip',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fileIds:ids, parentId:_curId, zipName:baseName})
    },300000); // 5분 — 대용량/다수 파일 대비
    const parsed=await parseJsonSafe(r);
    const d=parsed.data;
    ov.classList.remove('on');
    if(!r.ok||!d||!d.ok){
      const em=(d&&(d.error||d.message))||(parsed.parseError?('응답 파싱 실패 HTTP '+r.status):('HTTP '+r.status));
      status('❌ 압축 실패: '+em);alert('압축 실패: '+em);return;
    }
    const extra=(d.errors&&d.errors.length?' (제외 '+d.errors.length+'개)':'')+(d.truncated?' ⚠️ 개수·용량 한도 초과분 제외':'');
    status('✅ 압축 완료: '+d.file.name+' — '+(d.added||0)+'개 파일'+extra);
    clearSel();
    if(downloadAfter && d.file && d.file.id){ downloadFile(d.file.id, d.file.name); }
    refresh();
  }catch(e){
    ov.classList.remove('on');
    const msg=isAbortError(e)?'시간 초과(5분) — 항목이 너무 많거나 큽니다.':((e&&e.message)||e);
    status('❌ 압축 오류: '+msg);alert('압축 오류: '+msg);
  }
}

// ── 파일 업로드 (Resumable — 브라우저→Drive 직접, Vercel 미경유 = 용량 무제한) ──
// 세션 URI 진행 위치 조회: Content-Range: bytes */total → 308이면 수신 바이트, 200/201이면 이미 완료
async function queryResumeOffset(uploadUrl,total){
  const r=await fetchWithTimeout(uploadUrl,{method:'PUT',headers:{'Content-Range':'bytes */'+total}},60000);
  if(r.status===200||r.status===201){const fin=await parseJsonSafe(r);return{done:true,fileId:(fin.data&&fin.data.id)||null};}
  if(r.status===308){
    const range=r.headers.get('Range');
    if(range){const m=/-(\d+)\s*$/.exec(range);if(m)return{done:false,offset:parseInt(m[1],10)+1};}
    return{done:false,offset:0};
  }
  return{done:false,offset:null,status:r.status};
}
// 단일 파일 resumable 업로드. 청크 256KB 배수, 308=중간성공, 200/201=완료, 청크당 3회 재시도.
async function uploadResumable(uploadUrl,file,onProgress){
  const CHUNK=5*1024*1024; // 5MB = 256KB(262144)의 정수배 — Drive 요건 충족(마지막 청크 제외 256KB 배수)
  const total=file.size;
  let offset=0;
  if(total===0){
    // 0바이트 파일: 빈 본문 단일 PUT로 마무리
    const r=await fetchWithTimeout(uploadUrl,{method:'PUT',headers:{'Content-Range':'bytes 0-0/0'},body:new Blob([])},60000).catch(function(){return null;});
    if(r&&(r.status===200||r.status===201)){const fin=await parseJsonSafe(r);return{ok:true,fileId:(fin.data&&fin.data.id)||null};}
    return{ok:true,fileId:null};
  }
  while(offset<total){
    const end=Math.min(offset+CHUNK,total);
    const chunk=file.slice(offset,end); // Blob 슬라이스 — 전체를 메모리에 안 올림(대용량 OOM 방지)
    if(onProgress)onProgress(Math.round(end/total*100),end,total);
    let advanced=false,lastErr=null;
    for(let attempt=1;attempt<=3&&!advanced;attempt++){
      try{
        const res=await fetchWithTimeout(uploadUrl,{
          method:'PUT',
          headers:{'Content-Range':'bytes '+offset+'-'+(end-1)+'/'+total},
          body:chunk
        },120000);
        if(res.status===200||res.status===201){
          const fin=await parseJsonSafe(res);
          return{ok:true,fileId:(fin.data&&fin.data.id)||null}; // 마지막 청크만 완료 처리
        }
        if(res.status===308){
          // 중간 청크 성공(Resume Incomplete) — 실패로 보지 말 것(여기서 멈추면 파일이 잘림)
          const range=res.headers.get('Range');
          let next=end;
          if(range){const m=/-(\d+)\s*$/.exec(range);if(m)next=parseInt(m[1],10)+1;}
          offset=next;advanced=true;break;
        }
        // 그 외 상태 → 재시도 대상. 실패 청크 번호+status+Drive 본문 표면화
        const bodyTxt=await res.text();
        lastErr=new Error('청크 실패 HTTP '+res.status+' (offset '+offset+'): '+String(bodyTxt).slice(0,160));
      }catch(e){
        lastErr=isAbortError(e)?new Error('청크 시간초과 (offset '+offset+')'):e;
      }
      // 재시도 전: 세션에 수신된 바이트를 재확인하고 그 지점부터 이어서
      if(!advanced&&attempt<3){
        await sleep(800*attempt);
        try{
          const q=await queryResumeOffset(uploadUrl,total);
          if(q.done)return{ok:true,fileId:q.fileId};
          if(q.offset!=null)offset=q.offset;
        }catch(_){}
      }
    }
    if(!advanced)return{ok:false,error:(lastErr&&lastErr.message)||'청크 업로드 실패'};
  }
  return{ok:true,fileId:null};
}
async function uploadFiles(fileList){
  if(!fileList||!fileList.length)return;
  if(!_curId){alert('업로드할 폴더 안으로 이동하세요.');return;}
  const ov=document.getElementById('upoverlay'),pr=document.getElementById('upProgress');
  ov.classList.add('on');
  let ok=0;
  for(let i=0;i<fileList.length;i++){
    const file=fileList[i];
    const label='('+(i+1)+'/'+fileList.length+') '+file.name;
    try{
      pr.textContent=label+' — 세션 준비 중...';
      const mt=file.type||'application/octet-stream';

      // 1) 서버는 세션만 개시(메타데이터 POST) → Location 세션 URI 반환
      const sessRes=await fetchWithTimeout('/api/drive-manage?action=upload-session',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({parentId:_curId,fileName:file.name,mimeType:mt,fileSize:file.size})
      },30000);
      const sp=await parseJsonSafe(sessRes);
      const sessData=sp.data;
      if(!sessRes.ok||!sessData||!sessData.ok||!sessData.uploadUrl){
        const em=(sessData&&(sessData.error||sessData.message))||(sp.parseError?('응답 파싱 실패 HTTP '+sessRes.status):('HTTP '+sessRes.status));
        pr.textContent='❌ '+file.name+': 세션 발급 실패 — '+em;
        await sleep(1800);continue;
      }

      // 2) 세션 URI로 브라우저가 청크를 Drive에 직접 PUT (재시도/재개 포함)
      const r=await uploadResumable(sessData.uploadUrl,file,function(pct,end,tot){
        pr.textContent=label+' — '+pct+'% ('+fmtSize(end)+'/'+fmtSize(tot)+')';
      });
      if(r.ok){ok++;pr.textContent='✅ '+file.name+' 완료';}
      else{pr.textContent='❌ '+file.name+': '+r.error;await sleep(2400);} // 무음 부분파일 금지 — 사유 표시
    }catch(e){
      pr.textContent='❌ '+file.name+': '+((e&&e.message)||e);
      await sleep(1800);
    }
  }
  ov.classList.remove('on');
  document.getElementById('fileUploadIn').value='';
  status('⬆ 업로드 완료: '+ok+'/'+fileList.length+'개');
  refresh(); // 완료 후 목록 새로고침
}

var _ctxTarget = null;

function showCtxMenu(x, y, file){
  _ctxTarget = file;
  var menu = document.getElementById('ctxMenu');
  // ZIP 풀기 버튼 표시/숨김
  var uzEl = document.getElementById('ctxUnzip');
  if(uzEl) uzEl.style.display = String(file.name||'').toLowerCase().endsWith('.zip') ? '' : 'none';
  menu.classList.add('on');
  // 화면 밖으로 나가지 않게
  var mw = menu.offsetWidth, mh = menu.offsetHeight;
  if(x + mw > window.innerWidth) x = window.innerWidth - mw - 8;
  if(y + mh > window.innerHeight) y = window.innerHeight - mh - 8;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

function hideCtxMenu(){
  document.getElementById('ctxMenu').classList.remove('on');
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.ctx-menu')) hideCtxMenu();
});
document.addEventListener('contextmenu', function(e){
  if(!e.target.closest('.file-row') && !e.target.closest('.ctx-menu')){
    hideCtxMenu();
  }
});

function ctxAction(action){
  hideCtxMenu();
  if(!_ctxTarget) return;
  var f = _ctxTarget;
  switch(action){
    case 'open':
      openItem(f.id, f.name, f.isFolder);
      break;
    case 'copy':
      setClipboard('copy', f);
      break;
    case 'cut':
      setClipboard('cut', f);
      break;
    case 'moveTo':
      openPicker('move', [f]);
      break;
    case 'copyTo':
      openPicker('copy', [f]);
      break;
    case 'rename':
      renameItem(f.id, f.name);
      break;
    case 'delete':
      deleteItem(f.id, f.name);
      break;
    case 'unzip':
      unzipItem(f.id, f.name);
      break;
    case 'zip':
      compressItem(f);
      break;
  }
}

// 클립보드 (복사/잘라내기 → 붙여넣기)
// ════════════════════════════════
var _clipboard = null; // {mode:'copy'|'cut', files:[...]}

function setClipboard(mode, file){
  _clipboard = { mode: mode, files: [file], fromFolderId: _curId };
  updateClipBar();
  status((mode==='copy'?'📋 복사됨':'✂️ 잘라내기') + ': ' + file.name);
}

function updateClipBar(){
  var bar = document.getElementById('clipBar');
  var info = document.getElementById('clipInfo');
  if(_clipboard && _clipboard.files.length){
    bar.classList.add('on');
    var icon = _clipboard.mode === 'copy' ? '📋' : '✂️';
    info.textContent = icon + ' ' + _clipboard.files[0].name + (_clipboard.files.length > 1 ? ' 외 ' + (_clipboard.files.length-1) + '개' : '');
  } else {
    bar.classList.remove('on');
  }
}

function clearClipboard(){
  _clipboard = null;
  updateClipBar();
}

async function pasteClipboard(){
  if(!_clipboard || !_clipboard.files.length){alert('복사/잘라내기한 파일이 없습니다.');return;}
  if(!_curId){alert('붙여넣을 폴더 안으로 이동하세요.');return;}
  var mode = _clipboard.mode;
  var files = _clipboard.files;
  var fromId = _clipboard.fromFolderId;
  var okCount = 0;
  for(var i = 0; i < files.length; i++){
    try{
      if(mode === 'copy'){
        var r = await fetch('/api/drive-manage?action=copy', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({fileId: files[i].id, targetParentId: _curId})
        });
        var d = await r.json();
        if(d.ok) okCount++;
        else status('❌ 복사 실패: ' + (d.error||d.message));
      } else {
        // cut = move
        var r2 = await fetch('/api/drive-manage?action=move', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({fileId: files[i].id, newParentId: _curId, oldParentId: fromId})
        });
        var d2 = await r2.json();
        if(d2.ok) okCount++;
        else status('❌ 이동 실패: ' + (d2.error||d2.message));
      }
    }catch(e){ status('❌ 오류: ' + e.message); }
  }
  var label = mode === 'copy' ? '복사' : '이동';
  status('✅ ' + label + ' 완료: ' + okCount + '/' + files.length + '개');
  if(mode === 'cut') clearClipboard();
  refresh();
}

// ════════════════════════════════
var _picker = {
  mode: 'move', // 'move' | 'copy'
  files: [],
  stack: [{id:'', name:'내 드라이브'}],
  folders: [],
  selectedId: null
};

function openPicker(mode, files){
  _picker.mode = mode;
  _picker.files = files;
  _picker.stack = [{id:'', name:'내 드라이브'}];
  _picker.selectedId = null;
  document.getElementById('pickerTitle').textContent = (mode==='move'?'📁 이동할':'📁 복사할') + ' 폴더 선택';
  document.getElementById('pickerBg').classList.add('on');
  loadPickerFolder('');
}

function closePicker(){
  document.getElementById('pickerBg').classList.remove('on');
}

async function loadPickerFolder(folderId){
  var el = document.getElementById('pickerList');
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">로딩...</div>';
  _picker.selectedId = folderId || null;
  // 경로 표시
  document.getElementById('pickerPath').textContent = _picker.stack.map(function(s){return s.name;}).join(' › ');
  try{
    var url = '/api/drive-list' + (folderId ? '?folderId=' + encodeURIComponent(folderId) : '');
    var r = await fetch(url, {cache:'no-store'});
    var d = await r.json();
    if(!d.ok){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--danger)">오류</div>';return;}
    var folders = (d.files||[]).filter(function(f){return f.isFolder;}).sort(function(a,b){return String(a.name||'').localeCompare(String(b.name||''));});
    _picker.folders = folders;
    if(!folders.length){
      el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">하위 폴더가 없습니다</div>';
      return;
    }
    el.innerHTML = folders.map(function(f){
      var fid=f.id.replace(/'/g,"\'");
      var fn=esc(f.name).replace(/'/g,"\'");
      return '<div class="pk-row" ondblclick="pickerEnter(\'' + fid + '\',\'' + fn + '\')" onclick="pickerSelect(\'' + fid + '\',this)"><div class="pk-icon">📁</div><div class="pk-name">' + esc(f.name) + '</div></div>';
    }).join('');
  }catch(e){
    el.innerHTML='<div style="padding:20px;text-align:center;color:var(--danger)">'+e.message+'</div>';
  }
}

function pickerSelect(id, el){
  _picker.selectedId = id;
  document.querySelectorAll('.pk-row').forEach(function(r){r.classList.remove('sel');});
  if(el) el.classList.add('sel');
}

function pickerEnter(id, name){
  _picker.stack.push({id:id, name:name});
  _picker.selectedId = id;
  loadPickerFolder(id);
}

function pickerGoUp(){
  if(_picker.stack.length <= 1) return;
  _picker.stack.pop();
  var prev = _picker.stack[_picker.stack.length - 1];
  loadPickerFolder(prev.id);
}

function pickerSelectCurrent(){
  // 현재 보고 있는 폴더를 대상으로 선택
  var cur = _picker.stack[_picker.stack.length - 1];
  _picker.selectedId = cur.id;
  pickerConfirm();
}

async function pickerConfirm(){
  var targetId = _picker.selectedId;
  if(!targetId && _picker.stack.length > 0){
    targetId = _picker.stack[_picker.stack.length-1].id;
  }
  if(!targetId){alert('폴더를 선택하세요.');return;}
  closePicker();
  var mode = _picker.mode;
  var files = _picker.files;
  var okCount = 0;
  status((mode==='move'?'📁 이동':'📋 복사') + ' 중...');
  for(var i = 0; i < files.length; i++){
    try{
      if(mode === 'copy'){
        var r = await fetch('/api/drive-manage?action=copy', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({fileId: files[i].id, targetParentId: targetId})
        });
        if((await r.json()).ok) okCount++;
      } else {
        var r2 = await fetch('/api/drive-manage?action=move', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({fileId: files[i].id, newParentId: targetId, oldParentId: _curId})
        });
        if((await r2.json()).ok) okCount++;
      }
    }catch(e){}
  }
  status('✅ ' + (mode==='move'?'이동':'복사') + ' 완료: ' + okCount + '/' + files.length + '개');
  clearSel();
  refresh();
}


// ── 드래그&드롭 업로드 ──
(function(){
  const body = document.body;
  let _dragCount = 0;

  // 전체 화면 드래그 진입
  body.addEventListener('dragenter', function(e){
    if(!e.dataTransfer.types.includes('Files')) return;
    e.preventDefault();
    _dragCount++;
    document.getElementById('dropHint').classList.add('on');
  });

  body.addEventListener('dragleave', function(e){
    _dragCount--;
    if(_dragCount <= 0){
      _dragCount = 0;
      document.getElementById('dropHint').classList.remove('on');
    }
  });

  body.addEventListener('dragover', function(e){
    if(!e.dataTransfer.types.includes('Files')) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });

  body.addEventListener('drop', function(e){
    e.preventDefault();
    _dragCount = 0;
    document.getElementById('dropHint').classList.remove('on');
    document.getElementById('fileList').classList.remove('drag-over');

    const files = e.dataTransfer.files;
    if(!files || !files.length) return;

    if(!_curId){
      alert('폴더 안으로 이동 후 드래그하세요.');
      return;
    }
    uploadFiles(files);
  });

  // 파일 목록 영역 호버 강조
  document.addEventListener('dragover', function(e){
    const fl = document.getElementById('fileList');
    if(fl) fl.classList.add('drag-over');
  });
  document.addEventListener('dragleave', function(e){
    if(e.relatedTarget === null){
      const fl = document.getElementById('fileList');
      if(fl) fl.classList.remove('drag-over');
    }
  });
})();

window.onload=function(){
  const u=getSession();
  if(u&&isAdmin(u)){enterApp(u);}
};
</script>

  <div class="picker">
    <div class="picker-head"><span id="pickerTitle">📁 폴더 선택</span><button class="btn" onclick="pickerGoUp()" style="font-size:.78rem;padding:4px 10px">⬆ 상위</button></div>
    <div class="picker-path" id="pickerPath">내 드라이브</div>
    <div class="picker-list" id="pickerList"></div>
    <div class="picker-foot">
      <button onclick="pickerSelectCurrent()">📌 현재 폴더 선택</button>
      <button onclick="closePicker()">취소</button>
      <button class="pri" onclick="pickerConfirm()">확인</button>
    </div>
  </div>
</div>
