<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella DB</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#fff;color:#111827;margin:0;padding:18px}h1{font-size:24px}.card{border:1px solid #e5e7eb;border-radius:18px;padding:14px;margin:12px 0;background:#fff;box-shadow:0 8px 26px rgba(15,23,42,.05)}input,button,select,textarea{font:inherit}input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:12px;margin:6px 0}button{border:1px solid #d1d5db;background:#fff;border-radius:12px;padding:10px 12px;font-weight:800}.primary{background:#0f172a;color:#fff}.muted{color:#6b7280;font-size:13px}.file{border-top:1px solid #f1f5f9;padding:10px 0}.row{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none}.danger{color:#b91c1c}.pill{display:inline-block;padding:4px 8px;border:1px solid #e5e7eb;border-radius:999px;font-size:12px;color:#64748b}</style>
</head>
<body>
<h1>Stella DB</h1>
<p class="muted">Google Drive가 막힌 곳에서도 Stella API를 통해 DB 자료를 조회하는 개인용 화면입니다.</p>
<div id="gate" class="card">
  <b>접근 확인</b>
  <input id="who" placeholder="김경훈 / 이후 / 소설가 이후 / yesblue0342 / yesblue0342@naver.com">
  <button class="primary" onclick="enter()">DB 접속</button>
  <p class="muted">허용 사용자만 화면을 열 수 있습니다. 서버 권한 검증은 API 고도화 시 추가됩니다.</p>
</div>
<div id="app" class="hidden">
  <div class="card">
    <b>DB 검색</b>
    <input id="q" placeholder="예: SAP QA11, ChatGPT, Claude, ABAP">
    <div class="row"><button class="primary" onclick="searchDb()">검색</button><button onclick="location.href='/'">Stella GPT로 돌아가기</button></div>
  </div>
  <div class="card">
    <b>개인비서 메모 저장</b>
    <input id="memoTitle" placeholder="제목">
    <select id="memoType"><option value="memo">메모</option><option value="todo">할 일</option><option value="schedule">일정</option><option value="report">보고서</option></select>
    <textarea id="memoContent" rows="5" placeholder="내용"></textarea>
    <button onclick="saveMemo()">AssistantMemory 저장</button>
  </div>
  <div class="card"><b>결과</b><div id="out" class="muted">검색 대기 중</div></div>
</div>
<script>
const ALLOW=['김경훈','KH','이후','소설가 이후','yesblue0342','yesblue0342@naver.com','yesblue0342@gmail.com'];
function enter(){const v=document.getElementById('who').value.trim();if(!ALLOW.includes(v))return alert('허용된 사용자만 DB 메뉴를 사용할 수 있습니다.');localStorage.setItem('stella_db_user',v);gate.classList.add('hidden');app.classList.remove('hidden')}
if(ALLOW.includes(localStorage.getItem('stella_db_user')||'')){gate.classList.add('hidden');app.classList.remove('hidden')}
async function searchDb(){out.textContent='검색 중...';const q=document.getElementById('q').value.trim()||'StellaGPT DB';const r=await fetch('/api/stella?action=drive-search&q='+encodeURIComponent(q));const d=await r.json();out.innerHTML=(d.files||[]).map(f=>`<div class="file"><b>${f.name}</b><br><span class="pill">${f.mimeType||''}</span><br><span class="muted">${f.modifiedTime||''}</span><br>${f.link?`<a href="${f.link}" target="_blank">열기</a>`:''}</div>`).join('')||'결과 없음'}
async function saveMemo(){const userId=localStorage.getItem('stella_db_user')||'KH';const body={userId,type:memoType.value,title:memoTitle.value,content:memoContent.value};const r=await fetch('/api/stella?action=assistant-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();alert(d.ok?'저장 완료':'저장 실패: '+(d.error||d.message));}
</script>
</body>
</html>
