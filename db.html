<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella DB</title>
<link rel="manifest" href="/manifest-gpt.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#c9d1d9;--accent:#58a6ff;--danger:#f85149;--primary:#1f6feb}
body.light{--bg:#f6f8fa;--bg2:#fff;--bg3:#f3f4f6;--border:#d1d5db;--text:#111827;--text2:#6b7280;--text3:#374151;--accent:#1f6feb;--danger:#dc2626;--primary:#1f6feb}
body{font-family:system-ui,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;transition:background .2s,color .2s}
.top{display:flex;align-items:center;gap:6px;padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.top h1{font-size:.95rem;font-weight:900;color:var(--text)}
.btn{border:1px solid var(--border);background:var(--bg3);color:var(--text3);border-radius:9px;padding:6px 12px;cursor:pointer;font-size:.8rem;font-weight:700;white-space:nowrap;transition:background .15s}
.btn:hover{opacity:.85}.btn:active{opacity:.6}
.btn.primary{background:var(--bg3);color:var(--text);border-color:var(--border)}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn.upload-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.breadcrumb{padding:7px 12px;font-size:.78rem;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;flex-wrap:wrap;flex-shrink:0}
.bc-seg{cursor:pointer;color:var(--accent);padding:2px 4px;border-radius:5px}.bc-seg:hover{opacity:.75}
.bc-sep{color:var(--border)}
.toolbar{display:flex;gap:6px;padding:7px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;align-items:center}
.filter-in{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:6px 11px;color:var(--text);font-size:.8rem;flex:1;min-width:0}
.filter-in::placeholder{color:var(--text2)}
.sel-bar{display:none;gap:6px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;font-size:.8rem;color:var(--text2);flex-shrink:0}
.sel-bar.show{display:flex}
.status{padding:5px 12px;font-size:.73rem;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.file-list{flex:1;overflow-y:auto}
.file-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.file-row:hover{background:var(--bg2)}.file-row.sel{background:var(--bg3)}
.file-chk{width:16px;height:16px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
.file-icon{font-size:1.15rem;width:24px;text-align:center;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:.86rem;font-weight:700;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{font-size:.72rem;color:var(--text2);margin-top:1px}
.file-acts{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.file-row:hover .file-acts{opacity:1}
.act{background:var(--bg3);color:var(--text3);border:1px solid var(--border);border-radius:7px;padding:3px 8px;cursor:pointer;font-size:.72rem}
.act.del{border-color:var(--danger);color:var(--danger)}
.empty{padding:40px;text-align:center;color:var(--text2);font-size:.88rem}
/* Gate */
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.gate-card{width:min(380px,100%);background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:24px}
.gate-card h2{color:var(--text);margin-bottom:6px;font-size:1.15rem}
.gate-card p{color:var(--text2);font-size:.83rem;margin-bottom:14px}
.gate-card input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text);font-size:.9rem;margin-bottom:8px}
.gate-card input::placeholder{color:var(--text2)}
.gate-btn{width:100%;padding:11px;border-radius:10px;cursor:pointer;font-weight:800;border:1px solid var(--border);font-size:.9rem;margin-top:4px;background:var(--bg3);color:var(--text)}
.gate-btn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.err{color:var(--danger);font-size:.78rem;min-height:16px;margin-top:4px}
/* Upload overlay */
.upoverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center}
.upoverlay.on{display:flex}
.upcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;width:min(340px,90%);text-align:center}
.upcard h3{color:var(--text);margin-bottom:10px;font-size:.95rem}
.upcard p{color:var(--text2);font-size:.82rem}
/* Move modal */
.mvmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center}
.mvmodal.on{display:flex}
.mvcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:min(340px,90%)}
.mvcard h3{color:var(--text);margin-bottom:10px;font-size:.92rem}
.mvcard input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px;color:var(--text);font-size:.85rem;margin-bottom:10px}
.mvcard input::placeholder{color:var(--text2)}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <h2>🗄 Stella DB</h2>
    <p>관리자 계정으로 로그인하세요</p>
    <input id="gId" placeholder="아이디 (admin / yesblue0342)" autocomplete="username" onkeydown="if(event.key==='Enter')dbLogin()">
    <input id="gPw" type="password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')dbLogin()">
    <button class="gate-btn pri" onclick="dbLogin()">접속</button>
    <button class="gate-btn" onclick="location.href='/'">Stella GPT로 돌아가기</button>
    <div class="err" id="gErr"></div>
  </div>
</div>

<div id="appWrap" style="display:none;flex-direction:column;height:100dvh">
  <div class="top">
    <h1>🗄 Stella DB</h1>
    <span id="userLabel" style="font-size:.72rem;color:var(--text2)"></span>
    <button class="btn" onclick="goUp()" id="upBtn">⬆ 상위</button>
    <button class="btn" onclick="refresh()">↻</button>
    <button class="btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
    <button class="btn" onclick="location.href='/'">GPT</button>
    <button class="btn" onclick="dbLogout()">나가기</button>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <!-- 선택 작업 바 -->
  <div class="sel-bar" id="selBar">
    <span id="selCount">0개 선택</span>
    <button class="btn danger" onclick="deleteSelected()">🗑 삭제</button>
    <button class="btn" onclick="moveSelected()">📂 이동</button>
    <button class="btn" onclick="clearSel()">✕ 해제</button>
  </div>
  <div class="toolbar">
    <input class="filter-in" id="filterIn" placeholder="파일/폴더 필터..." oninput="renderFiles()">
    <button class="btn" onclick="mkdirPrompt()">📁＋ 폴더</button>
    <button class="btn upload-btn" onclick="document.getElementById('fileUploadIn').click()">⬆ 업로드</button>
    <input type="file" id="fileUploadIn" multiple hidden onchange="uploadFiles(this.files)">
  </div>
  <div class="status" id="statusBar">로딩 중...</div>
  <div class="file-list" id="fileList"></div>
</div>

<!-- 업로드 진행 오버레이 -->
<div class="upoverlay" id="upoverlay">
  <div class="upcard">
    <h3>⬆ 업로드 중...</h3>
    <p id="upProgress">준비 중...</p>
  </div>
</div>

<!-- 이동 모달 -->
<div class="mvmodal" id="mvmodal">
  <div class="mvcard">
    <h3>📂 폴더 이동</h3>
    <p style="color:var(--text2);font-size:.8rem;margin-bottom:10px">이동할 폴더 ID를 입력하세요 (Stella DB에서 폴더를 먼저 탐색하세요)</p>
    <input id="mvTargetId" placeholder="이동할 폴더 ID">
    <div style="display:flex;gap:6px">
      <button class="btn pri" onclick="confirmMove()" style="flex:1">이동</button>
      <button class="btn" onclick="document.getElementById('mvmodal').classList.remove('on')" style="flex:1">취소</button>
    </div>
  </div>
</div>

<script>
const SK='stella_session_final_v82';
const ADMINS=['admin','admin@stella.local','yesblue0342','yesblue0342@naver.com','yesblue0342@gmail.com','김경훈','이후'];
let _user=null,_stack=[],_files=[],_curId='',_sel=new Set(),_theme='dark';

// ── 유틸 ──
function isAdmin(u){if(!u)return false;const id=String(u.id||'').toLowerCase(),em=String(u.email||'').toLowerCase();return ADMINS.some(a=>a.toLowerCase()===id||a.toLowerCase()===em)||id==='admin'||String(u.role)==='admin';}
function getSession(){try{const s=JSON.parse(localStorage.getItem(SK)||'null');if(s&&s.user)return s.user;}catch(e){}return null;}
function saveSession(u){localStorage.setItem(SK,JSON.stringify({id:u.id,user:u,savedAt:-1}));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'';const dt=new Date(d);return dt.toLocaleDateString('ko-KR')+' '+dt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function fmtSize(s){if(!s)return'';const n=Number(s);if(n<1024)return n+'B';if(n<1048576)return(n/1024).toFixed(1)+'KB';return(n/1048576).toFixed(1)+'MB';}
function getIcon(f){if(f.isFolder)return'📁';const n=String(f.name||'');if(n.endsWith('.json'))return'📋';if(n.endsWith('.html'))return'🌐';if(n.endsWith('.js'))return'⚡';if(n.endsWith('.pdf'))return'📄';if(/\.(png|jpg|jpeg|gif|webp)$/.test(n))return'🖼';if(/\.(xlsx|csv|xls)$/.test(n))return'📊';if(/\.(mp4|mov|avi)$/.test(n))return'🎬';if(/\.(zip|tar|gz)$/.test(n))return'📦';return'📃';}
function status(t){document.getElementById('statusBar').textContent=t;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── 테마 ──
function toggleTheme(){
  _theme=_theme==='dark'?'light':'dark';
  document.body.classList.toggle('light',_theme==='light');
  document.getElementById('themeBtn').textContent=_theme==='dark'?'☀️':'🌙';
  localStorage.setItem('stella_db_theme',_theme);
}
function applyTheme(){
  const t=localStorage.getItem('stella_db_theme')||'dark';
  _theme=t;
  document.body.classList.toggle('light',t==='light');
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
}

// ── 로그인 ──
async function dbLogin(){
  const id=document.getElementById('gId').value.trim(),pw=document.getElementById('gPw').value;
  const err=document.getElementById('gErr');
  if(!id||!pw){err.textContent='아이디와 비밀번호를 입력하세요.';return;}
  err.textContent='접속 중...';
  if(id==='admin'&&pw==='admin'){
    const u={id:'admin',name:'관리자',email:'admin@stella.local',role:'admin'};
    saveSession(u);enterApp(u);return;
  }
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,password:pw})});
    const d=await r.json();
    if(!r.ok||d.ok===false){err.textContent=d.message||'로그인 실패';return;}
    if(!isAdmin(d.user)){err.textContent='DB 열람 권한이 없습니다.';return;}
    saveSession(d.user);enterApp(d.user);
  }catch(e){err.textContent=e.message;}
}
function enterApp(u){
  _user=u;
  document.getElementById('gate').style.display='none';
  const aw=document.getElementById('appWrap');aw.style.display='flex';
  document.getElementById('userLabel').textContent='관리자: '+(u.name||u.id);
  applyTheme();
  loadFolder('','StellaGPT');
}
function dbLogout(){localStorage.removeItem(SK);location.reload();}

// ── 폴더 탐색 ──
async function loadFolder(folderId,name){
  status('로딩 중...');
  document.getElementById('fileList').innerHTML='';
  clearSel();
  _curId=folderId||'';
  try{
    const url='/api/drive-list?scope=StellaGPT'+(folderId?'&folderId='+encodeURIComponent(folderId):'');
    const r=await fetch(url,{cache:'no-store'});
    const d=await r.json();
    if(!d.ok){status('오류: '+(d.message||'로드 실패'));return;}
    _files=Array.isArray(d.files)?d.files:[];
    const cid=folderId||'ROOT';
    if(!_stack.length||_stack[_stack.length-1].id!==cid)_stack.push({id:cid,name:name||folderId||'StellaGPT'});
    renderBreadcrumb();renderFiles();
    status('📁 '+(_stack[_stack.length-1]?.name||'StellaGPT')+' — '+_files.length+'개 항목');
  }catch(e){status('오류: '+e.message);}
}
function renderBreadcrumb(){
  document.getElementById('breadcrumb').innerHTML=_stack.map(function(s,i){
    return '<span class="bc-seg" onclick="gotoStack('+i+')">'+esc(s.name)+'</span>'+(i<_stack.length-1?'<span class="bc-sep">›</span>':'');
  }).join('');
  document.getElementById('upBtn').disabled=_stack.length<=1;
}
function gotoStack(idx){_stack=_stack.slice(0,idx+1);const s=_stack.pop();loadFolder(s.id==='ROOT'?'':s.id,s.name);}
function goUp(){if(_stack.length<=1)return;_stack.pop();const s=_stack.pop();loadFolder(s.id==='ROOT'?'':s.id,s.name);}
function refresh(){if(!_stack.length)return;const s=_stack.pop();loadFolder(s.id==='ROOT'?'':s.id,s.name);}

// ── 파일 렌더 ──
function renderFiles(){
  const q=(document.getElementById('filterIn').value||'').toLowerCase();
  let list=Array.isArray(_files)?_files.filter(f=>!q||String(f.name||'').toLowerCase().includes(q)):[];
  list=list.slice().sort(function(a,b){
    if(a.isFolder!==b.isFolder)return a.isFolder?-1:1;
    return String(a.name||'').localeCompare(String(b.name||''));
  });
  const el=document.getElementById('fileList');
  if(!list.length){el.innerHTML='<div class="empty">📭 항목이 없습니다.</div>';return;}
  el.innerHTML=list.map(function(f){
    const checked=_sel.has(f.id)?'checked':'';
    return '<div class="file-row'+(checked?' sel':'')+'" id="row_'+esc(f.id)+'">'
      +'<input type="checkbox" class="file-chk" data-id="'+esc(f.id)+'" '+checked+' onclick="event.stopPropagation();toggleSel(\''+esc(f.id)+'\')">'
      +'<div class="file-icon" onclick="openItem(\''+esc(f.id)+'\',\''+esc(f.name)+'\','+!!f.isFolder+')">'+getIcon(f)+'</div>'
      +'<div class="file-info" onclick="openItem(\''+esc(f.id)+'\',\''+esc(f.name)+'\','+!!f.isFolder+')">'
        +'<div class="file-name">'+esc(f.name||'(이름없음)')+'</div>'
        +'<div class="file-meta">'+fmtDate(f.modifiedTime)+(f.size?' · '+fmtSize(f.size):'')+'</div>'
      +'</div>'
      +'<div class="file-acts">'
        +'<button class="act" onclick="event.stopPropagation();renameItem(\''+esc(f.id)+'\',\''+esc(f.name)+'\')">✏️</button>'
        +'<button class="act del" onclick="event.stopPropagation();deleteItem(\''+esc(f.id)+'\',\''+esc(f.name)+'\')">🗑</button>'
      +'</div>'
      +'</div>';
  }).join('');
}
function openItem(id,name,isFolder){
  if(isFolder){loadFolder(id,name);}
  else{
    navigator.clipboard.writeText(name).catch(function(){});
    status('📋 복사됨: '+name);
  }
}

// ── 선택 ──
function toggleSel(id){
  if(_sel.has(id))_sel.delete(id);else _sel.add(id);
  const row=document.getElementById('row_'+id);
  if(row)row.classList.toggle('sel',_sel.has(id));
  updateSelBar();
}
function clearSel(){_sel.clear();document.querySelectorAll('.file-chk').forEach(function(c){c.checked=false;});document.querySelectorAll('.file-row').forEach(function(r){r.classList.remove('sel');});updateSelBar();}
function updateSelBar(){
  const bar=document.getElementById('selBar');
  document.getElementById('selCount').textContent=_sel.size+'개 선택';
  bar.classList.toggle('show',_sel.size>0);
}

// ── 삭제 ──
async function deleteItem(fileId,name){
  if(!confirm('"'+name+'" 삭제하시겠습니까?'))return;
  const r=await fetch('/api/drive-manage?action=delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fileId})});
  const d=await r.json();
  if(d.ok){refresh();status('🗑 삭제됨: '+name);}
  else alert('삭제 실패: '+(d.error||d.message));
}
async function deleteSelected(){
  if(!_sel.size)return;
  if(!confirm(_sel.size+'개를 삭제하시겠습니까?'))return;
  const r=await fetch('/api/drive-manage?action=deleteMany',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fileIds:[..._sel]})});
  const d=await r.json();
  if(d.ok){status('🗑 '+d.deleted+'개 삭제 완료');clearSel();refresh();}
  else alert('삭제 실패: '+(d.error||d.message));
}

// ── 이동 ──
function moveSelected(){
  if(!_sel.size)return;
  document.getElementById('mvTargetId').value='';
  document.getElementById('mvmodal').classList.add('on');
}
async function confirmMove(){
  const newParentId=document.getElementById('mvTargetId').value.trim();
  if(!newParentId){alert('이동할 폴더 ID를 입력하세요.');return;}
  document.getElementById('mvmodal').classList.remove('on');
  const ids=[..._sel];const oldParentId=_curId;
  let ok=0;
  for(const fileId of ids){
    const r=await fetch('/api/drive-manage?action=move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fileId,newParentId,oldParentId})});
    const d=await r.json();
    if(d.ok)ok++;
  }
  status('📂 '+ok+'/'+ids.length+'개 이동 완료');clearSel();refresh();
}

// ── 이름 변경 ──
async function renameItem(fileId,name){
  const newName=prompt('새 이름:',name);
  if(!newName||newName===name)return;
  const r=await fetch('/api/drive-manage?action=rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fileId,newName:newName.trim()})});
  const d=await r.json();
  if(d.ok)refresh();else alert('이름 변경 실패: '+(d.error||d.message));
}

// ── 폴더 생성 ──
async function mkdirPrompt(){
  const name=prompt('새 폴더 이름:');
  if(!name||!name.trim())return;
  if(!_curId){alert('폴더 안에서 실행하세요.');return;}
  const r=await fetch('/api/drive-manage?action=mkdir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({parentId:_curId,name:name.trim()})});
  const d=await r.json();
  if(d.ok){refresh();status('📁 생성됨: '+name);}
  else alert('폴더 생성 실패: '+(d.error||d.message));
}

// ── 파일 업로드 ──
async function uploadFiles(fileList){
  if(!fileList||!fileList.length)return;
  if(!_curId){alert('업로드할 폴더 안으로 이동하세요.');return;}
  const ov=document.getElementById('upoverlay'),pr=document.getElementById('upProgress');
  ov.classList.add('on');
  let ok=0;
  for(let i=0;i<fileList.length;i++){
    const file=fileList[i];
    pr.textContent=(i+1)+'/'+fileList.length+' — '+file.name;
    try{
      // 파일 크기 제한 (10MB)
      if(file.size>10*1024*1024){pr.textContent='⚠️ '+file.name+' (10MB 초과 스킵)';await sleep(800);continue;}
      const base64data=await new Promise(function(resolve,reject){
        const fr=new FileReader();
        fr.onload=function(e){
          const result=e.target.result;
          const b64=result.includes(',')?result.split(',')[1]:result;
          resolve(b64);
        };
        fr.onerror=reject;
        fr.readAsDataURL(file);
      });
      const r=await fetch('/api/drive-manage?action=upload',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({parentId:_curId,fileName:file.name,mimeType:file.type||'application/octet-stream',base64data})
      });
      const d=await r.json();
      if(d.ok)ok++;
      else{pr.textContent='❌ '+file.name+': '+(d.error||d.message);await sleep(1200);}
    }catch(e){pr.textContent='❌ '+file.name+': '+e.message;await sleep(1200);}
  }
  ov.classList.remove('on');
  document.getElementById('fileUploadIn').value='';
  status('⬆ 업로드 완료: '+ok+'/'+fileList.length+'개');
  refresh();
}

// ── 초기화 ──
