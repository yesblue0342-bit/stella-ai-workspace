<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Stella DB</title><style>*{box-sizing:border-box}body{margin:0;padding:18px;background:#fff;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}h1{font-size:34px;margin:24px 0 14px}.top{display:flex;gap:8px;align-items:center}.top h1{flex:1}.card{border:1px solid #e5e7eb;border-radius:22px;padding:18px;margin:14px 0;background:#fff;box-shadow:0 8px 26px rgba(15,23,42,.05)}input,button{font:inherit}input{width:100%;border:1px solid #d1d5db;border-radius:16px;padding:14px;margin:8px 0;font-size:17px}button{border:1px solid #d1d5db;background:#fff;border-radius:15px;padding:12px 14px;font-weight:900}.primary{background:#0f172a;color:#fff}.muted{color:#6b7280;font-size:13px}.hidden{display:none}.danger{color:#b91c1c}.row{display:flex;gap:8px;flex-wrap:wrap}.file{display:flex;gap:12px;align-items:center;border-top:1px solid #f1f5f9;padding:13px 0}.icon{width:54px;height:54px;border-radius:16px;background:#f3f4f6;display:grid;place-items:center;font-size:28px}.crumb button{font-size:13px;padding:7px 9px;margin:3px}.grid{display:grid;grid-template-columns:1fr;gap:4px}@media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}</style></head><body><div class="top"><h1>Stella DB</h1><button onclick="location.href='/'">Stella GPT</button></div><div id="gate" class="card"><b>DB 접속</b><input id="loginId" placeholder="아이디 또는 이메일" autocomplete="username"><input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password"><div class="row"><button class="primary" onclick="enterDb()">로그인 접속</button><button onclick="location.href='/'">Stella GPT로 돌아가기</button></div><div id="msg" class="danger"></div></div><div id="app" class="hidden"><div class="card"><div class="row"><button class="primary" onclick="connectRoot()">접속</button><button onclick="goUp()">상위 폴더</button><button onclick="logoutDb()">나가기</button></div><div id="userLine" class="muted"></div><div id="crumb" class="crumb"></div></div><div class="card"><b>Google Drive / StellaGPT</b><div id="out" class="muted">접속 버튼을 누르면 폴더가 표시됩니다.</div></div></div><script>const SK='stella_session_final_v82';let stack=[];function $(id){return document.getElementById(id)}
const DB_ADMINS=['admin','admin@stella.local','yesblue0342','yesblue0342@naver.com','yesblue0342@gmail.com','김경훈','이후'];function isDbAdmin(u){if(!u)return false;return DB_ADMINS.includes(String(u.id||'').toLowerCase())||DB_ADMINS.includes(String(u.email||'').toLowerCase())||DB_ADMINS.includes(String(u.name||''))||String(u.id)==='admin'||String(u.role)==='admin';}function validUser(){try{const s=JSON.parse(localStorage.getItem(SK)||'null');if(s&&s.user&&s.user.id)return s.user}catch(e){}return null}
function guess(){const u=validUser();if(u&&isDbAdmin(u)){$('gate').classList.add('hidden');$('app').classList.remove('hidden');$('userLine').textContent='관리자: '+(u.name||u.email||u.id);connectRoot();}else if(u){$('gate').classList.remove('hidden');$('msg').textContent='이 계정은 DB 열람 권한이 없습니다. 관리자(admin) 또는 yesblue0342로 로그인하세요.';}}
async function enterDb(){const id=$('loginId').value.trim();const pw=$('pw').value;if(!id||!pw){$('msg').textContent='아이디와 비밀번호를 입력하세요.';return}$('msg').textContent='접속 중...';
 if(id==='admin'&&pw==='admin'){const u={id:'admin',name:'관리자',email:'admin@stella.local'};localStorage.setItem(SK,JSON.stringify({id:'admin',user:u,savedAt:-1}));$('gate').classList.add('hidden');$('app').classList.remove('hidden');$('userLine').textContent='관리자';connectRoot();return}
 try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,password:pw})});const d=await r.json();if(!r.ok||d.ok===false){$('msg').textContent=d.message||'로그인 실패';return}localStorage.setItem(SK,JSON.stringify({id:d.user.id,user:d.user,savedAt:-1}));if(!isDbAdmin(d.user)){$('msg').textContent='이 계정은 DB 열람 권한이 없습니다.';return;}$('gate').classList.add('hidden');$('app').classList.remove('hidden');$('userLine').textContent='관리자: '+(d.user.name||d.user.email||d.user.id);connectRoot()}catch(e){$('msg').textContent=e.message}}
function logoutDb(){localStorage.removeItem(SK);location.reload()}
async function connectRoot(){stack=[];await loadFolder('','StellaGPT')}async function loadFolder(folderId,name){$('out').textContent='폴더를 불러오는 중...';const url='/api/stella?action=db-directory'+(folderId?'&folderId='+encodeURIComponent(folderId):'');try{const r=await fetch(url,{cache:'no-store'});const d=await r.json();if(!d.ok){$('out').innerHTML='<span class="danger">접속 실패: '+(d.error||d.message||'오류')+'</span>';return}if(folderId)stack.push({id:folderId,name:name||'폴더'});renderCrumb();renderFiles(d.files||[])}catch(e){$('out').innerHTML='<span class="danger">접속 실패: '+e.message+'</span>'}}function renderCrumb(){$('crumb').innerHTML='<button onclick="connectRoot()">StellaGPT</button>'+stack.map((x,i)=>'<button onclick="jump('+i+')">'+esc(x.name)+'</button>').join('')}function jump(i){const item=stack[i];stack=stack.slice(0,i);loadFolder(item.id,item.name)}function goUp(){if(stack.length<=1){connectRoot();return}stack.pop();const p=stack.pop();if(p)loadFolder(p.id,p.name);else connectRoot()}function renderFiles(files){if(!files.length){$('out').textContent='폴더가 비어 있습니다.';return}const arr=files.filter(f=>f.isFolder).concat(files.filter(f=>!f.isFolder));$('out').innerHTML='<div class="grid">'+arr.map(f=>'<div class="file" '+(f.isFolder?'onclick="loadFolder(\''+f.id+'\',\''+safeAttr(f.name)+'\')"':'')+'><div class="icon">'+(f.isFolder?'▰':'□')+'</div><div><b>'+esc(f.name)+'</b><br><span class="muted">'+(f.isFolder?'폴더':(f.mimeType||'파일'))+'</span><br>'+(!f.isFolder&&f.link?'<a href="'+f.link+'" target="_blank">열기/다운로드</a>':'')+'</div></div>').join('')+'</div>'}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function safeAttr(s){return String(s||'').replace(/[\\'"<>]/g,'')}guess();</script></body></html>
