<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Stella DB</title><style>*{box-sizing:border-box}body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#fff;color:#111827;margin:0;padding:18px}h1{font-size:34px;margin:24px 0 10px}.card{border:1px solid #e5e7eb;border-radius:22px;padding:18px;margin:14px 0;background:#fff;box-shadow:0 8px 26px rgba(15,23,42,.05)}input,button{font:inherit}input{width:100%;border:1px solid #d1d5db;border-radius:16px;padding:14px;margin:8px 0;font-size:17px}button{border:1px solid #d1d5db;background:#fff;border-radius:15px;padding:12px 14px;font-weight:900}.primary{background:#0f172a;color:#fff}.muted{color:#6b7280;font-size:13px}.hidden{display:none}.danger{color:#b91c1c}.row{display:flex;gap:8px;flex-wrap:wrap}.file{display:flex;gap:12px;align-items:center;border-top:1px solid #f1f5f9;padding:13px 0}.icon{width:54px;height:54px;border-radius:16px;background:#f3f4f6;display:grid;place-items:center;font-size:28px}.crumb button{font-size:13px;padding:7px 9px;margin:3px}.top{display:flex;align-items:center;gap:8px}.top h1{flex:1}.grid{display:grid;grid-template-columns:1fr;gap:4px}@media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}</style></head><body><div class="top"><h1>Stella DB</h1><button onclick="location.href='/'">Stella GPT</button></div><div id="gate" class="card"><b>DB 접속</b><input id="who" placeholder="Stella GPT 사용자 확인"><div class="row"><button class="primary" onclick="enterDb()">접속</button><button onclick="location.href='/'">Stella GPT로 돌아가기</button></div><p class="muted">Stella GPT에서 들어온 사용자만 DB 폴더를 열 수 있습니다.</p></div><div id="app" class="hidden"><div class="card"><div class="row"><button class="primary" onclick="connectRoot()">접속</button><button onclick="goUp()">상위 폴더</button><button onclick="logoutDb()">나가기</button></div><div id="userLine" class="muted"></div><div id="crumb" class="crumb"></div></div><div class="card"><b>Google Drive / StellaGPT</b><div id="out" class="muted">접속 버튼을 누르면 Google Drive 폴더가 표시됩니다.</div></div></div><script>const ALLOW=['김경훈','KH','이후','소설가 이후','yesblue0342','yesblue0342@naver.com','yesblue0342@gmail.com'];let stack=[];function $(id){return document.getElementById(id)}function guess(){try{const u=JSON.parse(localStorage.getItem('stella_user')||localStorage.getItem('user')||'null');if(u&&($('who').value===''))$('who').value=u.name||u.email||u.id||''}catch(e){}const saved=localStorage.getItem('stella_db_user')||'';if(saved)$('who').value=saved}function enterDb(){const v=$('who').value.trim();if(!ALLOW.some(k=>v.includes(k)||k.includes(v)))return alert('DB 권한이 확인되지 않았습니다. Stella GPT 로그인 후 다시 접속하세요.');localStorage.setItem('stella_db_user',v);$('gate').classList.add('hidden');$('app').classList.remove('hidden');$('userLine').textContent=v;connectRoot()}function logoutDb(){localStorage.removeItem('stella_db_user');location.reload()}async function connectRoot(){stack=[];await loadFolder('','StellaGPT')}async function loadFolder(folderId,name){$('out').textContent='폴더를 불러오는 중...';const url='/api/stella?action=db-directory'+(folderId?'&folderId='+encodeURIComponent(folderId):'');const r=await fetch(url);const d=await r.json();if(!d.ok){$('out').innerHTML='<span class="danger">접속 실패: '+(d.error||d.message||'오류')+'</span>';return}if(folderId)stack.push({id:folderId,name:name||'폴더'});renderCrumb();renderFiles(d.files||[])}function renderCrumb(){$('crumb').innerHTML='<button onclick="connectRoot()">StellaGPT</button>'+stack.map((x,i)=>'<button onclick="jump('+i+')">'+esc(x.name)+'</button>').join('')}function jump(i){const item=stack[i];stack=stack.slice(0,i);loadFolder(item.id,item.name)}function goUp(){if(stack.length<=1){connectRoot();return}stack.pop();const p=stack.pop();if(p)loadFolder(p.id,p.name);else connectRoot()}function renderFiles(files){if(!files.length){$('out').textContent='폴더가 비어 있습니다.';return}const arr=files.filter(f=>f.isFolder).concat(files.filter(f=>!f.isFolder));$('out').innerHTML='<div class="grid">'+arr.map(f=>'<div class="file" '+(f.isFolder?'onclick="loadFolder(\''+f.id+'\',\''+safeAttr(f.name)+'\')"':'')+'><div class="icon">'+(f.isFolder?'▰':'□')+'</div><div><b>'+esc(f.name)+'</b><br><span class="muted">'+(f.isFolder?'폴더':(f.mimeType||'파일'))+'</span><br>'+(!f.isFolder&&f.link?'<a href="'+f.link+'" target="_blank">열기/다운로드</a>':'')+'</div></div>').join('')+'</div>'}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function safeAttr(s){return String(s||'').replace(/[\\'"<>]/g,'')}guess();</script></body></html>
