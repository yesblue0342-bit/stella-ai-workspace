name: Deploy to OCI

# main에 push되면 OCI 우분투 서버(Docker)로 자동 재배포 — Vercel 대체.
# 필요 시크릿(Settings → Secrets and variables → Actions):
#   OCI_SSH_HOST   : OCI 서버 IP/호스트 (예: 161.33.4.91)
#   OCI_SSH_USER   : SSH 사용자 (예: ubuntu)
#   OCI_SSH_KEY    : SSH 개인키(전체, -----BEGIN ... END-----)
#   OCI_SSH_PORT   : (선택) SSH 포트, 기본 22
#   OCI_APP_DIR    : (선택) 앱 경로, 기본 /opt/stella-ai-workspace
# 시크릿 미설정 시 배포 단계는 건너뛰고 워크플로는 성공(green)으로 종료.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deploy-oci
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check OCI secrets configured
        id: chk
        env:
          H: ${{ secrets.OCI_SSH_HOST }}
          K: ${{ secrets.OCI_SSH_KEY }}
        run: |
          if [ -n "$H" ] && [ -n "$K" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OCI 배포 시크릿(OCI_SSH_HOST/OCI_SSH_KEY) 미설정 — 배포 건너뜀. 등록 시 push마다 자동 배포됩니다."
          fi

      - name: SSH deploy (git pull + 도커 재빌드/재실행)
        if: steps.chk.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_SSH_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="${{ secrets.OCI_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/stella-ai-workspace}"
            echo "▶ deploy to $APP_DIR"
            cd "$APP_DIR"
            # repo가 root 소유로 clone된 경우 ubuntu가 못 쓰므로 보정 (OCI ubuntu는 무비번 sudo)
            sudo -n chown -R "$(id -un):$(id -gn)" "$APP_DIR" 2>/dev/null || true
            git config --global --add safe.directory "$APP_DIR" 2>/dev/null || true
            git fetch --all --prune
            git reset --hard origin/main
            bash deploy/run-stella-oci.sh
            echo "✅ OCI 재배포 완료"
            # ── 배포 후 스모크: 0Program 저장 파이프라인 실확인 ──
            # 고정 파일명(_deploy_smoke.txt) 업서트 → Drive 스모크 파일은 항상 1개만 유지(중복 없음).
            # ★ 컨테이너는 호스트에 포트를 열지 않음(npm_default 내부 전용) → docker exec 로 내부에서 호출.
            # 실패해도 배포는 성공 처리하되 로그로 결과를 남긴다.
            sleep 6
            if docker info >/dev/null 2>&1; then D="docker"; else D="sudo docker"; fi
            SMOKE=$($D exec stella-workspace curl -s -m 25 -X POST http://127.0.0.1:8970/api/db/save-program \
              -H 'Content-Type: application/json' \
              -d "{\"app\":\"deploy\",\"title\":\"smoke\",\"ext\":\"txt\",\"fixedName\":\"_deploy_smoke.txt\",\"content\":\"deploy smoke $(git rev-parse --short HEAD) $(date -u +%FT%TZ)\"}" || true)
            echo "SMOKE_0PROGRAM: $SMOKE"

      - name: Smoke — 0Program 저장 실검증 + 진단(결과를 ci-smoke 브랜치 파일로 공개)
        if: steps.chk.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 3
          BASE=https://stella.xn--hu5b23z.com
          DIAG=$(curl -s -m 20 "$BASE/api/drive-diagnostics" || echo '{"err":"diag_curl_fail"}')
          BODY=$(curl -s -m 30 -X POST "$BASE/api/db/save-program" \
            -H 'Content-Type: application/json' \
            -d "{\"app\":\"deploy\",\"title\":\"smoke\",\"ext\":\"txt\",\"fixedName\":\"_deploy_smoke.txt\",\"content\":\"deploy smoke ${GITHUB_SHA::7} $(date -u +%FT%TZ)\"}" || echo '{"err":"curl_fail"}')
          echo "SMOKE_0PROGRAM: $BODY"
          echo "DIAG: $DIAG"
          # 결과를 ci-smoke 브랜치의 ci/smoke-latest.json 으로 커밋(외부에서 raw 로 확인 가능)
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          AUTH="Authorization: Bearer $GH_TOKEN"
          curl -s -X POST -H "$AUTH" "$API/git/refs" -d "{\"ref\":\"refs/heads/ci-smoke\",\"sha\":\"$GITHUB_SHA\"}" >/dev/null 2>&1 || true
          CONTENT=$(jq -n --arg sha "$GITHUB_SHA" --argjson smoke "${BODY:-null}" --argjson diag "${DIAG:-null}" \
            '{sha:$sha, at:(now|todate), smoke:$smoke, diag:$diag}' 2>/dev/null | base64 -w0)
          PREV=$(curl -s -H "$AUTH" "$API/contents/ci/smoke-latest.json?ref=ci-smoke" | jq -r '.sha // empty')
          jq -n --arg c "$CONTENT" --arg p "$PREV" \
            '{message:"ci: smoke result", content:$c, branch:"ci-smoke"} + (if $p=="" then {} else {sha:$p} end)' \
            | curl -s -X PUT -H "$AUTH" "$API/contents/ci/smoke-latest.json" -d @- >/dev/null || true
          echo "$BODY" | grep -q '"ok":true' || { echo "::error::0Program 스모크 실패"; exit 1; }
