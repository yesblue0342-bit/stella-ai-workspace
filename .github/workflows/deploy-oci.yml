name: Deploy to OCI

# main에 push되면 OCI 우분투 서버(Docker)로 자동 재배포 — Vercel 대체.
# 필요 시크릿(Settings → Secrets and variables → Actions):
#   OCI_SSH_HOST   : OCI 서버 IP/호스트 (예: 161.33.4.91)
#   OCI_SSH_USER   : SSH 사용자 (예: ubuntu)
#   OCI_SSH_KEY    : SSH 개인키(전체, -----BEGIN ... END-----)
#   OCI_SSH_PORT   : (선택) SSH 포트, 기본 22
#   OCI_APP_DIR    : (선택) 앱 경로, 기본 /opt/stella-ai-workspace
# 시크릿 미설정 시 배포 단계는 건너뛰고 워크플로는 성공(green)으로 종료.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: deploy-oci
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check OCI secrets configured
        id: chk
        env:
          H: ${{ secrets.OCI_SSH_HOST }}
          K: ${{ secrets.OCI_SSH_KEY }}
        run: |
          if [ -n "$H" ] && [ -n "$K" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OCI 배포 시크릿(OCI_SSH_HOST/OCI_SSH_KEY) 미설정 — 배포 건너뜀. 등록 시 push마다 자동 배포됩니다."
          fi

      - name: Diagnose connectivity (임시 진단 — 시크릿 값 노출 안 함)
        if: steps.chk.outputs.ready == 'true'
        env:
          H: ${{ secrets.OCI_SSH_HOST }}
          P: ${{ secrets.OCI_SSH_PORT }}
        run: |
          PORT="${P:-22}"
          echo "host 문자열 길이: ${#H}  (161.33.4.91 이면 11)"
          echo "port 문자열 길이: ${#PORT}  ('22'면 2)"
          case "$H" in
            100.6[4-9].*|100.[7-9][0-9].*|100.1[0-1][0-9].*|100.12[0-7].*)
              echo "RESULT: 🔴 HOST가 100.64~127 = Tailscale/CGNAT 사설IP! 공인IP로 바꿔야 함." ;;
            10.*|192.168.*|172.1[6-9].*|172.2[0-9].*|172.3[0-1].*)
              echo "RESULT: 🔴 HOST가 사설 IP 대역! 공인IP로 바꿔야 함." ;;
            *) echo "RESULT: 🟢 HOST는 공인 IP 형태" ;;
          esac
          echo "--- TCP 연결 + SSH 배너 테스트 (10초) ---"
          if timeout 10 bash -c 'exec 3<>/dev/tcp/"$0"/"$1"; head -c 40 <&3' "$H" "$PORT" 2>/tmp/derr; then
            echo ""
            echo "RESULT: 🟢 TCP연결+배너 OK = 이 HOST:PORT로 sshd 도달 성공"
          else
            echo "RESULT: 🔴 연결 실패 — $(cat /tmp/derr 2>/dev/null)"
          fi

      - name: SSH deploy (git pull + 도커 재빌드/재실행)
        if: steps.chk.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_SSH_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="${{ secrets.OCI_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/stella-ai-workspace}"
            echo "▶ deploy to $APP_DIR"
            cd "$APP_DIR"
            git fetch --all --prune
            git reset --hard origin/main
            bash deploy/run-stella-oci.sh
            echo "✅ OCI 재배포 완료"
