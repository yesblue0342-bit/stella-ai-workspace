name: Patch auth UI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let s = fs.readFileSync(path, 'utf8');

          const newHandleAuth = `async function handleAuth(e){
  e.preventDefault();
  $('#authMsg').textContent='';

  const id=$('#authId').value.trim();
  const pw=$('#authPassword').value;

  if(!id||!pw){
    $('#authMsg').textContent='이메일과 비밀번호를 입력해 주세요.';
    return;
  }

  try{
    let res,data;

    if(authMode==='signup'){
      const name=$('#authName').value.trim();
      const email=$('#authEmail').value.trim().toLowerCase();

      if(!name||!email){
        $('#authMsg').textContent='이름과 이메일을 입력해 주세요.';
        return;
      }

      res=await fetch('/api/auth/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,password:pw,name})
      });
    }else{
      res=await fetch('/api/auth/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:id,password:pw})
      });
    }

    data=await res.json();

    if(!res.ok){
      $('#authMsg').textContent=data.message||'처리 실패';
      return;
    }

    const apiUser=data.user;
    const localUser={
      id:'db_'+apiUser.id,
      name:apiUser.name||apiUser.email,
      email:apiUser.email,
      birth:'',
      passwordHash:'',
      role:ADMIN_EMAILS.includes(apiUser.email)?'admin':'user',
      createdAt:apiUser.created_at||new Date().toISOString()
    };

    users=allUsers();
    users=users.filter(u=>u.id!==localUser.id);
    users.push(localUser);
    saveUsers();

    user=localUser;
    saveSessionUser(user);
    showApp();
  }catch(err){
    $('#authMsg').textContent='서버 연결 오류: '+(err.message||err);
  }
}`;

          const before = s;
          s = s.replace(/function handleAuth\(e\)[\s\S]*?function forgotPassword/, newHandleAuth + '\nfunction forgotPassword');
          s = s.replace('<p class="hint">로그인한 사용자마다 채팅, 프로젝트, 게시판 데이터가 따로 저장됩니다.</p>', '<p class="hint">회원가입/로그인은 Azure SQL에 저장됩니다. 로그인 후 작업공간을 이용하세요.</p>');
          s = s.replace('<label>아이디</label><input id="authId" type="text" required placeholder="아이디">', '<label>이메일</label><input id="authId" type="email" required placeholder="이메일">');
          if(s===before){ throw new Error('Pattern not found'); }
          fs.writeFileSync(path, s, 'utf8');
          NODE
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Connect login UI to Azure SQL auth" || echo "No changes"
          git push
