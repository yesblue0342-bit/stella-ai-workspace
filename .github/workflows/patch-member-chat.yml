name: Patch member chat layout

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/patch-member-chat.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-member-chat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html member chat
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          css_start = '<style id="stella-member-kakao-patch">'
          css_end = '</style><!-- /stella-member-kakao-patch -->'
          js_start = '<script id="stella-member-kakao-patch">'
          js_end = '</script><!-- /stella-member-kakao-patch -->'

          def remove_block(text, start, end):
              while start in text and end in text:
                  a = text.index(start)
                  b = text.index(end, a) + len(end)
                  text = text[:a] + text[b:]
              return text

          html = remove_block(html, css_start, css_end)
          html = remove_block(html, js_start, js_end)

          css = r'''<style id="stella-member-kakao-patch">
          .admin-accordion,.admin-toggle,.admin-content,.admin-grid{display:none!important}
          #memberPanel .panel-body{padding:14px!important;background:#fff!important}
          .member-layout{display:grid!important;grid-template-rows:auto 1fr!important;grid-template-columns:1fr!important;height:100%!important;gap:10px!important}
          .member-room-list{border:1px solid #e5e7eb!important;border-radius:22px!important;background:#fff!important;overflow-x:auto!important;overflow-y:hidden!important;padding:10px!important;display:flex!important;gap:8px!important;scrollbar-width:none!important}
          .member-room-list::-webkit-scrollbar{display:none!important}
          .member-room{min-width:150px!important;max-width:210px!important;width:auto!important;border:1px solid #edf0f4!important;background:#fff!important;text-align:left!important;border-radius:18px!important;padding:10px 12px!important;margin:0!important;line-height:1.35!important;box-shadow:0 2px 10px rgba(15,23,42,.03)!important}
          .member-room.active{background:#fef3c7!important;border-color:#f7d358!important}
          .member-room b{display:block!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;font-size:.92rem!important}
          .member-room small{color:#64748b!important;display:block!important;margin-top:4px!important;font-size:.72rem!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
          .member-room .preview{color:#94a3b8!important;margin-top:3px!important}
          .member-chat-area{border:1px solid #d9dee7!important;border-radius:24px!important;display:flex!important;flex-direction:column!important;min-height:0!important;overflow:hidden!important;background:#b7c9d8!important}
          .member-chat-top{display:flex!important;gap:8px!important;align-items:center!important;padding:12px 13px!important;border-bottom:1px solid rgba(15,23,42,.08)!important;background:#b7c9d8!important;flex-wrap:nowrap!important}
          .member-chat-title{margin-right:auto!important;min-width:0!important}.member-chat-title b{display:block!important;overflow:hidden!important;text-overflow:ellipsis!important;white-space:nowrap!important;font-size:1.05rem!important}.member-chat-title small{display:block!important;color:#475569!important;font-size:.76rem!important;margin-top:2px!important;overflow:hidden!important;text-overflow:ellipsis!important;white-space:nowrap!important}
          .member-chat-top button{width:auto!important;padding:8px 10px!important;border-radius:13px!important;font-size:.8rem!important;background:#fff!important}
          .member-msg-list{flex:1!important;min-height:320px!important;overflow:auto!important;padding:16px 12px!important;background:#b7c9d8!important;display:flex!important;flex-direction:column!important;gap:10px!important}
          .member-date{align-self:center!important;background:rgba(255,255,255,.45)!important;color:#475569!important;border-radius:999px!important;padding:5px 10px!important;font-size:.72rem!important}
          .member-msg{max-width:78%!important;display:grid!important;grid-template-columns:34px 1fr!important;column-gap:7px!important;align-self:flex-start!important;border:0!important;background:transparent!important;padding:0!important;box-shadow:none!important}
          .member-msg.me{align-self:flex-end!important;grid-template-columns:1fr!important;background:transparent!important;border:0!important}
          .member-avatar{width:34px!important;height:34px!important;border-radius:50%!important;background:#fff!important;border:1px solid rgba(15,23,42,.08)!important;display:grid!important;place-items:center!important;font-weight:900!important;font-size:.8rem!important;color:#0f172a!important}
          .member-bubble-wrap{min-width:0!important}.member-msg b{font-size:.76rem!important;color:#334155!important;display:block!important;margin:0 0 3px 2px!important}.member-bubble-text{display:inline-block!important;max-width:100%!important;border-radius:17px!important;padding:9px 11px!important;background:#fff!important;color:#111827!important;box-shadow:0 1px 3px rgba(15,23,42,.06)!important;word-break:break-word!important;line-height:1.55!important;white-space:pre-wrap!important}.member-msg.me .member-bubble-text{background:#fee500!important;border-top-right-radius:5px!important}
          .member-meta{display:block!important;font-size:.68rem!important;color:#475569!important;margin-top:4px!important}.member-msg.me .member-meta{text-align:right!important}.member-file{display:inline-block!important;margin-top:6px!important;border:1px solid rgba(15,23,42,.12)!important;border-radius:12px!important;padding:6px 8px!important;text-decoration:none!important;background:rgba(255,255,255,.8)!important;font-size:.8rem!important;color:#0f172a!important}
          .member-compose{border-top:1px solid rgba(15,23,42,.08)!important;padding:10px!important;background:#fff!important;display:grid!important;gap:8px!important}.member-attach-row{display:grid!important;grid-template-columns:1fr auto!important;gap:7px!important}.member-compose-row{display:flex!important;gap:8px!important;align-items:flex-end!important}.member-compose textarea{flex:1!important;min-height:46px!important;max-height:110px!important;resize:none!important;border:0!important;background:#f3f4f6!important;border-radius:18px!important;padding:11px 13px!important;outline:0!important}.member-compose input{border:1px solid #e5e7eb!important;border-radius:15px!important;padding:9px!important;background:#fff!important;width:100%!important;min-width:0!important}.member-file-label{display:inline-flex!important;align-items:center!important;justify-content:center!important;border:1px solid #e5e7eb!important;border-radius:15px!important;padding:9px 11px!important;background:#fff!important;font-weight:900!important;white-space:nowrap!important}.member-file-label input{display:none!important}.member-empty{flex:1!important;display:grid!important;place-items:center!important;text-align:center!important;color:#475569!important;line-height:1.7!important;padding:30px!important}
          @media(max-width:900px){.member-room-list{max-height:112px!important}.member-room{min-width:154px!important}.member-chat-area{min-height:calc(100dvh - 238px)!important}.member-msg-list{min-height:calc(100dvh - 390px)!important;padding:14px 10px!important}.member-msg{max-width:86%!important}}
          </style><!-- /stella-member-kakao-patch -->'''

          js = r'''<script id="stella-member-kakao-patch">
          (function(){
            function q(s){return document.querySelector(s)}
            function qa(s){return Array.from(document.querySelectorAll(s))}
            function safe(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]})}
            function key(){return window.K&&K.member?K.member:'stella_member_final_v82'}
            function getRooms(){try{return JSON.parse(localStorage.getItem(key())||'[]')}catch(e){return []}}
            function setRooms(v){localStorage.setItem(key(),JSON.stringify(v))}
            function getUsers(){try{return JSON.parse(localStorage.getItem((window.K&&K.users)||'stella_users_final_v82')||'[]')}catch(e){return []}}
            function nowId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
            function curUser(){return window.user||null}
            function visibleRooms(){var u=curUser();if(!u)return [];return getRooms().filter(function(r){return (r.members||[]).includes(u.id)&&!(r.left||[]).includes(u.id)})}
            function ensureRoom(){var list=visibleRooms();if(!window.activeMemberRoomId||!list.some(function(r){return r.id===window.activeMemberRoomId}))window.activeMemberRoomId=list[0]?list[0].id:null;return list.find(function(r){return r.id===window.activeMemberRoomId})||null}
            function names(r){var us=getUsers();return (r.members||[]).filter(function(id){return !(r.left||[]).includes(id)}).map(function(id){var u=us.find(function(x){return x.id===id});return u?(u.name||u.id):id}).join(', ')}
            function preview(r){var m=(r.messages||[]).slice(-1)[0];if(!m)return '아직 메시지가 없습니다.';return m.text||m.driveLink&&'Google Drive 링크'||m.fileName&&('파일: '+m.fileName)||'새 메시지'}
            function initial(v){return String(v||'S').trim().slice(0,1).toUpperCase()}
            function readFileData(file){return new Promise(function(resolve,reject){var r=new FileReader();r.onload=function(){resolve(String(r.result||''))};r.onerror=function(){reject(r.error)};r.readAsDataURL(file)})}
            window.renderMember=function(){var u=curUser();if(!u)return;var list=visibleRooms(),r=ensureRoom();var body=q('#memberBody');if(!body)return;var roomButtons=list.map(function(x){return '<button class="member-room '+(x.id===window.activeMemberRoomId?'active':'')+'" data-mroom="'+safe(x.id)+'"><b>'+safe(x.name)+'</b><small>'+((x.members||[]).filter(function(id){return !((x.left||[]).includes(id))}).length)+'명 · '+((x.messages||[]).length)+'개 메시지</small><small class="preview">'+safe(preview(x))+'</small></button>'}).join('');var messages=r?(r.messages||[]).map(function(m,i){var mine=m.from===u.id;var sender=mine?'나':(m.fromName||m.from||'회원');var prev=(r.messages||[])[i-1];var d=String(m.createdAt||'').split(' ')[0]||'오늘';var showDate=i===0||String(prev&&prev.createdAt||'').split(' ')[0]!==d;return (showDate?'<div class="member-date">'+safe(d)+'</div>':'')+'<div class="member-msg '+(mine?'me':'')+'">'+(mine?'':'<div class="member-avatar">'+safe(initial(sender))+'</div>')+'<div class="member-bubble-wrap">'+(mine?'':'<b>'+safe(sender)+'</b>')+'<div class="member-bubble-text">'+safe(m.text||'')+'</div>'+(m.fileDataUrl?'<br><a class="member-file" href="'+m.fileDataUrl+'" download="'+safe(m.fileName||'file')+'">파일 다운로드: '+safe(m.fileName||'file')+'</a>':'')+(m.driveLink?'<br><a class="member-file" href="'+safe(m.driveLink)+'" target="_blank" rel="noopener">Google Drive 열기</a>':'')+'<small class="member-meta">'+safe(m.createdAt||'')+'</small></div></div>'}).join(''):'';body.innerHTML='<div class="member-layout"><div class="member-room-list"><button class="member-room" id="createMemberRoom"><b>＋ 새 대화방</b><small>회원 초대</small><small class="preview">카톡처럼 대화 시작</small></button>'+roomButtons+'</div><div class="member-chat-area"><div class="member-chat-top"><div class="member-chat-title"><b>'+(r?safe(r.name):'회원 채팅')+'</b><small>'+(r?safe(names(r)):'회원가입한 사람을 초대해 대화하세요.')+'</small></div><button class="small-btn" id="inviteMember" type="button">초대</button><button class="small-btn" id="leaveMember" type="button">나가기</button></div><div class="member-msg-list" id="memberMsgList">'+(r?messages:'<div class="member-empty">＋ 새 대화방을 눌러 회원을 초대하세요.<br>회원가입한 사용자는 누구나 초대할 수 있습니다.</div>')+'</div><div class="member-compose"><div class="member-attach-row"><input id="memberDriveLink" type="url" placeholder="Google Drive 공유 링크 붙여넣기(선택)"><label class="member-file-label">파일<input id="memberFile" type="file"></label></div><div class="member-compose-row"><textarea id="memberText" placeholder="메시지 입력"></textarea><button class="primary" id="memberSend" type="button">전송</button></div></div></div></div>';q('#createMemberRoom').onclick=window.createMemberRoom;qa('[data-mroom]').forEach(function(b){b.onclick=function(){window.activeMemberRoomId=b.dataset.mroom;window.renderMember()}});var ib=q('#inviteMember');if(ib)ib.onclick=window.inviteMember;var lb=q('#leaveMember');if(lb)lb.onclick=window.leaveMember;var sb=q('#memberSend');if(sb)sb.onclick=window.sendMember;var tb=q('#memberText');if(tb)tb.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.sendMember()}});var box=q('#memberMsgList');if(box)box.scrollTop=box.scrollHeight}
            window.openMember=function(){window.renderMember();q('#memberPanel')&&q('#memberPanel').classList.add('active');q('#memberBackdrop')&&q('#memberBackdrop').classList.add('active');if(window.closeSidebar)window.closeSidebar()}
            window.createMemberRoom=function(){var u=curUser();if(!u)return;var others=getUsers().filter(function(x){return x.id!==u.id});var name=prompt('새 대화방 이름','앵별꼬');if(!name)return;var members=[u.id];if(others.length){var pick=prompt('초대할 회원 번호를 입력하세요. 여러 명은 쉼표로 구분합니다.\n'+others.map(function(x,i){return (i+1)+'. '+(x.name||x.id)+' ('+x.id+')'}).join('\n'),'');if(pick)pick.split(',').map(function(x){return Number(x.trim())-1}).forEach(function(i){if(others[i])members.push(others[i].id)})}var arr=getRooms();var r={id:'mr_'+nowId(),name:name.trim(),owner:u.id,members:Array.from(new Set(members)),left:[],messages:[],createdAt:new Date().toISOString()};arr.unshift(r);setRooms(arr);window.activeMemberRoomId=r.id;window.renderMember()}
            window.inviteMember=function(){var r=ensureRoom();if(!r)return alert('대화방을 먼저 생성하세요.');var cand=getUsers().filter(function(u){return !(r.members||[]).includes(u.id)});if(!cand.length)return alert('초대할 수 있는 회원이 없습니다.');var pick=prompt('초대할 회원 번호를 입력하세요. 여러 명은 쉼표로 구분합니다.\n'+cand.map(function(x,i){return (i+1)+'. '+(x.name||x.id)+' ('+x.id+')'}).join('\n'),'');if(!pick)return;var arr=getRooms(),t=arr.find(function(x){return x.id===r.id});pick.split(',').map(function(x){return Number(x.trim())-1}).forEach(function(i){if(cand[i])t.members.push(cand[i].id)});t.members=Array.from(new Set(t.members));t.left=(t.left||[]).filter(function(id){return !t.members.includes(id)});setRooms(arr);window.renderMember()}
            window.leaveMember=function(){var u=curUser(),r=ensureRoom();if(!u||!r||!confirm('이 채팅방을 나가시겠습니까?'))return;var arr=getRooms(),t=arr.find(function(x){return x.id===r.id});t.left=Array.from(new Set([].concat(t.left||[],u.id)));setRooms(arr);window.activeMemberRoomId=null;window.renderMember()}
            window.sendMember=async function(){var u=curUser(),r=ensureRoom();if(!u||!r)return alert('대화방을 먼저 생성하세요.');var text=(q('#memberText')&&q('#memberText').value.trim())||'',link=(q('#memberDriveLink')&&q('#memberDriveLink').value.trim())||'',file=q('#memberFile')&&q('#memberFile').files[0];if(!text&&!link&&!file)return;var fileDataUrl='',fileName='';if(file){if(file.size>8*1024*1024)return alert('8MB 이하 파일만 임시 저장합니다. 큰 파일은 Google Drive 링크로 공유하세요.');fileDataUrl=await readFileData(file);fileName=file.name}var arr=getRooms(),t=arr.find(function(x){return x.id===r.id});t.messages.push({id:'mm_'+nowId(),from:u.id,fromName:u.name,text:text,driveLink:link,fileName:fileName,fileDataUrl:fileDataUrl,createdAt:new Date().toLocaleString()});setRooms(arr);window.renderMember()}
            setTimeout(function(){var b=q('#memberChatBtn');if(b)b.onclick=window.openMember},0)
          })();
          </script><!-- /stella-member-kakao-patch -->'''

          html = html.replace('</head>', css + '\n</head>')
          html = html.replace('</body>', js + '\n</body>')
          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html already patched"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Redesign member chat like KakaoTalk"
          git push
