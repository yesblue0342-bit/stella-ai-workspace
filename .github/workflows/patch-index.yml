name: Patch index.html

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Run patch script
        run: |
          cp scripts/patch-index.js patch-index.cjs
          node patch-index.cjs
          if git diff --quiet index.html; then
            echo "No index.html changes"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Patch index html UI and auth"
          git push

