name: Patch index.html

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch index.html
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let s = fs.readFileSync(path, 'utf8');
          const original = s;

          s = s.replace('<!-- stella-fixed-2026-06-12 -->', '<!-- stella-fixed-2026-06-13-wiki-namu-claude-auth -->');

          const persistentBlock = `/* persistent-login-fix */
function nowMs(){return Date.now()}
function saveSessionUser(u){write(K.session,{id:u.id,user:u,savedAt:nowMs()})}
function loadSessionUser(){
  const s=read(K.session,null);
  if(!s||!s.id)return null;
  const list=allUsers();
  return list.find(u=>u.id===s.id)||s.user||null;
}
/* /persistent-login-fix */`;
          s = s.replace(/\/\* persistent-login-fix \*\/[\s\S]*?\/\* \/persistent-login-fix \*\//, persistentBlock);

          s = s.replace('<label>아이디</label><input id="authId" type="text" required placeholder="아이디">', '<label>아이디 또는 이메일</label><input id="authId" type="text" required placeholder="아이디 또는 이메일">');

          const newHandleAuth = `async function handleAuth(e){
  e.preventDefault();
  users=allUsers();
  $('#authMsg').textContent='';
  const id=$('#authId').value.trim();
  const pw=$('#authPassword').value;
  if(!id||!pw){$('#authMsg').textContent='아이디 또는 이메일과 비밀번호를 입력해 주세요.';return}
  try{
    let res,data,loginEmail=id;
    if(authMode==='signup'){
      const name=$('#authName').value.trim();
      const email=$('#authEmail').value.trim().toLowerCase();
      const birth=$('#authBirth').value.trim();
      loginEmail=email||id;
      if(!name||!loginEmail){$('#authMsg').textContent='이름과 이메일을 입력해 주세요.';return}
      res=await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-store'},body:JSON.stringify({id,email:loginEmail,password:pw,name,birth})});
    }else{
      res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-store'},body:JSON.stringify({id,email:id,password:pw})});
    }
    const raw=await res.text();
    try{data=JSON.parse(raw)}catch{data={message:raw}}
    if(!res.ok||data.ok===false){$('#authMsg').textContent=data.message||data.error||'로그인/회원가입 처리 실패';return}
    const apiUser=data.user||{};
    const email=String(apiUser.email||loginEmail||id).toLowerCase();
    const localUser={id:String(apiUser.id||id),name:apiUser.name||email||id,email,birth:apiUser.birth||$('#authBirth').value.trim()||'',passwordHash:'',role:ADMIN_EMAILS.includes(email)?'admin':'user',createdAt:apiUser.created_at||new Date().toISOString()};
    users=allUsers().filter(u=>u.id!==localUser.id&&String(u.email||'').toLowerCase()!==email);
    users.push(localUser);
    saveUsers();
    user=localUser;
    saveSessionUser(user);
    showApp();
  }catch(err){$('#authMsg').textContent='회원 API 연결 오류: '+(err.message||err)}
}`;
          const authStart = s.indexOf('function handleAuth(e)');
          const forgotStart = s.indexOf('function forgotPassword', authStart);
          if (authStart >= 0 && forgotStart > authStart) {
            s = s.slice(0, authStart) + newHandleAuth + '\n' + s.slice(forgotStart);
          }

          if (!s.includes('id="searchProviderSelect"')) {
            s = s.replace('</select></div><div class="inputbar">', `</select><span>검색</span><select id="searchProviderSelect"><option value="auto" selected>자동</option><option value="off">검색 끄기</option><option value="knowledge">위키백과+나무위키</option><option value="wiki">위키백과</option><option value="namu">나무위키</option><option value="naver">네이버</option><option value="google">구글</option><option value="all">전체 검색</option></select></div><div class="inputbar">`);
          }

          if (!s.includes('function getSearchConfig()')) {
            const helper = `function ensureModelOptions(){const sel=$('#modelSelect');if(!sel)return;const current=sel.value||'gpt-5.5';sel.innerHTML='<optgroup label="ChatGPT / OpenAI"><option value="gpt-5.5-pro">GPT-5.5 Pro 최고성능</option><option value="gpt-5.5">GPT-5.5 최신</option><option value="gpt-4.1">GPT-4.1 호환</option><option value="gpt-4.1-mini">GPT-4.1 Mini 빠른 응답</option><option value="gpt-4o">GPT-4o 호환</option><option value="gpt-4o-mini">GPT-4o Mini 빠른 응답</option></optgroup><optgroup label="Claude"><option value="claude-opus-4-8">Claude Opus 4.8 고성능</option><option value="claude-sonnet-4-6">Claude Sonnet 4.6 균형</option><option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 빠른 응답</option><option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet 호환</option></optgroup>';if([...sel.options].some(o=>o.value===current))sel.value=current;else sel.value='gpt-5.5'}
function getSearchConfig(){const v=$('#searchProviderSelect')?.value||'auto';if(v==='off')return{search:false,searchProvider:'auto',searchType:'auto'};return{search:'auto',searchProvider:v,searchType:'auto'}}
function formatSearchReferences(results){if(!Array.isArray(results)||!results.length)return'';return '\n\n참고 검색 결과\n'+results.slice(0,5).map((r,i)=>'['+(i+1)+'] '+(r.title||'제목 없음')+'\n'+(r.link||'')+'\n'+(r.snippet||'')).join('\n\n')}`;
            s = s.replace('function initEvents()', helper + '\nfunction initEvents()');
          }

          s = s.replace("body:JSON.stringify({model:$('#modelSelect').value,message:(msg||'첨부 파일을 분석해줘')+fileText,history,system})", "body:JSON.stringify({model:$('#modelSelect').value,message:(msg||'첨부 파일을 분석해줘')+fileText,history,system,...getSearchConfig()})");
          s = s.replace("addMessage('ai',data.text||data.answer||data.message||'응답 없음',true)", "const answerText=(data.text||data.answer||data.message||'응답 없음')+formatSearchReferences(data.searchResults);addMessage('ai',answerText,true)");

          s = s.replace("function initEvents(){$('#loginTab')", "function initEvents(){ensureModelOptions();$('#loginTab')");
          s = s.replace("window.addEventListener('DOMContentLoaded',()=>{initEvents();initAuth();syncSidebarLayout()});", "window.addEventListener('DOMContentLoaded',()=>{ensureModelOptions();initEvents();initAuth();syncSidebarLayout()});");

          if (s !== original) fs.writeFileSync(path, s, 'utf8');
          NODE

          if git diff --quiet index.html; then
            echo "No index.html changes needed"
            exit 0
          fi

          git config user.name "stella-workspace-bot"
          git config user.email "stella-workspace-bot@users.noreply.github.com"
          git add index.html
          git commit -m "Patch index html UI and auth"
          git push
