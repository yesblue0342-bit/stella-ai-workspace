<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stella Codex</title>
<meta name="theme-color" content="#0d1117">
<style>
/* ── 테마 토큰 (Stella GPT와 동일한 body.dark 방식 + stella_theme 키 공유) ── */
:root{
  --bg:#ffffff; --top-bg:#fbfbfc; --side-bg:#fbfbfc; --card:#f3f4f6; --step-bg:#f6f8fa;
  --ink:#111827; --muted:#6b7280; --line:#e5e7eb; --accent:#1f6feb;
  --input-bg:#ffffff; --send:#238636; --cancel:#da3633; --err:#b91c1c; --ok:#1a7f37; --on-accent:#ffffff;
}
body.dark{
  --bg:#0d1117; --top-bg:#161b22; --side-bg:#0d1117; --card:#161b22; --step-bg:#0f1620;
  --ink:#e6edf3; --muted:#8b949e; --line:#21262d; --accent:#1f6feb;
  --input-bg:#0d1117; --send:#238636; --cancel:#da3633; --err:#f85149; --ok:#3fb950; --on-accent:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column}
a{color:var(--accent)}
.top{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--top-bg);position:sticky;top:0;z-index:5}
.top h1{font-size:1.05rem;font-weight:normal;color:var(--muted)}
.hamb{font-size:1.05rem;line-height:1;border:1px solid var(--line);border-radius:8px;padding:5px 9px;background:var(--card);color:var(--ink);cursor:pointer;flex:0 0 auto}
.nav{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.nav a{font-size:.8rem;text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:5px 9px;color:var(--muted)}
.nav a.active{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.theme-toggle{font-size:.95rem;line-height:1;border:1px solid var(--line);border-radius:8px;padding:5px 8px;background:var(--card);color:var(--ink);cursor:pointer}
.wrap{flex:1;display:flex;min-height:0}
.side{width:230px;flex:0 0 auto;border-right:1px solid var(--line);background:var(--side-bg);overflow:auto;padding:10px}
.side h2{font-size:.72rem;text-transform:uppercase;color:var(--muted);margin:6px 4px 8px;letter-spacing:.5px}
.sitem{padding:8px 9px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:.82rem}
.sitem:hover{border-color:var(--accent);background:var(--card)}
.sitem .t{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sitem .m{color:var(--muted);font-size:.72rem;margin-top:2px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.msgs{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.bubble{max-width:860px;width:100%;margin:0 auto;line-height:1.7}
.bubble.user{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;white-space:pre-wrap}
.step{background:var(--step-bg);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:7px 10px;font-size:.83rem;font-family:ui-monospace,Consolas,monospace;color:var(--ink);overflow-x:auto}
.step .nm{color:var(--accent);font-weight:700}
.step .rs{color:var(--muted);white-space:pre-wrap;display:block;margin-top:4px;max-height:200px;overflow:auto}
.answer{white-space:pre-wrap}
.barwrap{border-top:1px solid var(--line);background:var(--top-bg);padding:10px 14px}
.ctl{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:nowrap;overflow-x:auto}
.ctl #model{flex:1 1 120px;min-width:80px}
.ctl .ico{width:18px;height:18px;display:inline-block;vertical-align:middle;color:var(--ink);stroke:currentColor}
.ctl #omc{accent-color:var(--muted);width:auto}
#themeToggle{display:inline-flex;align-items:center;justify-content:center}
select,input,textarea,button{font:inherit;color:var(--ink);background:var(--input-bg);border:1px solid var(--line);border-radius:8px}
select,#budget{padding:6px 8px}
#budget{width:90px}
.lbl{font-size:.78rem;color:var(--muted);white-space:nowrap}
.iorow{display:flex;gap:8px;align-items:flex-end;border:1px solid var(--line);border-radius:22px;padding:6px 6px 6px 14px;background:var(--input-bg)}
#prompt{flex:1;resize:none;padding:8px 2px;min-height:40px;max-height:160px;line-height:1.5;border:none;background:transparent;outline:none}
button.act{cursor:pointer;font-weight:800;padding:0 16px;height:42px;border:none;border-radius:14px}
/* 전송/중단 버튼: 녹색/빨강 강조색 제거 → 주변 아이콘처럼 다크/라이트 테마 중립색(눈에 안 띄게) */
#sendBtn{background:var(--card);color:var(--ink);border:1px solid var(--line)}
#sendBtn:disabled{background:var(--line);color:var(--muted);cursor:not-allowed}
#cancelBtn{background:var(--card);color:var(--ink);border:1px solid var(--line);display:none}
#saveGhBtn{background:var(--card);color:var(--ink);border:1px solid var(--line);font-weight:700;font-size:.78rem;padding:5px 9px;border-radius:8px;cursor:pointer}
.status{font-size:.78rem;color:var(--muted)}
.status .err{color:var(--err)}
.status .ok{color:var(--ok)}
.empty{color:var(--muted);text-align:center;margin:auto;font-size:.9rem}
.side{transition:transform .25s ease}
.resizer{flex:0 0 auto;width:5px;cursor:col-resize;background:var(--line)}
.resizer:hover{background:var(--accent)}
.side-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9}
#fsExit{display:none}
body.side-collapsed .side,body.side-collapsed .resizer{display:none}
body.fullscreen-code .top,body.fullscreen-code .side,body.fullscreen-code .resizer{display:none}
body.fullscreen-code #fsExit{display:block;position:fixed;top:8px;right:10px;z-index:50}
@media(max-width:760px){
  .resizer{display:none}
  .side{position:fixed;top:0;left:0;bottom:0;width:min(280px,82vw);z-index:10;transform:translateX(-110%);box-shadow:2px 0 18px rgba(0,0,0,.35)}
  /* C1: 데스크톱 side-collapsed(기본 접힘)가 모바일 드로어를 막지 않게 무효화 */
  body.side-collapsed .side{display:block}
  body.side-open .side{transform:translateX(0)}
  body.side-open .side-backdrop{display:block}
  /* 햄버거 접힘(모바일): ☰ 단추만 남기고 — 제목·앱아이콘·nav·세션·풀스크린 + 하단 컨트롤(모델/테마) 전부 숨김 → 개발 영역 최대화. 다시 누르면 복귀 */
  body.cc-navhidden .top h1{display:none}
  body.cc-navhidden .top .nav a{display:none}
  body.cc-navhidden .top #sessBtn,body.cc-navhidden .top #fsBtn{display:none}
  body.cc-navhidden .barwrap .ctl{display:none}
  body.cc-navhidden .top{padding-top:7px;padding-bottom:7px}
  /* 하단 컨트롤 1줄(모델/예산/테마/OMC) */
  .ctl{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  #model{min-width:0}
}
</style>
<script src="/js/source-guard.js"></script>
<script src="/js/attach-encode.js"></script>
<script src="/js/code-copy.js"></script>
</head>
<body>
<style id="appIcoStyle">
/* 앱 아이콘 흑백화: 라이트(기본)=흰바탕+검정테두리/검정아이콘, 다크(body.dark)=검은바탕+흰테두리/흰아이콘 */
.app-ico-wrap{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;border:1.5px solid #111;background:#fff;margin-right:6px;flex:0 0 auto}
.app-ico{display:inline-block;font-size:12px;line-height:1;filter:grayscale(1) brightness(0)}
body.dark .app-ico-wrap{border-color:#fff!important;background:#000!important}
body.dark .app-ico{filter:grayscale(1) brightness(0) invert(1)!important}
body:not(.dark) .app-ico-wrap{border-color:#111!important;background:#fff!important}
body:not(.dark) .app-ico{filter:grayscale(1) brightness(0)!important}
</style>
<div class="top">
  <button type="button" class="hamb" id="hambBtn" title="상단 앱 전환 바 접기/펴기 (넓은 화면)">☰</button>
  <h1><span class="app-ico-wrap"><span class="app-ico">⌨️</span></span><span class="app-title-text">Stella Codex</span></h1>
  <nav class="nav">
    <a href="/"><span class="app-ico-wrap"><span class="app-ico">🤖</span></span>GPT</a><a href="/talk"><span class="app-ico-wrap"><span class="app-ico">💬</span></span>Talk</a><a href="/db"><span class="app-ico-wrap"><span class="app-ico">🗄</span></span>DB</a><a href="/hub"><span class="app-ico-wrap"><span class="app-ico">🌐</span></span>Hub</a><a href="/abap"><span class="app-ico-wrap"><span class="app-ico">🧑‍💻</span></span>ABAP</a><a href="/cc"><span class="app-ico-wrap"><span class="app-ico">🛠</span></span>Code</a><a href="/codex" class="active"><span class="app-ico-wrap"><span class="app-ico">⌨</span></span>Codex</a>
    <button type="button" class="theme-toggle" id="sessBtn" title="세션 목록">🗂</button>
    <button type="button" class="theme-toggle" id="fsBtn" title="코드 풀스크린">⛶</button>
  </nav>
</div>
<div class="wrap">
  <aside class="side">
    <h2>대화 <button id="refreshBtn" title="새 대화" style="float:right;font-size:.7rem;padding:2px 6px;cursor:pointer">＋ 새 대화</button></h2>
    <div id="sessionList"><div class="lbl" style="padding:8px">대화 없음</div></div>
  </aside>
  <div class="resizer" id="resizer" title="사이드바 너비 조절"></div>
  <main class="main">
    <div class="msgs" id="msgs"><div class="empty" id="emptyHint"></div></div>
    <div class="barwrap">
      <div class="ctl">
        <select id="model"></select>
        <button type="button" class="theme-toggle" id="themeToggle" title="다크/라이트 모드"></button>
        <span class="status" id="status"></span>
      </div>
      <div id="attachStrip" style="display:none;gap:8px;flex-wrap:wrap;padding:4px 6px"></div>
      <div class="iorow">
        <input type="file" id="attachInput" accept="image/*" multiple style="display:none">
        <button class="act" id="attachBtn" type="button" title="이미지 첨부" style="padding:0 12px">📎</button>
        <textarea id="prompt" placeholder="코딩 작업을 입력하세요"></textarea>
        <button class="act" id="sendBtn">전송</button>
        <button class="act" id="cancelBtn">중단</button>
      </div>
    </div>
  </main>
</div>
<div class="side-backdrop" id="sideBackdrop"></div>
<button type="button" class="theme-toggle" id="fsExit" title="풀스크린 종료">✕ 나가기</button>

<script type="module">
const $ = (id) => document.getElementById(id);
const MODEL_KEY = 'stella_codex_model';
const CHATS_KEY = 'stella_codex_chats';
const DEFAULT_MODEL = 'gpt-4.1-mini';
// Stella Codex = OpenAI(ChatGPT) 전용 코딩 어시스턴트. 모델 목록은 OpenAI 계열만, 기본 gpt-4.1-mini.
const OPENAI_MODELS = [
  { id:'gpt-5.5-pro', label:'GPT-5.5 Pro', note:'최고 성능' },
  { id:'gpt-5.5', label:'GPT-5.5', note:'최신' },
  { id:'gpt-4.1', label:'GPT-4.1', note:'호환' },
  { id:'gpt-4.1-mini', label:'GPT-4.1 Mini', note:'빠른 응답·기본' },
  { id:'gpt-4o', label:'GPT-4o', note:'호환' },
  { id:'gpt-4o-mini', label:'GPT-4o Mini', note:'경량' },
];
const CODEX_SYSTEM = 'You are Stella Codex, a coding assistant powered by OpenAI (ChatGPT). 한국어로 답한다. 동작하는 코드를 명확히 제시하고 설명은 간결하게. 코드는 반드시 언어 태그가 있는 마크다운 코드블록(```lang ... ```)으로 출력한다. 이미지가 오면 그 안의 코드/스크린샷을 분석해 수정안을 제시한다.';

let chat = { id: null, title: '새 대화', model: DEFAULT_MODEL, messages: [] };
let busy = false;

// ── 테마: Stella GPT와 동일한 body.dark 방식 + 'stella_theme' 키 공유 ──
// 흰색 모노크롬 라인 아이콘(stroke=currentColor) — 사이드바 바로가기와 톤 통일
const SVG_MOON='<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const SVG_SUN='<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
function applyTheme(){
  let t='dark'; try{ t=localStorage.getItem('stella_theme')||'dark'; }catch(e){}
  document.body.classList.toggle('dark', t!=='light');
  const b=$('themeToggle'); if(b) b.innerHTML = (t==='light')?SVG_MOON:SVG_SUN;
  const meta=document.querySelector('meta[name="theme-color"]'); if(meta) meta.setAttribute('content', t==='light'?'#ffffff':'#0d1117');
}
function toggleTheme(){
  const dark=document.body.classList.toggle('dark');
  try{ localStorage.setItem('stella_theme', dark?'dark':'light'); }catch(e){}
  const b=$('themeToggle'); if(b) b.innerHTML = dark?SVG_SUN:SVG_MOON;
  const meta=document.querySelector('meta[name="theme-color"]'); if(meta) meta.setAttribute('content', dark?'#0d1117':'#ffffff');
}
applyTheme();
$('themeToggle').addEventListener('click', toggleTheme);

// ── 레이아웃: 햄버거 토글 + 외부클릭 닫기 + 풀스크린 + 드래그 리사이저 ──
(function initLayout(){
  const body=document.body, side=document.querySelector('.side'), main=document.querySelector('.main');
  const isMobile=()=>window.matchMedia('(max-width:760px)').matches;
  const closeMobile=()=>body.classList.remove('side-open');
  // C1: 데스크톱 사이드바(대화 패널) — 기본 접힘으로 진입(메인 영역 넓게), 마지막 상태 localStorage 기억.
  const SIDECOLLAPSE_KEY='codex_sidecollapsed';
  function setSideCollapsed(on){ body.classList.toggle('side-collapsed', !!on); try{ localStorage.setItem(SIDECOLLAPSE_KEY, on?'1':'0'); }catch(e){} }
  (function applySideCollapsed(){ var on=true; try{ var v=localStorage.getItem(SIDECOLLAPSE_KEY); on=(v===null)?true:(v==='1'); }catch(e){} if(!isMobile()) body.classList.toggle('side-collapsed', !!on); })();
  function toggleSideDesktop(){ setSideCollapsed(!body.classList.contains('side-collapsed')); }
  function toggleSide(){ if(isMobile()) body.classList.toggle('side-open'); else toggleSideDesktop(); }
  const NAVHIDE_KEY='codex_navhidden';
  (function applyNavHidden(){ var on=true; try{ var v=localStorage.getItem(NAVHIDE_KEY); on=(v===null)?true:(v==='1'); }catch(e){} body.classList.toggle('cc-navhidden', !!on); })();
  function toggleNavHidden(){ var on=body.classList.toggle('cc-navhidden'); try{ localStorage.setItem(NAVHIDE_KEY, on?'1':'0'); }catch(e){} }
  const hb=$('hambBtn'); if(hb) hb.addEventListener('click', e=>{ e.stopPropagation(); if(isMobile()) toggleNavHidden(); else toggleSideDesktop(); });
  const sessBtn=$('sessBtn'); if(sessBtn) sessBtn.addEventListener('click', e=>{ e.stopPropagation(); toggleSide(); });
  const bd=$('sideBackdrop'); if(bd) bd.addEventListener('click', closeMobile);
  if(main) main.addEventListener('click', ()=>{ if(isMobile()) closeMobile(); });
  document.addEventListener('click', e=>{
    if(!isMobile() || !body.classList.contains('side-open')) return;
    if((side&&side.contains(e.target)) || (hb&&hb.contains(e.target))) return;
    closeMobile();
  });
  const fs=$('fsBtn'), fx=$('fsExit');
  const toggleFs=()=>body.classList.toggle('fullscreen-code');
  if(fs) fs.addEventListener('click', toggleFs);
  if(fx) fx.addEventListener('click', toggleFs);
  const rz=$('resizer');
  try{ const w=parseInt(localStorage.getItem('stella_codex_sidew')||'',10); if(w>=180&&w<=520&&side) side.style.width=w+'px'; }catch(e){}
  if(rz&&side) rz.addEventListener('mousedown', e=>{
    e.preventDefault(); const sx=e.clientX, sw=side.offsetWidth;
    const mv=ev=>{ side.style.width=Math.max(180,Math.min(520, sw+(ev.clientX-sx)))+'px'; };
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); try{localStorage.setItem('stella_codex_sidew', String(side.offsetWidth));}catch(e){} };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
})();

// ── 모델 드롭다운 (OpenAI 전용) ──
(function initModels(){
  const sel = $('model');
  sel.innerHTML = OPENAI_MODELS.map(m => `<option value="${m.id}">${m.label} — ${m.note}</option>`).join('');
  let saved = null; try { saved = localStorage.getItem(MODEL_KEY); } catch(e){}
  sel.value = (saved && OPENAI_MODELS.some(m=>m.id===saved)) ? saved : DEFAULT_MODEL;
  chat.model = sel.value;
  sel.addEventListener('change', () => { chat.model = sel.value; try { localStorage.setItem(MODEL_KEY, sel.value); } catch(e){} });
})();

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setStatus(html){ $('status').innerHTML = html || ''; }

// C2: 작업 결과를 Google Drive(StellaGPT/0download)에 {앱명}_{YYYYMMDD_HHMMSS}.txt로 자동 저장 + 토스트.
function showToast(msg, ok){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:9999;background:'+(ok?'var(--ok,#1a7f37)':'var(--err,#b91c1c)')+';color:#fff;padding:9px 16px;border-radius:10px;font-size:.85rem;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:80vw;word-break:break-all';
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 2600);
}
// 첨부 파일명에서 확장자 추출(가장 마지막 첨부 기준). 없으면 ''.
function attExt(att){ try{ for(var i=(att||[]).length-1;i>=0;i--){ var m=String(att[i]&&att[i].name||'').match(/\.([A-Za-z0-9]{1,8})$/); if(m) return m[1].toLowerCase(); } }catch(e){} return ''; }
async function saveResultToDrive(header, text, ext){
  if(!text || !String(text).trim()) return;
  try{
    const r=await fetch('/api/cc/save-drive',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ app:'StellaCodex', programName:((typeof chat!=='undefined'&&chat&&chat.title)||header), header:header, text:text, ext:(ext||'') })});
    const d=await r.json().catch(()=>({ok:false}));
    if(r.ok && d.ok) showToast('Drive 저장 ✓ '+(d.name||''), true);
    else showToast('Drive 저장 실패: '+((d&&(d.message||d.error))||('HTTP '+r.status)), false);
  }catch(e){ showToast('Drive 저장 오류: '+(e&&e.message?e.message:e), false); }
}

// ── 마크다운 라이트 렌더 (코드블록/인라인코드/볼드) ──
function inlineMd(s){ return s.replace(/`([^`]+)`/g,'<code style="background:var(--card);padding:1px 4px;border-radius:4px">$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); }
function renderMd(t){
  const parts = String(t==null?'':t).split('```');
  let html='';
  for(let i=0;i<parts.length;i++){
    if(i%2===1){
      let c=parts[i]; const nl=c.indexOf('\n'); if(nl>=0){ c=c.slice(nl+1); }
      html += '<pre style="background:var(--step-bg);border:1px solid var(--line);border-radius:8px;padding:10px;overflow:auto;margin:6px 0"><code>'+esc(c)+'</code></pre>';
    } else {
      if(parts[i]) html += '<div style="white-space:pre-wrap">'+inlineMd(esc(parts[i]))+'</div>';
    }
  }
  return html;
}

function clearEmpty(){ const m=$('msgs'); const empty=m.querySelector('.empty'); if(empty) empty.remove(); }
function addUserBubble(text, attCount){
  const d = document.createElement('div'); d.className='bubble user'; d.textContent = text;
  if(attCount>0){ const b=document.createElement('div'); b.className='lbl'; b.style.marginTop='4px'; b.textContent='📎 이미지 '+attCount+'개 첨부'; d.appendChild(b); }
  clearEmpty(); const m=$('msgs'); m.appendChild(d); m.scrollTop=m.scrollHeight;
}
function addAssistantBubble(text){
  const d = document.createElement('div'); d.className='bubble'; d.innerHTML = renderMd(text);
  if(window.attachCodeCopy) window.attachCodeCopy(d); // 코드블록에 복사 단추
  clearEmpty(); const m=$('msgs'); m.appendChild(d); m.scrollTop=m.scrollHeight; return d;
}

// ── 이미지 첨부: data URL로 /api/chat images 필드에 전달 (개당 3.5MB 상한) ──
let pendingAtt=[];
const ATT_MAX=3.5*1024*1024;
// 첨부 인코딩 레이스 방지: 진행 중이면 전송 비활성 + "이미지 처리 중…", whenReady로 전송 전 대기.
const attEnc = (window.makeAttachEncoder ? window.makeAttachEncoder(updateAttachBusy) : { encode:(f)=>window.readFileAsDataURL(f), pendingCount:()=>0, whenReady:()=>Promise.resolve() });
function updateAttachBusy(n){
  const sb=$('sendBtn'); if(sb) sb.disabled = busy || n>0;
  if(n>0) setStatus('이미지 처리 중…');
  else if(!busy) setStatus('');
}
function renderAttStrip(){
  const s=$('attachStrip'); if(!s) return;
  if(!pendingAtt.length){ s.style.display='none'; s.innerHTML=''; return; }
  s.style.display='flex';
  s.innerHTML=pendingAtt.map((a,i)=>'<span class="lbl" style="border:1px solid var(--line);border-radius:10px;padding:3px 8px">📎 '+esc(a.name)+' <a href="#" data-i="'+i+'" class="attDel" style="color:var(--err,#c00);text-decoration:none">✕</a></span>').join('');
  s.querySelectorAll('.attDel').forEach(el=>el.addEventListener('click',e=>{e.preventDefault();pendingAtt.splice(+el.dataset.i,1);renderAttStrip();}));
}
function addFiles(files){
  for(const f of files){
    if(!f || !/^image\//.test(f.type)) continue;
    if(f.size>ATT_MAX){ setStatus('<span class="err">'+esc(f.name)+': 이미지가 3.5MB를 초과해 건너뜀</span>'); continue; }
    // base64 인코딩을 Promise로 await 가능하게 → onload 완료 후에만 pendingAtt에 적재(레이스 차단).
    attEnc.encode(f).then(s=>{ pendingAtt.push({ name:f.name||'image', dataUrl:s }); renderAttStrip(); })
      .catch(()=>{ setStatus('<span class="err">'+esc(f.name)+': 이미지 읽기 실패</span>'); });
  }
}

function setUIBusy(b){
  busy=b;
  $('sendBtn').disabled = b || (attEnc && attEnc.pendingCount()>0); // 인코딩 중이면 계속 비활성
  $('cancelBtn').style.display = b ? 'block' : 'none';
  $('model').disabled = b;
}

// ── 대화 저장/목록 (localStorage) ──
function loadChatStore(){ try{ return JSON.parse(localStorage.getItem(CHATS_KEY)||'[]'); }catch(e){ return []; } }
function saveChatStore(arr){ try{ localStorage.setItem(CHATS_KEY, JSON.stringify(arr.slice(0,40))); }catch(e){} }
function persistCurrent(){
  if(!chat.messages.length) return;
  const arr=loadChatStore();
  if(!chat.id) chat.id='c'+Date.now();
  if(!chat.title || chat.title==='새 대화'){ const first=chat.messages.find(m=>m.role==='user'); chat.title=(first?first.content:'대화').replace(/\s+/g,' ').trim().slice(0,40)||'대화'; }
  const idx=arr.findIndex(c=>c.id===chat.id);
  const rec={ id:chat.id, title:chat.title, model:chat.model, messages:chat.messages, ts:Date.now() };
  if(idx>=0) arr[idx]=rec; else arr.unshift(rec);
  arr.sort((a,b)=>(b.ts||0)-(a.ts||0));
  saveChatStore(arr); renderChatList();
}
function renderChatList(){
  const host=$('sessionList'); const arr=loadChatStore();
  if(!arr.length){ host.innerHTML='<div class="lbl" style="padding:8px">대화 없음</div>'; return; }
  host.innerHTML=arr.map(c=>`<div class="sitem" data-id="${esc(c.id)}"><div class="t">${esc(c.title||'대화')}</div><div class="m">${esc(c.model||'')}</div></div>`).join('');
  host.querySelectorAll('.sitem').forEach(el=>el.addEventListener('click',()=>selectChat(el.dataset.id)));
}
function renderAllMessages(){
  const m=$('msgs'); m.innerHTML='';
  if(!chat.messages.length){ m.innerHTML='<div class="empty" id="emptyHint"></div>'; return; }
  for(const msg of chat.messages){
    if(msg.role==='user') addUserBubble(msg.content, msg.attCount||0);
    else addAssistantBubble(msg.content);
  }
}
function selectChat(id){
  const arr=loadChatStore(); const c=arr.find(x=>x.id===id); if(!c) return;
  chat={ id:c.id, title:c.title, model:c.model||DEFAULT_MODEL, messages:(c.messages||[]).slice() };
  const sel=$('model'); if(OPENAI_MODELS.some(m=>m.id===chat.model)) sel.value=chat.model;
  renderAllMessages(); setStatus('');
  if(window.matchMedia('(max-width:760px)').matches) document.body.classList.remove('side-open');
}
function newChat(){
  chat={ id:null, title:'새 대화', model:$('model').value||DEFAULT_MODEL, messages:[] };
  renderAllMessages(); setStatus('');
}

// ── 전송: OpenAI(/api/chat, bare 모드) 호출 ──
let _ctrl=null;
async function send(){
  if(busy) return;
  const text = $('prompt').value.trim();
  // 첨부 인코딩이 끝날 때까지 대기 → base64 누락 없이 전송(레이스 방지).
  if(attEnc && attEnc.pendingCount()>0){ setStatus('이미지 처리 중…'); await attEnc.whenReady(); }
  const att = pendingAtt.slice().filter(a=>a && (a.dataUrl||a.data)); // base64 빈 항목은 전송 제외(가드)
  if(!text && !att.length) return;
  $('prompt').value=''; $('prompt').style.height='';
  pendingAtt=[]; renderAttStrip();
  const model = $('model').value || DEFAULT_MODEL;

  addUserBubble(text, att.length);
  const historyForApi = chat.messages.map(m=>({ role:m.role, content:m.content }));
  chat.messages.push({ role:'user', content:text, attCount:att.length });
  setUIBusy(true); setStatus('생각 중…');
  const thinking = addAssistantBubble('…');

  _ctrl = new AbortController();
  try{
    const images = att.map(a=>a.dataUrl).filter(Boolean);
    const r = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, signal:_ctrl.signal,
      body: JSON.stringify({ message:text, history:historyForApi, model, system:CODEX_SYSTEM, images, bare:true }) });
    const d = await r.json().catch(()=>({ ok:false, error:'JSON 파싱 실패' }));
    if(!r.ok || d.ok===false){ throw new Error(d.error || d.message || ('HTTP '+r.status)); }
    const answer = d.text || d.answer || '응답 없음';
    thinking.innerHTML = renderMd(answer);
    if(window.attachCodeCopy) window.attachCodeCopy(thinking); // 코드블록에 복사 단추
    $('msgs').scrollTop = $('msgs').scrollHeight;
    chat.messages.push({ role:'assistant', content:answer });
    chat.model = model;
    persistCurrent();
    setStatus('<span class="ok">완료 ✓</span>');
    if(!window.shouldSaveSource||window.shouldSaveSource(answer)) saveResultToDrive(text, answer, attExt(att)); // 가드 통과 시 저장(확장자=첨부파일 기준, 없으면 서버가 코드펜스로 판별)
  }catch(e){
    const msg = (e && e.name==='AbortError') ? '중단됨' : ('오류: '+(e&&e.message?e.message:e));
    thinking.innerHTML = '<span class="err">'+esc(msg)+'</span>';
    setStatus('<span class="err">'+esc(msg)+'</span>');
    // 실패한 user 메시지는 히스토리에서 제거(재전송 가능)
    if(chat.messages.length && chat.messages[chat.messages.length-1].role==='user') chat.messages.pop();
  }finally{ setUIBusy(false); _ctrl=null; }
}
function cancel(){ if(_ctrl){ try{ _ctrl.abort(); }catch(e){} } }

// ── 입력: Enter 전송 / Shift+Enter 줄바꿈 / IME 보호 / 모바일 줄바꿈 ──
$('prompt').addEventListener('keydown', function(e){
  if(e.key==='Enter'||e.keyCode===13){
    if(e.isComposing||e.keyCode===229) return;
    if(e.shiftKey) return;
    const coarse=(window.matchMedia&&window.matchMedia('(pointer: coarse)').matches);
    if(coarse) return;
    e.preventDefault(); send();
  }
});
$('prompt').addEventListener('input',function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,160)+'px'; });
$('sendBtn').addEventListener('click', send);
$('cancelBtn').addEventListener('click', cancel);
$('attachBtn').addEventListener('click', ()=>$('attachInput').click());
$('attachInput').addEventListener('change', e=>{ addFiles(e.target.files); e.target.value=''; });
$('prompt').addEventListener('paste', e=>{ const items=(e.clipboardData&&e.clipboardData.items)||[]; const imgs=[]; for(const it of items){ if(it.kind==='file'){ const f=it.getAsFile(); if(f&&/^image\//.test(f.type)) imgs.push(f); } } if(imgs.length){ e.preventDefault(); addFiles(imgs); } });
$('refreshBtn').addEventListener('click', newChat);

renderChatList();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }
</script>
</body>
