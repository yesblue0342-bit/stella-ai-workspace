<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Stella Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--panel:#fafafa;--soft:#f3f4f6;--active:#eef2ff;--ink:#111827;--muted:#8b93a1;--line:#e5e7eb;--danger:#b91c1c;--shadow:0 24px 80px rgba(15,23,42,.18)}
html,body{height:100%;overflow:hidden;background:#fff;color:var(--ink);font-family:"Gowun Batang","Noto Serif KR",serif}
button,input,textarea,select{font:inherit}button{cursor:pointer;-webkit-tap-highlight-color:transparent}textarea{font-family:inherit}
.app{height:100dvh;display:grid;grid-template-columns:338px 1fr;background:#fff}
.sidebar{min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;background:#fbfbfc;border-right:1px solid var(--line);padding-bottom:120px}
.side-head{padding:18px 18px 12px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:14px}.mark{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:#0f172a;color:#fff;font-weight:900}.brand h1{font-size:1.45rem;line-height:1}.brand p{color:#6b7280;font-size:.88rem;margin-top:4px}
.user-box{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.user-box strong{display:block}.user-box span{display:block;color:#8b93a1;font-size:.82rem;max-width:175px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.small-btn{border:1px solid #d1d5db;background:#fff;border-radius:12px;padding:8px 10px;font-weight:800;font-size:.82rem}
.tools{display:grid;gap:9px;padding:14px 18px;border-bottom:1px solid var(--line)}.tool-btn{border:1px solid #d1d5db;background:#fff;border-radius:16px;padding:13px 14px;text-align:left;font-weight:800;font-size:1.02rem}.tool-btn:hover{background:#f8fafc}
.side-search-wrap{padding:10px 18px 8px;border-bottom:1px solid var(--line)}
.side-search{width:100%;border:1px solid #d1d5db;border-radius:14px;background:#fff;padding:12px 13px;font-size:.95rem;outline:none}
.side-search:focus{border-color:#94a3b8;box-shadow:0 0 0 3px rgba(148,163,184,.18)}
.search-hit{background:#fff7ed!important}
.no-search{color:#a0a7b4;font-size:.86rem;padding:8px 10px;line-height:1.5}

.section-title{padding:16px 18px 6px;color:#6b7280;font-size:.82rem;font-weight:900}.tree{padding:0 12px 8px}.tree-section{margin:1px 0}.tree-head{width:100%;border:0;background:transparent;border-radius:14px;min-height:42px;padding:8px 10px;display:flex;align-items:center;gap:8px;text-align:left;color:#111827}.tree-head:hover,.tree-head.active{background:var(--active)}.caret{width:16px;color:#64748b;font-size:.86rem}.folder{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:900}.count{color:#8b93a1;font-size:.9rem}.children{display:none;padding:0 0 2px 30px}.tree-section.open>.children{display:block}.item{width:100%;border:0;background:transparent;border-radius:14px;padding:8px 10px;text-align:left;min-height:46px}.item:hover,.item.active{background:var(--active)}.item-title{display:block;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.item-meta{display:block;color:#9ca3af;font-size:.8rem;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.empty{color:#a0a7b4;font-size:.86rem;padding:8px 10px}.compact-gap{height:4px}
.main{min-width:0;min-height:0;height:100dvh;display:flex;flex-direction:column;background:#fff}.top{height:68px;flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.96);backdrop-filter:blur(14px);z-index:4}.hamb{display:none;width:44px;height:44px;border:1px solid #d1d5db;border-radius:50%;background:#fff;font-size:1.35rem}.title-wrap{min-width:0}.title{font-size:1.25rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.subtitle{color:#8b93a1;font-size:.86rem;margin-top:2px}.top-actions{margin-left:auto;display:flex;gap:8px}.top-btn{border:1px solid #d1d5db;background:#fff;border-radius:12px;padding:8px 11px;font-weight:900;font-size:.86rem}
.messages{flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:26px 26px 18px;display:flex;flex-direction:column;gap:18px}.row{display:flex;width:min(920px,100%);margin:0 auto}.row.user{justify-content:flex-end}.bubble{max-width:min(800px,82vw);line-height:1.78;word-break:break-word;font-size:1.03rem}.row.user .bubble{background:#fff;color:#111827;border:1px solid #d9dee7;border-radius:20px;border-top-right-radius:6px;padding:13px 16px;box-shadow:0 8px 22px rgba(15,23,42,.05);white-space:pre-wrap}.row.ai .bubble{background:#fff;border-radius:14px;padding:4px 8px}.bubble p{margin:0 0 11px}.bubble p:last-child{margin-bottom:0}.download-tools{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px;opacity:.82}.download-tools:hover{opacity:1}.download-btn,.table-btn{border:1px solid #cbd5e1;background:#fff;color:#0f172a;border-radius:12px;padding:8px 11px;font-weight:900;font-size:.82rem}.download-btn:hover,.table-btn:hover{background:#f8fafc}.codebox{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:12px;overflow:auto;max-height:360px;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:.86rem;margin:10px 0}.tablebox{border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;margin:12px 0}.tabletools{display:flex;align-items:center;gap:8px;padding:10px;background:#f8fafc;border-bottom:1px solid #e5e7eb}.tabletools b{margin-right:auto}.tablescroll{overflow:auto}.answer-table{width:100%;border-collapse:collapse;font-size:.9rem}.answer-table th,.answer-table td{padding:9px 10px;border-bottom:1px solid #e5e7eb;border-right:1px solid #e5e7eb;text-align:left;vertical-align:top}.answer-table th{background:#f1f5f9;font-weight:900}.answer-table tr:nth-child(even) td{background:#fcfcfd}
.composer{flex:0 0 auto;border-top:1px solid var(--line);background:#fff;padding:10px 20px calc(12px + env(safe-area-inset-bottom))}.chips{width:min(920px,100%);margin:0 auto 8px;display:flex;gap:8px;flex-wrap:wrap;max-height:70px;overflow:auto}.chip{border:1px solid #d1d5db;background:#f9fafb;border-radius:999px;padding:7px 10px;font-size:.82rem;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chip button{border:0;background:transparent;color:#6b7280;margin-left:5px}.model-row{width:min(920px,100%);margin:0 auto 8px;display:flex;align-items:center;gap:8px;color:#6b7280;font-size:.86rem}#modelSelect{border:1px solid #d1d5db;border-radius:14px;padding:8px 12px;background:#fff;color:#111827;max-width:82vw}.inputbar{width:min(920px,100%);margin:0 auto;display:flex;gap:10px;align-items:flex-end;border:1px solid #d1d5db;border-radius:24px;padding:10px;background:#fff;box-shadow:0 8px 26px rgba(15,23,42,.04)}.inputbar textarea{flex:1;border:0;outline:0;resize:none;min-height:40px;max-height:140px;line-height:1.65;font-size:1.02rem}.round{width:44px;height:44px;border-radius:50%;border:0;display:grid;place-items:center;flex:0 0 auto}.attach{background:#f3f4f6;font-size:1.4rem}.send{background:#fff;color:#374151;border:1px solid #d1d5db!important;font-size:1.18rem;box-shadow:0 6px 16px rgba(15,23,42,.05)}.send:disabled{background:#f3f4f6;color:#9ca3af}
.backdrop{display:none;position:fixed;inset:0;background:rgba(15,23,42,.28);backdrop-filter:blur(2px);z-index:90}.backdrop.active{display:block}.sidebar-backdrop{z-index:50}.modal{display:none;position:fixed;inset:0;z-index:100;place-items:center;padding:22px;background:rgba(15,23,42,.32);backdrop-filter:blur(2px)}.modal.active{display:grid}.card{width:min(440px,100%);background:#fff;border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow)}.card h2{font-size:1.65rem;margin-bottom:8px}.hint{color:#6b7280;line-height:1.65;font-size:.9rem;margin-bottom:14px}.field{margin-bottom:11px}.field label{display:block;font-size:.82rem;font-weight:900;margin-bottom:6px}.field input{width:100%;border:1px solid #d1d5db;border-radius:13px;padding:12px}.primary{width:100%;border:0;border-radius:14px;background:#0f172a;color:#fff;padding:13px;font-weight:900}.link-btn{border:0;background:transparent;color:#2563eb;text-decoration:underline;margin-top:10px}.auth-msg{min-height:20px;color:#b91c1c;font-size:.86rem;margin-top:10px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:#f3f4f6;border-radius:14px;padding:4px;margin:14px 0}.tab{border:0;border-radius:11px;background:transparent;padding:10px;font-weight:900;color:#6b7280}.tab.active{background:#fff;color:#111827;box-shadow:0 1px 5px rgba(15,23,42,.08)}
.menu-backdrop{position:fixed;inset:0;z-index:110;background:rgba(15,23,42,.28);backdrop-filter:blur(2px);display:none}.menu-backdrop.active{display:block}.bottom-menu{position:absolute;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));background:#fff;border:1px solid #e5e7eb;border-radius:22px;box-shadow:var(--shadow);padding:10px}.menu-title{padding:12px 14px 10px;color:#64748b;border-bottom:1px solid #eef2f7;margin-bottom:6px;word-break:break-word}.menu-item{width:100%;border:0;background:#fff;color:#0f172a;border-radius:14px;padding:14px;text-align:left;font-size:1.05rem;font-weight:900}.menu-item:hover,.menu-item:active{background:#f1f5f9}.menu-item.danger{color:var(--danger)}
.board-panel{position:fixed;right:0;top:0;bottom:0;width:min(560px,100%);z-index:95;background:#fff;border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(15,23,42,.12);display:none;flex-direction:column}.board-panel.active{display:flex}.board-head{height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line)}.board-body{padding:16px;overflow:auto}.board-form{display:grid;gap:9px;margin-bottom:16px}.board-form input,.board-form textarea,.board-form select{border:1px solid #d1d5db;border-radius:13px;padding:12px}.board-form textarea{min-height:96px;resize:vertical}.post{border:1px solid var(--line);border-radius:15px;padding:13px;margin:8px 0;background:#fff}.post p{white-space:pre-wrap;line-height:1.7;color:#374151;margin-top:6px}.post small{display:block;color:#9ca3af;margin-top:8px}.drag-over{outline:2px dashed #2563eb;outline-offset:-8px;background:#eff6ff!important}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:0;top:0;bottom:0;width:min(88vw,360px);z-index:60;transform:translateX(-105%);transition:transform .2s ease;box-shadow:18px 0 50px rgba(15,23,42,.15);padding-bottom:150px}.sidebar.open{transform:translateX(0)}.hamb{display:grid;place-items:center}.top{height:64px;padding:8px 12px}.title{font-size:1.18rem}.subtitle,.top-actions{display:none}.messages{padding:16px 12px 14px;gap:16px}.bubble{max-width:calc(100vw - 30px);font-size:1.06rem;line-height:1.82}.row.user .bubble{max-width:82vw}.composer{padding:9px 11px calc(11px + env(safe-area-inset-bottom))}.inputbar{width:100%;border-radius:24px}.chips,.model-row{width:100%}#modelSelect{min-height:42px;font-size:1rem}.tree-head{min-height:38px;padding:7px 10px}.children{padding-left:24px}.item{min-height:42px;padding:7px 10px}.tools{padding:12px}.section-title{padding-top:12px}.side-head{padding:16px}.board-panel{width:100%}}
</style>


<!-- Stella v68 Auth Scroll + Member Chat Patch -->
<style>
/* v68: 모바일 회원가입 화면 스크롤 복구 */
#authModal.modal.active{
  display:block!important;
  overflow-y:auto!important;
  overflow-x:hidden!important;
  -webkit-overflow-scrolling:touch!important;
  padding:24px 18px calc(120px + env(safe-area-inset-bottom))!important;
}
#authModal .card{
  margin:0 auto!important;
  max-height:none!important;
}
@media(max-width:760px){
  #authModal.modal.active{align-items:flex-start!important;place-items:unset!important;}
  #authModal .card{width:100%!important;border-radius:22px!important;padding:22px!important;}
  #authModal .field input{min-height:50px!important;font-size:1rem!important;}
  #authModal .primary{min-height:50px!important;}
}
/* v68: 회원 채팅 */
.member-panel{position:fixed;right:0;top:0;bottom:0;width:min(560px,100%);z-index:96;background:#fff;border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(15,23,42,.12);display:none;flex-direction:column}
.member-panel.active{display:flex}.member-head{height:64px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 16px;border-bottom:1px solid var(--line)}.member-body{flex:1;overflow:auto;padding:14px;-webkit-overflow-scrolling:touch}.member-controls{display:grid;gap:8px;margin-bottom:12px}.member-controls select,.member-controls input,.member-controls textarea{border:1px solid #d1d5db;border-radius:13px;padding:10px;background:#fff}.member-msg-list{display:flex;flex-direction:column;gap:8px;margin:10px 0 14px}.member-msg{border:1px solid #e5e7eb;border-radius:15px;padding:10px;background:#fff;line-height:1.6}.member-msg.me{background:#eef2ff}.member-msg small{display:block;color:#8b93a1;margin-top:4px}.member-file{display:inline-block;margin-top:6px;border:1px solid #cbd5e1;border-radius:10px;padding:6px 8px;text-decoration:none;background:#f8fafc}.member-admin{border-top:1px solid #e5e7eb;margin-top:16px;padding-top:14px}.member-admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.member-note{font-size:.82rem;color:#6b7280;line-height:1.55}.member-send-row{display:flex;gap:8px;align-items:center}.member-send-row textarea{flex:1;min-height:48px;resize:vertical}.member-send-row button{width:auto;white-space:nowrap}.tool-btn.member-chat-btn{background:#fffdf7;border-color:#e6d6a8}
@media(max-width:760px){.member-panel{width:100%;border-left:0}.member-head{height:60px}.member-body{padding-bottom:calc(110px + env(safe-area-inset-bottom))}.member-admin-grid{grid-template-columns:1fr}}
</style>



<!-- Stella v70 Sidebar Toggle Patch -->
<style>
.side-brand-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.side-brand-row .brand{margin-bottom:0;min-width:0;flex:1}
.side-collapse-btn{width:40px;height:40px;flex:0 0 auto;border:1px solid #d1d5db;border-radius:14px;background:#fff;color:#64748b;font-size:1.15rem;font-weight:900;display:grid;place-items:center;box-shadow:0 6px 18px rgba(15,23,42,.05);cursor:pointer;-webkit-tap-highlight-color:transparent}
.side-collapse-btn:active{background:#f1f5f9;transform:scale(.98)}
.sidebar-mini-open{position:fixed;left:12px;top:calc(86px + env(safe-area-inset-top));z-index:58;width:46px;height:46px;border:1px solid #d1d5db;border-radius:50%;background:#fff;color:#0f172a;font-size:1.3rem;font-weight:900;display:none;place-items:center;box-shadow:0 12px 32px rgba(15,23,42,.13)}
@media(max-width:900px){
  .sidebar{width:min(84vw,340px)!important}
  .sidebar:not(.open)+.main .sidebar-mini-open{display:grid}
}
@media(min-width:901px){
  .side-collapse-btn{display:none}
}
</style>

</head>
<body>
<div class="app" id="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="side-head">
      <div class="side-brand-row">
        <div class="brand"><div class="mark">S</div><div><h1>Stella Workspace</h1><p>AI 작업공간</p></div></div>
        <button class="side-collapse-btn" id="sideCollapseBtn" type="button" aria-label="메뉴 접기" title="메뉴 접기">◀</button>
      </div>
      <div class="user-box"><div><strong id="userName">사용자</strong><span id="userEmail"></span></div><button class="small-btn" id="logoutBtn" type="button">로그아웃</button></div>
    </div>
    <div class="tools">
      <button class="tool-btn" id="newChatBtn" type="button">＋ 새 채팅</button>
      <button class="tool-btn" id="newProjectBtn" type="button">▱ 새 프로젝트</button>
      <button class="tool-btn" id="openBoardBtn" type="button">게시판</button>
    </div>
    <div class="side-search-wrap">
      <input id="boardSearchInput" class="side-search" type="search" placeholder="게시글 검색" autocomplete="off">
    </div>
    <div class="section-title">게시글 카테고리</div>
    <div class="tree" id="boardTree"></div>
    <div class="compact-gap"></div>
    <div class="section-title">프로젝트</div>
    <div class="tree" id="projectTree"></div>
  </aside>
  <main class="main">
    <header class="top"><button class="hamb" id="hambBtn" type="button">☰</button><div class="title-wrap"><div class="title" id="activeTitle">새 채팅</div><div class="subtitle" id="activeSub">개인 작업공간</div></div><div class="top-actions"><button class="top-btn" id="roomTxtBtn" type="button">TXT</button><button class="top-btn" id="roomMdBtn" type="button">Markdown</button><button class="top-btn" id="deleteRoomTopBtn" type="button">삭제</button></div></header>
    <section class="messages" id="messages"></section>
    <section class="composer">
      <div class="chips" id="chips"></div>
      <div class="model-row"><span>모델</span><select id="modelSelect"><optgroup label="OpenAI"><option value="gpt-4o" selected>GPT-5.5 최신</option><option value="gpt-4o">GPT-4o 최신</option><option value="gpt-4o-mini">GPT-4o Mini</option><option value="gpt-4.1">GPT-4.1</option><option value="gpt-4.1-mini">GPT-4.1 Mini</option></optgroup><optgroup label="Claude"><option value="claude_sonnet-4.6">Claude Sonnet 4.6</option><option value="claude_opus-4.8">Claude Opus 4.8</option><option value="claude_haiku-4.5">Claude Haiku 4.5</option></optgroup></select></div>
      <form class="inputbar" id="chatForm"><button class="round attach" id="attachBtn" type="button">+</button><input id="fileInput" type="file" multiple hidden><textarea id="chatInput" rows="1" placeholder="무엇이든 물어보세요."></textarea><button class="round send" id="sendBtn" type="submit">↑</button></form>
    </section>
  </main>
</div>
<div class="backdrop sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="modal" id="authModal"><div class="card"><div class="brand"><div class="mark">S</div><div><h1>Stella</h1><p>회원 전용 AI 작업공간</p></div></div><p class="hint">로그인한 사용자마다 채팅, 프로젝트, 게시판 데이터가 따로 저장됩니다.</p><div class="tabs"><button class="tab active" id="loginTab" type="button">로그인</button><button class="tab" id="signupTab" type="button">회원가입</button></div><form id="authForm"><div class="field signup-only" style="display:none"><label>이름</label><input id="authName" type="text" placeholder="이름"></div><div class="field"><label>아이디</label><input id="authId" type="text" required placeholder="아이디"></div><div class="field signup-only" style="display:none"><label>이메일</label><input id="authEmail" type="email" placeholder="가입 이메일"></div><div class="field signup-only" style="display:none"><label>생년월일</label><input id="authBirth" type="text" placeholder="예: 1982-04-30"></div><div class="field"><label>비밀번호</label><input id="authPassword" type="password" required placeholder="비밀번호"></div><button class="primary" id="authSubmit" type="submit">로그인</button><button class="link-btn" id="forgotBtn" type="button">비밀번호를 잊으셨나요?</button><div class="auth-msg" id="authMsg"></div></form></div></div>
<div class="menu-backdrop" id="menuBackdrop"><div class="bottom-menu" id="bottomMenu"></div></div>
<div class="backdrop" id="boardBackdrop"></div><section class="board-panel" id="boardPanel"><div class="board-head"><h3>게시판</h3><button class="small-btn" id="closeBoardBtn" type="button">닫기</button></div><div class="board-body"><form class="board-form" id="boardForm"><select id="postCategorySelect"></select><input id="postNewCategory" placeholder="새 카테고리명(선택)"><input id="postTitle" required placeholder="게시글 제목"><textarea id="postBody" required placeholder="게시글 내용"></textarea><button class="primary" type="submit">게시글 등록</button></form><div id="postList"></div></div></section>


<div class="backdrop" id="memberBackdrop"></div>
<section class="member-panel" id="memberPanel" aria-label="회원 채팅">
  <div class="member-head">
    <h3>회원 채팅</h3>
    <button class="small-btn" id="closeMemberBtn" type="button">닫기</button>
  </div>

function openMenu(title,items){const mb=$("#menuBackdrop"),m=$("#bottomMenu");m.innerHTML=`<div class="menu-title">${esc(title)}</div>`+items.map((it,i)=>`<button class="menu-item ${it.danger?'danger':''}" data-mi="${i}">${esc(it.label)}</button>`).join("")+`<button class="menu-item" data-cancel>취소</button>`;m.querySelectorAll('[data-mi]').forEach(b=>b.onclick=()=>{mb.classList.remove('active');items[Number(b.dataset.mi)].action()});m.querySelector('[data-cancel]').onclick=()=>mb.classList.remove('active');mb.classList.add('active')}function bindLongPress(root,resolver){if(!root||root.dataset.lp)return;root.dataset.lp=1;let t=null,info=null,x=0,y=0;const clear=()=>{if(t)clearTimeout(t);t=null;info=null};root.addEventListener('pointerdown',e=>{info=resolver(e.target);if(!info)return;x=e.clientX;y=e.clientY;t=setTimeout(()=>{if(info.type==='project')openMenu(info.title,[{label:'프로젝트 이름 변경',action:()=>renameProject(info.id)},{label:'프로젝트 삭제',danger:true,action:()=>deleteProject(info.id)}]);else if(info.type==='room')openMenu(info.title,[{label:'채팅방 이름 변경',action:()=>renameRoom(info.id)},{label:'프로젝트로 이동',action:()=>moveRoom(info.id)},{label:'프로젝트로 복사',action:()=>copyRoom(info.id)},{label:'채팅방 삭제',danger:true,action:()=>deleteRoom(info.id)}]);else if(info.type==='cat')openMenu(info.title,[{label:'게시글 추가',action:()=>{openBoard();$("#postCategorySelect").value=info.id;$("#postTitle").focus()}},{label:'카테고리 이름 변경',action:()=>renameCategory(info.id)},{label:'카테고리 삭제',danger:true,action:()=>deleteCategory(info.id)}]);else if(info.type==='post')openMenu(info.title,[{label:'게시글 이름 변경',action:()=>renamePost(info.id)},{label:'게시글 삭제',danger:true,action:()=>deletePost(info.id)}]);clear()},650)},true);root.addEventListener('pointermove',e=>{if(t&&(Math.abs(e.clientX-x)>12||Math.abs(e.clientY-y)>12))clear()},true);['pointerup','pointercancel','pointerleave'].forEach(ev=>root.addEventListener(ev,clear,true));root.addEventListener('contextmenu',e=>{const i=resolver(e.target);if(!i)return;e.preventDefault();if(i.type==='room')openMenu(i.title,[{label:'채팅방 이름 변경',action:()=>renameRoom(i.id)},{label:'프로젝트로 이동',action:()=>moveRoom(i.id)},{label:'프로젝트로 복사',action:()=>copyRoom(i.id)},{label:'채팅방 삭제',danger:true,action:()=>deleteRoom(i.id)}])},true)}

function renderAnswer(el,text){addDownloadTools(el,text);parseParts(text).forEach(part=>{if(part.type==='table')el.appendChild(tableEl(part.rows));else if(part.type==='code'){const pre=document.createElement('pre');pre.className='codebox';pre.textContent=part.code;el.appendChild(pre)}else part.text.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean).forEach(p=>{const q=document.createElement('p');q.textContent=p;el.appendChild(q)})})}
function addDownloadTools(el,text){const old=el.querySelector?.('.download-tools');if(old)old.remove();const tools=document.createElement('div');tools.className='download-tools';const stamp=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);tools.append(btn('TXT 다운로드',()=>downloadText(`stella-answer-${stamp}.txt`,text,'text/plain;charset=utf-8')));tools.append(btn('Markdown 다운로드',()=>downloadText(`stella-answer-${stamp}.md`,text,'text/markdown;charset=utf-8')));const shown=new Set(['txt','md','markdown']);codeBlocks(text).forEach((c,i)=>{const ext={html:'html',javascript:'js',js:'js',css:'css',json:'json',csv:'csv',abap:'abap',sql:'sql'}[c.lang]||'txt';if(shown.has(ext))return;shown.add(ext);tools.append(btn(`${ext.toUpperCase()} 코드 다운로드`,()=>downloadText(ext==='html'?'index.html':`stella-${stamp}-${i+1}.${ext}`,c.code,'text/plain;charset=utf-8')))});el.appendChild(tools)}
function btn(t,fn){const b=document.createElement('button');b.className='download-btn';b.type='button';b.textContent=t;b.onclick=fn;return b}function downloadText(name,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1000)}function roomText(r=activeRoom()){return (r?.messages||[]).map(m=>`${m.role==='ai'?'Stella':'나'}:\n${m.text}`).join('\n\n---\n\n')}
function codeBlocks(text){const out=[];String(text||'').replace(/```([\w-]*)\s*\n([\s\S]*?)```/g,(_,lang,code)=>{out.push({lang:(lang||'txt').toLowerCase(),code:code.trim()})});return out}
function parseParts(text){const blocks=codeBlocks(text);let clean=String(text||'').replace(/```([\w-]*)\s*\n([\s\S]*?)```/g,'\n');const parts=[];clean.split(/\n/);const lines=clean.split(/\r?\n/);let buf=[];const flush=()=>{const v=buf.join('\n').trim();if(v)parts.push({type:'text',text:v});buf=[]};for(let i=0;i<lines.length;i++){if(/^\s*\|.+\|\s*$/.test(lines[i])){let rows=[];while(i<lines.length&&/^\s*\|.+\|\s*$/.test(lines[i])){if(!/^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[i]))rows.push(lines[i].trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(x=>x.trim()));i++}i--;if(rows.length>=2){flush();parts.push({type:'table',rows});continue}}buf.push(lines[i])}flush();blocks.forEach(b=>parts.push({type:'code',code:b.code}));return parts.length?parts:[{type:'text',text:String(text||'')}]}function tableEl(rows){const box=document.createElement('div');box.className='tablebox';const tools=document.createElement('div');tools.className='tabletools';tools.innerHTML='<b>표 결과</b>';tools.append(btn2('Excel',()=>downloadXlsx(rows)));tools.append(btn2('CSV',()=>downloadCsv(rows)));const scroll=document.createElement('div');scroll.className='tablescroll';const table=document.createElement('table');table.className='answer-table';table.innerHTML='<thead><tr>'+rows[0].map(c=>`<th>${esc(c)}</th>`).join('')+'</tr></thead><tbody>'+rows.slice(1).map(r=>'<tr>'+r.map(c=>`<td>${esc(c)}</td>`).join('')+'</tr>').join('')+'</tbody>';scroll.append(table);box.append(tools,scroll);return box}function btn2(t,fn){const b=document.createElement('button');b.className='table-btn';b.type='button';b.textContent=t;b.onclick=fn;return b}function downloadCsv(rows){downloadText('stella-table.csv','\ufeff'+rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv;charset=utf-8')}function downloadXlsx(rows){if(!window.XLSX)return downloadCsv(rows);const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Stella');const arr=XLSX.write(wb,{bookType:'xlsx',type:'array'});const blob=new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='stella-table.xlsx';document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1000)}
async function extractFile(file){const name=file.name||'file';const lower=name.toLowerCase();const type=file.type||'';try{if(type.startsWith('image/')||/\.(png|jpe?g|webp|bmp|gif)$/i.test(lower)){const dataUrl=await readData(file);let text=`[이미지 첨부: ${name}]`;if(window.Tesseract){try{const res=await Tesseract.recognize(dataUrl,'kor+eng');text+='\n\n[OCR 추출 텍스트]\n'+(res?.data?.text?.trim()||'추출된 텍스트 없음')}catch(e){text+='\n\n[OCR 오류] '+(e.message||e)}}return{name,type,size:file.size,dataUrl,text}}if(lower.endsWith('.pdf')&&window.pdfjsLib){const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;let pages=[];for(let p=1;p<=Math.min(pdf.numPages,50);p++){const page=await pdf.getPage(p);const tc=await page.getTextContent();pages.push(`[PDF ${p}페이지]\n`+tc.items.map(i=>i.str).join(' '))}return{name,type,size:file.size,text:pages.join('\n\n')}}if(/\.docx$/i.test(lower)&&window.mammoth){const r=await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});return{name,type,size:file.size,text:r.value||''}}if(/\.pptx$/i.test(lower)&&window.JSZip){const zip=await JSZip.loadAsync(await file.arrayBuffer());const names=Object.keys(zip.files).filter(n=>/^ppt\/slides\/slide\d+\.xml$/i.test(n)).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));let parts=[];for(const n of names){const xml=await zip.files[n].async('text');const doc=new DOMParser().parseFromString(xml,'application/xml');const texts=[...doc.getElementsByTagName('a:t')].map(x=>x.textContent).filter(Boolean);if(texts.length)parts.push(`[${n}]\n`+texts.join('\n'))}return{name,type,size:file.size,text:parts.join('\n\n')}}if(/\.(xlsx|xls|xlsm)$/i.test(lower)&&window.XLSX){const wb=XLSX.read(await file.arrayBuffer(),{type:'array'});const parts=wb.SheetNames.map(sn=>`[시트: ${sn}]\n`+XLSX.utils.sheet_to_csv(wb.Sheets[sn]));return{name,type,size:file.size,text:parts.join('\n\n')}}return{name,type,size:file.size,text:await file.text()}}catch(e){return{name,type,size:file.size,text:`파일 읽기 오류: ${e.message||e}`}}}function readData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||''));r.onerror=()=>rej(r.error);r.readAsDataURL(file)})}async function processFiles(list){const arr=[...list];for(const f of arr)files.push(await extractFile(f));dedupeFiles();renderChips()}function dedupeFiles(){const seen=new Set();files=files.filter(f=>{const k=[f.name,f.size,f.type,String(f.text).slice(0,120)].join('|');if(seen.has(k))return false;seen.add(k);return true})}function renderChips(){$("#chips").innerHTML=files.map((f,i)=>`<span class="chip">첨부 ${esc(f.name.length>28?f.name.slice(0,25)+'...':f.name)} <button data-rmfile="${i}" type="button">×</button></span>`).join('');$$('[data-rmfile]').forEach(b=>b.onclick=()=>{files.splice(Number(b.dataset.rmfile),1);renderChips()})}
async function send(e){e.preventDefault();const input=$("#chatInput");const msg=input.value.trim();if(!msg&&!files.length)return;const r=activeRoom()||rooms[0];if(!activeRoomId)activeRoomId=r.id;addMessage('user',msg||'[첨부 파일 분석]',true,{attachments:[...files]});input.value='';$("#sendBtn").disabled=true;try{const fileText=files.map(f=>`\n\n[첨부파일: ${f.name}]\n${f.text}`).join('');const history=(activeRoom()?.messages||[]).slice(-10).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}));const system="당신은 Stella GPT입니다. 사용자 주제를 홈페이지로 제한하지 말고, SAP/ABAP/개발/문서/이미지/OCR/일반 질문에 성의 있고 실무적으로 답하세요. 다운로드 요청이 있으면 실제 텍스트/코드블록으로 제공하세요.";const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-store'},body:JSON.stringify({model:$("#modelSelect").value,message:(msg||'첨부 파일을 분석해줘')+fileText,history,system})});const raw=await res.text();let data;try{data=JSON.parse(raw)}catch{data={text:raw}}if(!res.ok)throw new Error(data.error||raw||res.status);addMessage('ai',data.text||data.answer||data.message||'응답 없음',true)}catch(err){addMessage('ai','API 연결 오류: '+(err.message||err),true)}finally{files=[];renderChips();$("#sendBtn").disabled=false}}
function openSidebar(){$("#sidebar").classList.add('open');$("#sidebarBackdrop").classList.add('active');const b=$("#sideCollapseBtn");if(b)b.textContent='◀'}function closeSidebar(){$("#sidebar").classList.remove('open');$("#sidebarBackdrop").classList.remove('active');const b=$("#sideCollapseBtn");if(b)b.textContent='▶'}
function initEvents(){$("#loginTab").onclick=()=>setAuthMode('login');$("#signupTab").onclick=()=>setAuthMode('signup');$("#authForm").onsubmit=handleAuth;$("#forgotBtn").onclick=forgotPassword;$("#logoutBtn").onclick=logout;$("#newChatBtn").onclick=()=>createRoom('새 채팅');$("#newProjectBtn").onclick=createProject;$("#openBoardBtn").onclick=openBoard;const bsi=$("#boardSearchInput");if(bsi){bsi.oninput=e=>{postSearchTerm=e.target.value||"";renderBoardTree();renderPosts()};bsi.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();openBoard();}}}$("#hambBtn").onclick=openSidebar;const sideBtn=$("#sideCollapseBtn");if(sideBtn)sideBtn.onclick=()=>{const sb=$("#sidebar");if(sb.classList.contains('open'))closeSidebar();else openSidebar()};$("#sidebarBackdrop").onclick=closeSidebar;$("#menuBackdrop").onclick=e=>{if(e.target===$("#menuBackdrop"))$("#menuBackdrop").classList.remove('active')};$("#closeBoardBtn").onclick=closeBoard;$("#boardBackdrop").onclick=closeBoard;$("#roomTxtBtn").onclick=()=>downloadText((activeRoom()?.name||'chat')+'.txt',roomText(),'text/plain;charset=utf-8');$("#roomMdBtn").onclick=()=>downloadText((activeRoom()?.name||'chat')+'.md',roomText(),'text/markdown;charset=utf-8');$("#deleteRoomTopBtn").onclick=()=>activeRoomId&&deleteRoom(activeRoomId);$("#chatForm").onsubmit=send;$("#attachBtn").onclick=()=>$("#fileInput").click();$("#fileInput").onchange=e=>{processFiles(e.target.files);e.target.value=''};$("#chatInput").addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(e)}});$("#chatInput").addEventListener('input',e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,140)+'px'});$("#chatInput").addEventListener('paste',async e=>{const items=[...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/'));if(!items.length)return;e.preventDefault();const list=items.map(i=>i.getAsFile()).filter(Boolean).map(f=>new File([f],`capture-${Date.now()}.png`,{type:f.type||'image/png'}));await processFiles(list)});$("#messages").addEventListener('dragover',e=>{e.preventDefault();$("#messages").classList.add('drag-over')});$("#messages").addEventListener('dragleave',()=>$("#messages").classList.remove('drag-over'));$("#messages").addEventListener('drop',async e=>{e.preventDefault();$("#messages").classList.remove('drag-over');await processFiles(e.dataTransfer.files)});$("#postNewCategory").addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$("#postTitle").focus()}});$("#boardForm").onsubmit=e=>{e.preventDefault();const nc=$("#postNewCategory").value.trim();const cat=nc||$("#postCategorySelect").value||'기본';posts.unshift({id:'post_'+id(),owner:user.id,category:cat,title:$("#postTitle").value.trim(),body:$("#postBody").value.trim(),createdAt:new Date().toISOString()});$("#boardForm").reset();savePosts();const set=boardExpanded();set.add(cat);saveBoardExpanded(set);renderAll()}}
window.addEventListener('DOMContentLoaded',()=>{initEvents();initAuth()});
</script>


<script>
/* Stella v68: member-to-member chat + auth scroll stability */
(function(){
  const MEMBER_KEY = "stella_member_messages_v68";
  function q(s){return document.querySelector(s)}
  function qa(s){return Array.from(document.querySelectorAll(s))}
  function readJson(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}}
  function writeJson(k,v){localStorage.setItem(k,JSON.stringify(v))}
  function htmlEsc(v){return String(v??"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
  function uid(){try{return user && user.id}catch{return ""}}
  function uname(){try{return user && user.name || user.id}catch{return ""}}
  function isAdmin(){try{return user && (user.role === "admin" || ADMIN_EMAILS.includes(String(user.email||"").toLowerCase()))}catch{return false}}
  function usersAll(){try{return readJson(K.users,[])}catch{return []}}
  function msgsAll(){return readJson(MEMBER_KEY,[])}
  function saveMsgs(arr){writeJson(MEMBER_KEY,arr)}
  function openMember(){
    const p=q('#memberPanel'), b=q('#memberBackdrop');
    if(p) p.classList.add('active'); if(b) b.classList.add('active');
    renderMemberUsers(); renderMemberMessages();
    try{ if(typeof closeSidebar==='function') closeSidebar(); }catch(e){}
  }
  function closeMember(){const p=q('#memberPanel'), b=q('#memberBackdrop'); if(p)p.classList.remove('active'); if(b)b.classList.remove('active')}
  function ensureMemberButton(){
    const tools=q('.tools'); if(!tools || q('#memberChatBtn')) return;
    const btn=document.createElement('button'); btn.className='tool-btn member-chat-btn'; btn.id='memberChatBtn'; btn.type='button'; btn.textContent='회원 채팅'; btn.onclick=openMember;
    tools.appendChild(btn);
  }
  function renderMemberUsers(){
    const sel=q('#memberToSelect'); if(!sel) return;
    const me=uid(); const list=usersAll().filter(u=>u.id!==me);
    sel.innerHTML=list.length?list.map(u=>`<option value="${htmlEsc(u.id)}">${htmlEsc(u.name||u.id)} (${htmlEsc(u.id)})</option>`).join(''):'<option value="">대화 가능한 회원 없음</option>';
    const adminBox=q('#memberAdminBox'); if(adminBox) adminBox.style.display=isAdmin()?"block":"none";
  }
  function renderMemberMessages(){
    const box=q('#memberMsgList'), sel=q('#memberToSelect'); if(!box||!sel) return;
    const me=uid(), other=sel.value;
    const list=msgsAll().filter(m=>(m.from===me&&m.to===other)||(m.from===other&&m.to===me));
    box.innerHTML=list.length?list.map(m=>{
      const cls=m.from===me?'member-msg me':'member-msg';
      const sender=m.from===me?'나':htmlEsc((usersAll().find(u=>u.id===m.from)||{}).name||m.from);
      const file=m.fileDataUrl?`<a class="member-file" href="${m.fileDataUrl}" download="${htmlEsc(m.fileName||'file')}">첨부파일 다운로드: ${htmlEsc(m.fileName||'file')}</a>`:'';
      const drive=m.driveLink?`<a class="member-file" href="${htmlEsc(m.driveLink)}" target="_blank" rel="noopener">Google Drive 열기</a>`:'';
      return `<div class="${cls}"><b>${sender}</b><div>${htmlEsc(m.text||'')}</div>${file}${drive}<small>${htmlEsc(m.createdAt||'')}</small></div>`;
    }).join(''):'<p class="member-note">아직 대화가 없습니다.</p>';
    box.scrollTop=box.scrollHeight;
  }
  function fileToDataUrl(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||''));r.onerror=rej;r.readAsDataURL(file)})}
  async function sendMember(){
    const sel=q('#memberToSelect'), txt=q('#memberText'), drive=q('#memberDriveLink'), fin=q('#memberFileInput');
    if(!sel||!sel.value){alert('대화 상대가 없습니다. 먼저 회원을 생성하거나 회원가입해 주세요.');return}
    const text=(txt.value||'').trim(); const link=(drive.value||'').trim(); const file=fin.files&&fin.files[0];
    if(!text&&!link&&!file){alert('메시지, 파일, Google Drive 링크 중 하나를 입력해 주세요.');return}
    let fileDataUrl='', fileName='';
    if(file){
      if(file.size>5*1024*1024){alert('단일 HTML 저장소에서는 5MB 이하 파일만 임시 저장합니다. 큰 파일은 Google Drive 링크로 공유하세요.');return}
      fileDataUrl=await fileToDataUrl(file); fileName=file.name;
    }
    const arr=msgsAll(); arr.push({id:'m_'+Date.now(),from:uid(),fromName:uname(),to:sel.value,text,driveLink:link,fileName,fileDataUrl,createdAt:new Date().toLocaleString()}); saveMsgs(arr);
    txt.value=''; drive.value=''; fin.value=''; renderMemberMessages();
  }
  function createUserByAdmin(){
    if(!isAdmin()){alert('관리자만 사용자 생성이 가능합니다.');return}
    const name=q('#adminNewName').value.trim(), id=q('#adminNewId').value.trim(), email=q('#adminNewEmail').value.trim().toLowerCase(), birth=q('#adminNewBirth').value.trim(), pw=q('#adminNewPw').value;
    if(!name||!id||!email||!birth||!pw){alert('이름, 아이디, 이메일, 생년월일, 임시 비밀번호를 모두 입력하세요.');return}
    const list=usersAll(); if(list.some(u=>u.id===id)){alert('이미 사용 중인 아이디입니다.');return}
    const pwHash=typeof hash==='function'?hash(pw):btoa(unescape(encodeURIComponent(pw)));
    list.push({id,name,email,birth,passwordHash:pwHash,role:ADMIN_EMAILS.includes(email)?'admin':'user',createdAt:new Date().toISOString(),createdBy:uid()}); writeJson(K.users,list);
    ['#adminNewName','#adminNewId','#adminNewEmail','#adminNewBirth','#adminNewPw'].forEach(s=>{const el=q(s); if(el)el.value=''});
    renderMemberUsers(); alert('사용자를 생성했습니다.');
  }
  function patchAuthScroll(){
    const modal=q('#authModal'); if(!modal) return;
    modal.addEventListener('touchmove',function(e){}, {passive:true});
  }
  function bind(){
    ensureMemberButton(); patchAuthScroll();
    const close=q('#closeMemberBtn'), back=q('#memberBackdrop'), send=q('#memberSendBtn'), sel=q('#memberToSelect'), admin=q('#adminCreateUserBtn');
    if(close && close.dataset.v68!=='1'){close.dataset.v68='1'; close.onclick=closeMember}
    if(back && back.dataset.v68!=='1'){back.dataset.v68='1'; back.onclick=closeMember}
    if(send && send.dataset.v68!=='1'){send.dataset.v68='1'; send.onclick=sendMember}
    if(sel && sel.dataset.v68!=='1'){sel.dataset.v68='1'; sel.onchange=renderMemberMessages}
    if(admin && admin.dataset.v68!=='1'){admin.dataset.v68='1'; admin.onclick=createUserByAdmin}
  }
  const oldRenderAll=window.renderAll;
  if(typeof oldRenderAll==='function'){
    window.renderAll=function(){ oldRenderAll.apply(this,arguments); setTimeout(bind,0); };
  }
  window.addEventListener('DOMContentLoaded',bind); window.addEventListener('load',bind); window.addEventListener('pageshow',bind); setTimeout(bind,500); setTimeout(bind,1500);
})();
</script>
