(function(){

        }
      }
    }
    var t=localStorage.getItem('stella_theme');

<script>
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}
const API_URL='/api/chat';const ADMIN_EMAILS=['yesblue0342@naver.com','yesblue0342@gmail.com','admin','admin@stella.local','yesblue0342','김경훈','이후'];
const K={users:'stella_users_final_v82',session:'stella_session_final_v82',rooms:'stella_rooms_final_v82',projects:'stella_projects_final_v82',posts:'stella_posts_final_v82',exp:'stella_exp_final_v82',bexp:'stella_bexp_final_v82',member:'stella_member_final_v82',manage:'stella_manage_final_v82'};
let user=null,users=[],rooms=[],projects=[],posts=[],activeRoomId=null,activeProjectId=null,activeView='chat',files=[],authMode='login',activeMemberRoomId=null;
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}};const write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);const hash=p=>btoa(unescape(encodeURIComponent(String(p))));

/* persistent-login-fix */
function nowMs(){return Date.now()}
function saveSessionUser(u){write(K.session,{id:u.id,user:u,savedAt:nowMs()})}
function loadSessionUser(){const ss=read(K.session,null);if(!ss||!ss.id)return null;const list=allUsers();return list.find(u=>u.id===ss.id)||ss.user||null}
/* /persistent-login-fix */
function bootstrapAdmin(){users=allUsers();let changed=false;ADMIN_EMAILS.forEach((mail,idx)=>{if(!users.some(u=>String(u.email||'').toLowerCase()===mail)){users.push({id:idx?'yesblue0342_gmail':'admin',name:idx?'김경훈':'관리자',email:mail,birth:'1982-04-30',passwordHash:hash('admin1234'),role:'admin',createdAt:new Date().toISOString()});changed=true}});if(changed)saveUsers()}
function allUsers(){return read(K.users,[])}function saveUsers(){write(K.users,users)}function loadData(){users=allUsers();rooms=read(K.rooms,[]).filter(x=>x.owner===user.id);projects=read(K.projects,[]).filter(x=>x.owner===user.id);posts=read(K.posts,[]).filter(x=>x.owner===user.id)}
function saveRooms(){
  write(K.rooms,[...read(K.rooms,[]).filter(x=>x.owner!==user.id),...rooms]);
  // 변경 시 서버에도 저장 (디바운스: 3초 후)
  clearTimeout(saveRooms._t);
  saveRooms._t = setTimeout(syncToServer, 3000);
}
function saveProjects(){
  write(K.projects,[...read(K.projects,[]).filter(x=>x.owner!==user.id),...projects]);
  clearTimeout(saveProjects._t);
  saveProjects._t=setTimeout(syncToServer,3000);
}function savePosts(){write(K.posts,[...read(K.posts,[]).filter(x=>x.owner!==user.id),...posts])}
function exp(){return new Set(read(K.exp,['all','none']))}function saveExp(s){write(K.exp,[...s])}function bexp(){return new Set(read(K.bexp,['기본']))}function saveBexp(s){write(K.bexp,[...s])}
function setAuthMode(m){authMode=m;$$('.signup-only').forEach(e=>e.classList.toggle('hidden',m!=='signup'));$('#loginTab').classList.toggle('active',m==='login');$('#signupTab').classList.toggle('active',m==='signup');$('#authSubmit').textContent=m==='login'?'로그인':'회원가입';$('#authMsg').textContent=''}
function initAuth(){bootstrapAdmin();users=allUsers();const f=loadSessionUser();if(f){user=f;saveSessionUser(user);showApp();return}$('#authModal').classList.add('active');$('#app').style.display='none'}
function showApp(){

  $('#authModal').classList.remove('active');

  $('#userName').textContent=user.name;
  $('#userEmail').textContent=user.email||user.id;
  if(!rooms.length)createRoom('새 채팅',false);
  if(!activeRoomId)activeRoomId=rooms[0]?.id;
  renderAll();
  // 1순위: 서버(Azure SQL workspace_state)에서 완전 동기화 (모든 기기 동일하게)
  setTimeout(syncFromServer, 300);
  // 2순위: Drive에서 추가 복원 (서버에 없는 항목 보완)
  setTimeout(loadChatHistoryFromDrive, 1500);
  setTimeout(loadNotesFromDrive, 2200);
}

// ── 서버 우선 전체 동기화 (모바일/PC 공통) ──
async function syncFromServer(){
  if(!user||!user.id) return;
  try{
    const r = await fetch('/api/workspace?owner='+encodeURIComponent(user.id), {cache:'no-store'});
    if(!r.ok) return;
    const d = await r.json();
    if(!d.ok) return;

    let changed = false;

    // ① 프로젝트 - 서버 데이터를 기준으로 병합
    if(Array.isArray(d.projects) && d.projects.length){
      const localIds = new Set((projects||[]).map(p=>p.id));
      d.projects.forEach(function(sp){
        if(sp.id && !localIds.has(sp.id)){
          projects.push({id:sp.id, owner:user.id, name:sp.name||sp.id, createdAt:sp.createdAt||new Date().toISOString()});
          changed = true;
        }
      });
      if(changed){ saveProjects(); }
    }

    // ② 채팅방 - 서버 데이터를 기준으로 병합 (rooms_json)
    if(Array.isArray(d.rooms) && d.rooms.length){
      const localIds = new Set((rooms||[]).map(r=>r.id));
      d.rooms.forEach(function(sr){
        if(!sr.id) return;
        if(localIds.has(sr.id)){
          // 서버에 메시지가 더 많으면 서버 우선
          const local = rooms.find(r=>r.id===sr.id);
          if(local && Array.isArray(sr.messages) && sr.messages.length > (local.messages||[]).length){
            Object.assign(local, {messages: sr.messages, name: sr.name||local.name});
            changed = true;
          }
        } else {

var _sideSearchTimer = null;
function doSideSearchLive(v){
  clearTimeout(_sideSearchTimer);
  _sideSearchTimer = setTimeout(function(){
    var q = (v||'').trim();
    if(!q){
      // 검색어 비우면 패널 닫기

function doSideSearch(){
  var q=(document.getElementById('sideSearch').value||'').trim().toLowerCase();
  if(!q)return;
  var panel=document.getElementById('searchPanel');
  var list=document.getElementById('searchPanelList');
  var title=document.getElementById('searchPanelTitle');
  panel.style.display='block';
  panel.style.background=document.body.classList.contains('dark')?'#0d1117':'#fff';
  panel.style.color=document.body.classList.contains('dark')?'#e6edf3':'#111827';
  title.textContent='"'+q+'" 검색 결과';
  var html=[];var found=0;

  // 게시글 검색
  var matchedPosts=(typeof posts!=='undefined'?posts:[]).filter(function(p){
    return ((p.title||'')+' '+(p.body||'')+' '+(p.category||'')).toLowerCase().includes(q);
  });
  if(matchedPosts.length){
    html.push('<div style="font-weight:800;font-size:.82rem;color:#6b7280;margin:12px 0 6px">📋 게시글 ('+matchedPosts.length+')</div>');
    matchedPosts.forEach(function(p){
      var div=document.createElement('div');
      div.style.cssText='padding:10px 14px;border-radius:12px;cursor:pointer;border:1px solid #e5e7eb;margin-bottom:6px';
      div.innerHTML='<div style="font-weight:700;font-size:.9rem">'+esc(p.title||'제목없음')+'</div>'+
        '<div style="font-size:.78rem;color:#6b7280;margin-top:2px">'+(p.category||'기본')+'</div>'+
        (p.body?'<div style="font-size:.8rem;color:#374151;margin-top:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+esc(p.body.slice(0,100))+'</div>':'');
      div.addEventListener('click',function(){openBoard();closeSearchPanel();});
      html.push(div.outerHTML);
      found++;
    });
  }

  // 채팅방 검색
  var allRooms=[];
  try{allRooms=(typeof rooms!=='undefined'?rooms:(JSON.parse(localStorage.getItem('stella_rooms_final_v82')||'[]')));}catch(e){}
  var matchedRooms=allRooms.filter(function(r){
    var msgs=(r.messages||[]).map(function(m){return m.content||m.text||m.role||'';}).join(' ');
    return ((r.name||r.title||'')+' '+msgs).toLowerCase().includes(q);
  });
  if(matchedRooms.length){
    html.push('<div style="font-weight:800;font-size:.82rem;color:#6b7280;margin:12px 0 6px">💬 채팅 ('+matchedRooms.length+')</div>');
    matchedRooms.forEach(function(r){
      var rid=r.id;
      html.push('<div data-sroom="'+esc(rid)+'" style="padding:10px 14px;border-radius:12px;cursor:pointer;border:1px solid #e5e7eb;margin-bottom:6px">'+
        '<div style="font-weight:700;font-size:.9rem">'+esc(r.name||r.title||'채팅방')+'</div>'+
        '<div style="font-size:.78rem;color:#6b7280;margin-top:2px">'+((r.messages||[]).length)+'개 메시지</div>'+
        '</div>');
      found++;
    });
  }

  if(!found){
    list.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af">검색 결과 없음: "'+q+'"</div>';
    return;
  }

  list.innerHTML=html.join('');
  // 채팅방 클릭 이벤트 위임
  list.querySelectorAll('[data-sroom]').forEach(function(el){
    el.addEventListener('click',function(){
      var rid=el.getAttribute('data-sroom');
      if(typeof openRoom==='function')openRoom(rid);
      closeSearchPanel();
    });
  });
}

function openNoteEdit(id, title){

  if(!p) return;
  _curNoteId = id;
  document.getElementById('noteTitleInput').value = p.title||'';

function saveCurrentNote(){
  const title = (document.getElementById('noteTitleInput').value||'').trim();
  const body = (document.getElementById('noteBodyInput').value||'').trim();
  if(!title) { alert('제목을 입력하세요.'); return; }
  if(_curNoteId){
    const idx = posts.findIndex(function(p){return p.id===_curNoteId;});
    if(idx!==-1){posts[idx].title=title;posts[idx].body=body;posts[idx].updatedAt=new Date().toISOString();}
  } else {
    posts.unshift({id:'note_'+uid(),owner:user.id,title,body,category:'노트',createdAt:new Date().toISOString()});
    _curNoteId = posts[0].id;
  }
  savePosts();
  document.getElementById('noteMeta').textContent = '저장됨 · '+new Date().toLocaleString('ko-KR');
  // Drive 저장 (/api/note - users/{userId}/notes/{id}.json, soft delete 지원)
  try{
    fetch('/api/note?action=save',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        id: _curNoteId,
        userId: user.id,
        title: title,
        body: body
      })
    }).catch(function(e){console.warn('[Note] Drive 저장 실패:',e.message);});
  }catch(e){}
}

function deleteCurrentNote(){
  if(!_curNoteId){ closeNoteEditor(); return; }
  if(!confirm('이 노트를 삭제하시겠습니까?')) return;
  // 로컬에서 제거
  posts = posts.filter(function(p){return p.id!==_curNoteId;});
  savePosts();
  // Drive soft delete (deleted:true 플래그 - 파일은 실제 삭제 안 함)
  var delId = _curNoteId;
  try{
    fetch('/api/note?action=delete',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ id: delId, userId: user.id })
    }).catch(function(e){console.warn('[Note] Drive soft delete 실패:',e.message);});
  }catch(e){}
  closeNoteEditor();
}

function renameProject(pid){const p=projects.find(x=>x.id===pid);if(!p)return;const n=prompt('프로젝트 이름 변경',p.name);if(n?.trim()){p.name=n.trim();saveProjects();renderAll()}}function deleteProject(pid){const p=projects.find(x=>x.id===pid);if(!p)return;if(!confirm(`"${p.name}" 프로젝트를 삭제할까요?\n채팅은 미분류로 이동됩니다.`))return;rooms.forEach(r=>{if(r.projectId===pid)r.projectId=null});projects=projects.filter(x=>x.id!==pid);activeProjectId='all';saveProjects();saveRooms();renderAll()}function renameRoom(rid){const r=rooms.find(x=>x.id===rid);if(!r)return;const n=prompt('채팅방 이름 변경',r.name);if(n?.trim()){r.name=n.trim();saveRooms();renderAll()}}function pickProject(){const list=['0. 미분류',...projects.map((p,i)=>`${i+1}. ${p.name}`)].join('\n');const v=prompt('프로젝트 번호 선택\n\n'+list,'0');if(v===null)return undefined;const n=Number(v);if(!Number.isInteger(n)||n<0||n>projects.length)return undefined;return n===0?null:projects[n-1].id}function moveRoom(rid){const r=rooms.find(x=>x.id===rid);const p=pickProject();if(!r||p===undefined)return;r.projectId=p;activeProjectId=p||'none';saveRooms();renderAll()}function copyRoom(rid){const r=rooms.find(x=>x.id===rid);const p=pickProject();if(!r||p===undefined)return;const c={...r,id:'r_'+uid(),projectId:p,name:r.name+' 복사본',messages:r.messages.map(m=>({...m}))};rooms.unshift(c);activeRoomId=c.id;activeProjectId=p||'none';saveRooms();renderAll()}function deleteRoom(rid){const r=rooms.find(x=>x.id===rid);if(!r)return;if(!confirm(`"${r.name}" 채팅방을 삭제할까요?`))return;rooms=rooms.filter(x=>x.id!==rid);if(activeRoomId===rid)activeRoomId=rooms[0]?.id||null;saveRooms();renderAll()}
function renamePost(pid){const p=posts.find(x=>x.id===pid);if(!p)return;const n=prompt('게시글 제목 변경',p.title);if(n?.trim()){p.title=n.trim();savePosts();renderAll()}}function deletePost(pid){const p=posts.find(x=>x.id===pid);if(!p)return;if(confirm(`"${p.title}" 게시글을 삭제할까요?`)){posts=posts.filter(x=>x.id!==pid);savePosts();renderAll()}}function renameCategory(c){const n=prompt('카테고리 이름 변경',c);if(n?.trim()){posts.forEach(p=>{if((p.category||'기본')===c)p.category=n.trim()});savePosts();renderAll()}}function deleteCategory(c){if(confirm(`"${c}" 카테고리와 게시글을 삭제할까요?`)){posts=posts.filter(p=>(p.category||'기본')!==c);savePosts();renderAll()}}
function renderMessages(){const r=activeRoom(),box=$('#messages');box.innerHTML='';(r?.messages||[]).forEach(m=>addMessage(m.role,m.text,false));box.scrollTop=box.scrollHeight;renderHeader()}function addMessage(role,text,persist=true,meta={}){const box=$('#messages'),row=document.createElement('div');row.className='row '+role;if(role==='ai'){const av=document.createElement('div');av.className='avatar';av.textContent='S';row.appendChild(av)}const b=document.createElement('div');b.className='bubble';role==='ai'?renderAnswer(b,text):b.textContent=text;if(role==='user'&&meta.attachments?.length){const d=document.createElement('div');d.style.marginTop='8px';d.style.color='#6b7280';d.textContent=meta.attachments.map(f=>'첨부 '+f.name).join(', ');b.appendChild(d)}row.appendChild(b);box.appendChild(row);box.scrollTop=box.scrollHeight;if(persist){const r=activeRoom();r.messages.push({role,text});if(role==='user'&&(r.name==='새 채팅'||!r.name))r.name=text.slice(0,28)||'첨부 파일 분석';saveRooms();renderHeader();renderProjectTree();renderChatTree()}}
function renderAnswer(el,text){const tools=document.createElement('div');tools.className='download-tools';const stamp=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);tools.append(btn('TXT 다운로드',()=>downloadText(`stella-answer-${stamp}.txt`,text,'text/plain;charset=utf-8')));tools.append(btn('Markdown 다운로드',()=>downloadText(`stella-answer-${stamp}.md`,text,'text/markdown;charset=utf-8')));el.appendChild(tools);String(text||'').split(/\n{2,}/).map(x=>x.trim()).filter(Boolean).forEach(t=>{const pp=document.createElement('p');pp.textContent=t;el.appendChild(pp)})}
function btn(t,fn){const b=document.createElement('button');b.className='download-btn';b.type='button';b.textContent=t;b.onclick=fn;return b}function downloadText(name,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1000)}function roomText(r=activeRoom()){return (r?.messages||[]).map(m=>`${m.role==='ai'?'Stella':'나'}:\n${m.text}`).join('\n\n---\n\n')}
async function extractFile(file){const name=file.name||'file',lower=name.toLowerCase(),type=file.type||'';try{if(type.startsWith('image/')||/\.(png|jpe?g|webp|bmp)$/i.test(lower)){const dataUrl=await readData(file);let text=`[이미지 첨부: ${name}]`;if(window.Tesseract){try{const res=await Tesseract.recognize(dataUrl,'kor+eng');text+='\n\n[OCR 추출 텍스트]\n'+(res?.data?.text?.trim()||'추출된 텍스트 없음')}catch(e){text+='\n\n[OCR 오류] '+(e.message||e)}}return{name,type,size:file.size,dataUrl,text}}if(lower.endsWith('.pdf')&&window.pdfjsLib){const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;let pages=[];for(let p=1;p<=Math.min(pdf.numPages,30);p++){const page=await pdf.getPage(p),tc=await page.getTextContent();pages.push(`[PDF ${p}페이지]\n`+tc.items.map(i=>i.str).join(' '))}return{name,type,size:file.size,text:pages.join('\n\n')}}if(/\.docx$/i.test(lower)&&window.mammoth){const r=await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});return{name,type,size:file.size,text:r.value||''}}if(/\.(xlsx|xls|csv)$/i.test(lower)&&window.XLSX){const wb=XLSX.read(await file.arrayBuffer(),{type:'array'});return{name,type,size:file.size,text:wb.SheetNames.map(sn=>`[시트: ${sn}]\n`+XLSX.utils.sheet_to_csv(wb.Sheets[sn])).join('\n\n')}}return{name,type,size:file.size,text:await file.text()}}catch(e){return{name,type,size:file.size,text:`파일 읽기 오류: ${e.message||e}`}}}function readData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||''));r.onerror=()=>rej(r.error);r.readAsDataURL(file)})}async function processFiles(list){for(const f of [...list])files.push(await extractFile(f));renderChips()}function renderChips(){$('#chips').innerHTML=files.map((f,i)=>`<span class="chip">첨부 ${esc(f.name.length>28?f.name.slice(0,25)+'...':f.name)} <button data-rmfile="${i}" type="button">×</button></span>`).join('');$$('[data-rmfile]').forEach(b=>b.onclick=()=>{files.splice(Number(b.dataset.rmfile),1);renderChips()})}

function getUserPrefsKey(){return 'stella_prefs_'+(user?.id||'guest');}
function saveUserPrefs(){
  try{
    var prefs={
      // theme은 stella_theme 키로만 관리
      model: (document.getElementById('modelSelect')||{}).value||'gpt-4o',
      sidebarCollapsed: document.getElementById('app')?.classList.contains('sidebar-collapsed')||false,
      manageOpen: read(K.manage,false)
    };
    localStorage.setItem(getUserPrefsKey(), JSON.stringify(prefs));
  }catch(e){}
}
function loadUserPrefs(){
  try{
    var raw=localStorage.getItem(getUserPrefsKey());
    // 저장된 prefs 없으면 dark 기본값 적용
    if(!raw){
      document.body.classList.add('dark');
      var tb=document.getElementById('themeToggle');
      if(tb)tb.textContent='☀️';
      return;
    }
    var prefs=JSON.parse(raw);
    // 테마: loadUserPrefs에서 건드리지 않음 — applyStellaTheme()이 전담
    // 모델
    if(prefs.model){
      var ms=document.getElementById('modelSelect');
      if(ms){
        // 옵션에 있으면 선택, 없으면 무시
        var opt=[...ms.options].find(function(o){return o.value===prefs.model;});
        if(opt)ms.value=prefs.model;
      }
    }
    // 사이드바 상태 (데스크탑)
    if(prefs.sidebarCollapsed&&!isMobileView()){
      document.getElementById('app')?.classList.add('sidebar-collapsed');
    }
  }catch(e){}
}
function toggleStellaTheme(){var d=document.body.classList.toggle('dark');try{localStorage.setItem('stella_theme',d?'dark':'light');}catch(e){}var b=document.getElementById('themeToggle');if(b)b.textContent=d?'☀️':'🌙';saveUserPrefs();}
function applyStellaTheme(){var t='dark';try{var saved=localStorage.getItem('stella_theme');t=saved||'dark';}catch(e){}if(t==='dark'){document.body.classList.add('dark');}else{document.body.classList.remove('dark');}var b=document.getElementById('themeToggle');if(b)b.textContent=t==='dark'?'☀️':'🌙';}

// 채팅 히스토리 Drive에서 로드 (새로 접속 시)
async function loadChatHistoryFromDrive(){
  try{
    const r=await fetch('/api/hybrid-chat-list?userId='+encodeURIComponent(user.id),{cache:'no-store'});
    if(!r.ok)return;
    const d=await r.json();
    // hybrid-chat-list는 items 반환, 호환 처리
    const chatItems = d.rooms || d.items || [];
    if(!d.ok||!chatItems.length)return;
    const localIds=new Set((rooms||[]).map(function(r){return r.id;}));
    let added=0;
    chatItems.forEach(function(dr){
      const rid = dr.id || dr.room_id;
      if(!rid) return;
      if(!localIds.has(rid)){
        rooms.push({
          id: rid,
          name: dr.title || dr.name || '복원된 채팅',
          owner: user.id,
          messages: dr.messages || [],
          projectId: dr.projectId || dr.project_id || '',
          createdAt: dr.createdAt || dr.created_at || new Date().toISOString()
        });
        added++;
        localIds.add(rid);
      }
    });
    if(added>0){saveRooms();renderAll();console.log('[Drive] 채팅 '+added+'개 복원');}
  }catch(e){console.warn('[Drive] 채팅 로드 실패:',e.message);}
}

// ── Drive에서 노트/게시글 복원 ──
async function loadNotesFromDrive(){
  if(!user||!user.id) return;
  try{
    // /api/note 전용 API 사용 (Drive users/{userId}/notes/ 구조, deleted 제외)
    const r=await fetch('/api/note?action=list&userId='+encodeURIComponent(user.id),{cache:'no-store'});
    if(!r.ok) return;
    const d=await r.json();
    if(!d.ok) return;
    const driveNotes = d.notes || [];
    if(!driveNotes.length) return;
    // 로컬에 없는 것만 추가 (id 기준)
    const localIds=new Set((posts||[]).map(function(p){return p.id||p.postId;}));
    let added=0;
    driveNotes.forEach(function(dn){
      const id=dn.id||dn.postId;
      if(!id || dn.deleted) return;  // soft delete 제외
      if(!localIds.has(id)){
        posts.unshift({
          id: id,
          owner: user.id,
          title: dn.title||'(제목없음)',
          body: dn.body||dn.content||'',
          category: dn.category||'노트',
          createdAt: dn.createdAt||new Date().toISOString(),
          updatedAt: dn.updatedAt||dn.createdAt||new Date().toISOString()
        });
        added++;
        localIds.add(id);
      }
    });
    if(added>0){
      savePosts();
      renderNoteList();
      renderBoardTree();
      renderAll();
      console.log('[Drive] 노트 '+added+'개 복원');
    }
  }catch(e){console.warn('[Drive] 노트 로드 실패:',e.message);}
}

// ── Drive에서 프로젝트 카테고리 복원 (Azure SQL workspace_state) ──
async function loadProjectsFromDrive(){
  if(!user||!user.id) return;
  try{
    const r=await fetch('/api/workspace?owner='+encodeURIComponent(user.id),{cache:'no-store'});
    if(!r.ok) return;
    const d=await r.json();
    if(!d.ok) return;
    let changed=false;
    // 프로젝트 복원
    if(Array.isArray(d.projects)&&d.projects.length){
      const localProjIds=new Set((projects||[]).map(function(p){return p.id;}));
      d.projects.forEach(function(dp){
        if(dp.id&&!localProjIds.has(dp.id)){
          projects.push({id:dp.id,owner:user.id,name:dp.name||dp.id,createdAt:dp.createdAt||new Date().toISOString()});
          localProjIds.add(dp.id);
          changed=true;
        }
      });
      if(changed){saveProjects();}
    }
    // 채팅방 추가 복원 (workspace_state.rooms_json)
    if(Array.isArray(d.rooms)&&d.rooms.length){
      const localRoomIds=new Set((rooms||[]).map(function(r){return r.id;}));
      d.rooms.forEach(function(dr){
        if(dr.id&&!localRoomIds.has(dr.id)){
          rooms.push({id:dr.id,owner:user.id,name:dr.name||'복원된 채팅',messages:dr.messages||[],projectId:dr.projectId||'',createdAt:dr.createdAt||new Date().toISOString()});
          localRoomIds.add(dr.id);
          changed=true;
        }
      });
      if(changed){saveRooms();}
    }
    if(changed){renderAll();console.log('[Drive] 프로젝트/채팅 workspace 복원 완료');}
  }catch(e){console.warn('[Drive] 프로젝트 로드 실패:',e.message);}
}

function renderAnswer(el,text){const stamp=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);const hasTable=tableRowsFromText(text).length>0;if(wantsDownload()||hasTable){const tools=document.createElement('div');tools.className='download-tools';const xl=xlsxUrlFromText(text);tools.append(makeDownloadLink('📥 Excel 파일 다운로드','stella-answer-'+stamp+'.'+xl.ext,xl.url));if(wantsDownload()){tools.append(makeDownloadLink('TXT 다운로드','stella-answer-'+stamp+'.txt',blobUrl(text,'text/plain;charset=utf-8')));tools.append(btn('Word 다운로드',function(){downloadDocFromText('stella-answer-'+stamp+'.doc',text)}));tools.append(btn('PPT 다운로드',function(){downloadPptFromText('stella-answer-'+stamp+'.ppt',text)}));tools.append(makeDownloadLink('Markdown 다운로드','stella-answer-'+stamp+'.md',blobUrl(text,'text/markdown;charset=utf-8')))}el.appendChild(tools)}renderMarkdownLite(el,text)}
