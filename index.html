.menu-backdrop{position:fixed;inset:0;z-index:110;background:rgba(15,23,42,.28);backdrop-filter:blur(2px);display:none}.menu-backdrop.active{display:block}.bottom-menu{position:absolute;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));background:#fff;border:1px solid #e5e7eb;border-radius:22px;box-shadow:var(--shadow);padding:10px}.menu-title{padding:12px 14px 10px;color:#64748b;border-bottom:1px solid #eef2f7;margin-bottom:6px;word-break:break-word}.menu-item{width:100%;border:0;background:#fff;color:#0f172a;border-radius:14px;padding:14px;text-align:left;font-size:1.05rem;font-weight:900}.menu-item:hover,.menu-item:active{background:#f1f5f9}.menu-item.danger{color:var(--danger)}
.board-panel{position:fixed;right:0;top:0;bottom:0;width:min(560px,100%);z-index:95;background:#fff;border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(15,23,42,.12);display:none;flex-direction:column}.board-panel.active{display:flex}.board-head{height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line)}.board-body{padding:16px;overflow:auto}.board-form{display:grid;gap:9px;margin-bottom:16px}.board-form input,.board-form textarea,.board-form select{border:1px solid #d1d5db;border-radius:13px;padding:12px}.board-form textarea{min-height:96px;resize:vertical}.post{border:1px solid var(--line);border-radius:15px;padding:13px;margin:8px 0;background:#fff}.post p{white-space:pre-wrap;line-height:1.7;color:#374151;margin-top:6px}.post small{display:block;color:#9ca3af;margin-top:8px}.drag-over{outline:2px dashed #2563eb;outline-offset:-8px;background:#eff6ff!important}

</style>

<style>

<div class="app" id="app" style="display:none">

function openMenu(title,items){const mb=$("#menuBackdrop"),m=$("#bottomMenu");m.innerHTML=`<div class="menu-title">${esc(title)}</div>`+items.map((it,i)=>`<button class="menu-item ${it.danger?'danger':''}" data-mi="${i}">${esc(it.label)}</button>`).join("")+`<button class="menu-item" data-cancel>취소</button>`;m.querySelectorAll('[data-mi]').forEach(b=>b.onclick=()=>{mb.classList.remove('active');items[Number(b.dataset.mi)].action()});m.querySelector('[data-cancel]').onclick=()=>mb.classList.remove('active');mb.classList.add('active')}function bindLongPress(root,resolver){if(!root||root.dataset.lp)return;root.dataset.lp=1;let t=null,info=null,x=0,y=0;const clear=()=>{if(t)clearTimeout(t);t=null;info=null};root.addEventListener('pointerdown',e=>{info=resolver(e.target);if(!info)return;x=e.clientX;y=e.clientY;t=setTimeout(()=>{if(info.type==='project')openMenu(info.title,[{label:'프로젝트 이름 변경',action:()=>renameProject(info.id)},{label:'프로젝트 삭제',danger:true,action:()=>deleteProject(info.id)}]);else if(info.type==='room')openMenu(info.title,[{label:'채팅방 이름 변경',action:()=>renameRoom(info.id)},{label:'프로젝트로 이동',action:()=>moveRoom(info.id)},{label:'프로젝트로 복사',action:()=>copyRoom(info.id)},{label:'채팅방 삭제',danger:true,action:()=>deleteRoom(info.id)}]);else if(info.type==='cat')openMenu(info.title,[{label:'게시글 추가',action:()=>{openBoard();$("#postCategorySelect").value=info.id;$("#postTitle").focus()}},{label:'카테고리 이름 변경',action:()=>renameCategory(info.id)},{label:'카테고리 삭제',danger:true,action:()=>deleteCategory(info.id)}]);else if(info.type==='post')openMenu(info.title,[{label:'게시글 이름 변경',action:()=>renamePost(info.id)},{label:'게시글 삭제',danger:true,action:()=>deletePost(info.id)}]);clear()},650)},true);root.addEventListener('pointermove',e=>{if(t&&(Math.abs(e.clientX-x)>12||Math.abs(e.clientY-y)>12))clear()},true);['pointerup','pointercancel','pointerleave'].forEach(ev=>root.addEventListener(ev,clear,true));root.addEventListener('contextmenu',e=>{const i=resolver(e.target);if(!i)return;e.preventDefault();if(i.type==='room')openMenu(i.title,[{label:'채팅방 이름 변경',action:()=>renameRoom(i.id)},{label:'프로젝트로 이동',action:()=>moveRoom(i.id)},{label:'프로젝트로 복사',action:()=>copyRoom(i.id)},{label:'채팅방 삭제',danger:true,action:()=>deleteRoom(i.id)}])},true)}

function addMessage(role,text,persist=true,meta={}){const box=$("#messages");const row=document.createElement('div');row.className='row '+role;const b=document.createElement('div');b.className='bubble';role==='ai'?renderAnswer(b,text):b.textContent=text;if(role==='user'&&meta.attachments?.length){const d=document.createElement('div');d.className='attachment-preview';d.style.marginTop='8px';d.textContent=meta.attachments.map(f=>'첨부 '+f.name).join(', ');b.appendChild(d)}row.appendChild(b);box.appendChild(row);box.scrollTop=box.scrollHeight;if(persist){const r=activeRoom();r.messages.push({role,text});if(role==='user'&&(r.name==='새 채팅'||!r.name))r.name=text.slice(0,28)||'첨부 파일 분석';saveRooms();renderProjectTree();$("#activeTitle").textContent=r.name;$("#activeSub").textContent=`${r.messages.length}개 메시지 · ${projectName(r.projectId)}`}}

function btn(t,fn){const b=document.createElement('button');b.className='download-btn';b.type='button';b.textContent=t;b.onclick=fn;return b}function downloadText(name,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1000)}function roomText(r=activeRoom()){return (r?.messages||[]).map(m=>`${m.role==='ai'?'Stella':'나'}:\n${m.text}`).join('\n\n---\n\n')}

  function isAdminNow(){const u=me();try{return !!u&&(u.role==='admin'||ADMIN_EMAILS.includes(String(u.email||'').toLowerCase()))}catch{return false}}
  function roomsAll(){return readJson(MEMBER_ROOMS_KEY,[])}
  function saveMemberRooms(v){writeJson(MEMBER_ROOMS_KEY,v)}
  function roomName(r){return r?.name||'회원 채팅방'}
  function ensureTools(){
    const tools=q('.tools'); if(!tools)return;
    const n=q('#newProjectBtn'); if(n)n.textContent='▱ 새 채팅 카테고리';
    const openBoard=q('#openBoardBtn'); if(openBoard)openBoard.textContent='게시판';
    let btn=q('#memberChatBtn');
    if(!btn){btn=document.createElement('button');btn.className='tool-btn member-chat-btn';btn.id='memberChatBtn';btn.type='button';btn.textContent='회원 채팅';tools.appendChild(btn)}
    btn.onclick=openMemberV72;
    const st=qa('.section-title').find(x=>x.textContent.trim()==='프로젝트'); if(st)st.textContent='채팅 카테고리';
  }
  function createMemberRoom(){
    const others=usersAll().filter(u=>u.id!==myId());
    let name=prompt('새 회원 채팅방 이름','새 회원 채팅'); if(!name)return;
    let memberIds=[myId()];
    if(others.length){
      const list=others.map((u,i)=>`${i+1}. ${u.name||u.id} (${u.id})`).join('\n');
      const pick=prompt('초대할 회원 번호를 쉼표로 입력하세요.\n나중에 초대도 가능합니다.\n\n'+list,'');
      if(pick){pick.split(',').map(x=>parseInt(x.trim(),10)-1).forEach(i=>{if(others[i])memberIds.push(others[i].id)})}
    }
    const arr=roomsAll(); const r={id:'mr_'+Date.now()+Math.random().toString(36).slice(2,6),name:name.trim(),owner:myId(),members:[...new Set(memberIds)],left:[],messages:[],createdAt:new Date().toISOString()};
    arr.unshift(r); saveMemberRooms(arr); activeMemberRoomId=r.id; renderMemberV72();
  }
  function visibleRooms(){return roomsAll().filter(r=>(r.members||[]).includes(myId()) && !(r.left||[]).includes(myId()))}
  function activeMRoom(){let list=visibleRooms(); if(!activeMemberRoomId||!list.some(r=>r.id===activeMemberRoomId))activeMemberRoomId=list[0]?.id||null; return list.find(r=>r.id===activeMemberRoomId)||null}
  function inviteMember(){
    const r=activeMRoom(); if(!r)return alert('채팅방을 먼저 선택하세요.');
    const candidates=usersAll().filter(u=>u.id!==myId() && !(r.members||[]).includes(u.id));
    if(!candidates.length)return alert('초대할 수 있는 회원이 없습니다.');
    const list=candidates.map((u,i)=>`${i+1}. ${u.name||u.id} (${u.id})`).join('\n');
    const pick=prompt('초대할 회원 번호를 입력하세요.\n여러 명은 쉼표로 구분합니다.\n\n'+list,''); if(!pick)return;
    const arr=roomsAll(); const target=arr.find(x=>x.id===r.id); if(!target)return;
    pick.split(',').map(x=>parseInt(x.trim(),10)-1).forEach(i=>{if(candidates[i])target.members.push(candidates[i].id)});
    target.members=[...new Set(target.members)]; target.left=(target.left||[]).filter(id=>!target.members.includes(id)); saveMemberRooms(arr); renderMemberV72();
  }
  function leaveMemberRoom(){const r=activeMRoom(); if(!r)return; if(!confirm('이 채팅방을 나가시겠습니까?'))return; const arr=roomsAll(); const t=arr.find(x=>x.id===r.id); if(t){t.left=[...new Set([...(t.left||[]),myId()])]; saveMemberRooms(arr); activeMemberRoomId=null; renderMemberV72();}}
  function fileToDataUrl(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(String(fr.result||''));fr.onerror=rej;fr.readAsDataURL(file)})}
  async function sendMemberV72(){
    const r=activeMRoom(); if(!r)return alert('회원 채팅방을 먼저 생성하세요.');
    const text=(q('#memberTextV72')?.value||'').trim(); const link=(q('#memberDriveLinkV72')?.value||'').trim(); const file=q('#memberFileV72')?.files?.[0];
    if(!text&&!link&&!file)return alert('메시지, 파일, Google Drive 링크 중 하나를 입력해 주세요.');
    let fileDataUrl='',fileName=''; if(file){ if(file.size>8*1024*1024){alert('8MB 이하 파일만 임시 저장합니다. 큰 파일은 Google Drive 링크로 공유하세요.');return} fileDataUrl=await fileToDataUrl(file); fileName=file.name; }
    const arr=roomsAll(); const target=arr.find(x=>x.id===r.id); if(!target)return;
    target.messages=target.messages||[]; target.messages.push({id:'mm_'+Date.now(),from:myId(),fromName:me()?.name||myId(),text,driveLink:link,fileName,fileDataUrl,createdAt:new Date().toLocaleString()}); saveMemberRooms(arr);
    q('#memberTextV72').value=''; q('#memberDriveLinkV72').value=''; q('#memberFileV72').value=''; renderMemberV72();
  }
  function renderMemberV72(){
    const body=q('#memberPanel .member-body'); if(!body)return;
    const list=visibleRooms(); const r=activeMRoom();
    body.innerHTML=`
      <div class="member-layout">
        <div class="member-room-list">
          <button class="member-room" id="createMemberRoomV72"><b>＋ 새 대화방</b><small>카카오톡처럼 회원 초대</small></button>
          ${list.map(x=>`<button class="member-room ${x.id===activeMemberRoomId?'active':''}" data-mroom="${esc2(x.id)}"><b>${esc2(x.name)}</b><small>${(x.messages||[]).length}개 메시지 · ${(x.members||[]).length}명</small></button>`).join('')}
        </div>
        <div class="member-chat-area">
          <div class="member-chat-top"><b>${esc2(r?roomName(r):'회원 채팅')}</b><button class="small-btn" id="inviteMemberV72" type="button">초대</button><button class="small-btn" id="leaveMemberV72" type="button">나가기</button></div>
          <div class="member-msg-list" id="memberMsgListV72">
            ${r?(r.messages||[]).map(m=>{const mine=m.from===myId();const drive=m.driveLink?`<a class="member-file member-drive-link" href="${esc2(m.driveLink)}" target="_blank" rel="noopener" data-drive="${esc2(m.driveLink)}">Google Drive 열기</a>`:'';const file=m.fileDataUrl?`<a class="member-file" href="${m.fileDataUrl}" download="${esc2(m.fileName||'file')}">파일 다운로드: ${esc2(m.fileName||'file')}</a>`:'';return `<div class="member-msg ${mine?'me':''}"><b>${mine?'나':esc2(m.fromName||m.from)}</b><div>${esc2(m.text||'')}</div>${file}${drive}<small>${esc2(m.createdAt||'')}</small></div>`}).join(''):'<p class="member-note">새 대화방을 만들어 회원을 초대하세요.</p>'}
          </div>
          <div class="member-compose"><input id="memberDriveLinkV72" type="url" placeholder="Google Drive 공유 링크 붙여넣기(선택)"><input id="memberFileV72" type="file"><div class="member-compose-row"><textarea id="memberTextV72" placeholder="메시지를 입력하세요."></textarea><button class="primary" id="memberSendV72" type="button">전송</button></div></div>
        </div>
      </div>
      ${isAdminNow()?`<div class="admin-accordion"><button class="admin-toggle" id="adminToggleV72" type="button">관리자 사용자 생성 접기/펼치기</button><div class="admin-content" id="adminContentV72"><p class="member-note">관리자 이메일: yesblue0342@naver.com / yesblue0342@gmail.com</p><div class="member-admin-grid"><input id="adminNewNameV72" placeholder="이름"><input id="adminNewIdV72" placeholder="아이디"><input id="adminNewEmailV72" placeholder="이메일"><input id="adminNewBirthV72" placeholder="생년월일 예: 1982-04-30"><input id="adminNewPwV72" placeholder="임시 비밀번호" type="password"><button class="primary" id="adminCreateUserV72" type="button">사용자 생성</button></div></div></div>`:''}
    `;
    q('#createMemberRoomV72').onclick=createMemberRoom;
    qa('[data-mroom]').forEach(b=>b.onclick=()=>{activeMemberRoomId=b.dataset.mroom;renderMemberV72()});
    const inv=q('#inviteMemberV72'); if(inv)inv.onclick=inviteMember; const le=q('#leaveMemberV72'); if(le)le.onclick=leaveMemberRoom; const send=q('#memberSendV72'); if(send)send.onclick=sendMemberV72;
    const ta=q('#memberTextV72'); if(ta)ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMemberV72()}});
    const at=q('#adminToggleV72'); if(at)at.onclick=()=>q('#adminContentV72').classList.toggle('open');
    const ac=q('#adminCreateUserV72'); if(ac)ac.onclick=createUserAdminV72;
    const msg=q('#memberMsgListV72'); if(msg)msg.scrollTop=msg.scrollHeight;
    qa('.member-drive-link').forEach(a=>{let t=null;a.addEventListener('pointerdown',e=>{t=setTimeout(()=>{e.preventDefault();openMenu('Google Drive 링크',[{label:'링크 열기',action:()=>window.open(a.dataset.drive,'_blank')},{label:'링크 복사',action:()=>navigator.clipboard?.writeText(a.dataset.drive)}])},550)});['pointerup','pointercancel','pointerleave'].forEach(ev=>a.addEventListener(ev,()=>{if(t)clearTimeout(t)}))});
  }
  function createUserAdminV72(){
    if(!isAdminNow())return alert('관리자만 사용자 생성이 가능합니다.');
    const name=q('#adminNewNameV72').value.trim(), uid=q('#adminNewIdV72').value.trim(), email=q('#adminNewEmailV72').value.trim().toLowerCase(), birth=q('#adminNewBirthV72').value.trim(), pw=q('#adminNewPwV72').value;
    if(!name||!uid||!email||!birth||!pw)return alert('모든 항목을 입력하세요.');
    const list=usersAll(); if(list.some(u=>u.id===uid))return alert('이미 사용 중인 아이디입니다.');
    const pwHash=(typeof hash==='function')?hash(pw):btoa(unescape(encodeURIComponent(pw)));
    list.push({id:uid,name,email,birth,passwordHash:pwHash,role:(ADMIN_EMAILS||[]).includes(email)?'admin':'user',createdAt:new Date().toISOString(),createdBy:myId()});
    writeJson(K.users,list); alert('사용자를 생성했습니다.'); renderMemberV72();
  }
  function openMemberV72(){const p=q('#memberPanel'),b=q('#memberBackdrop'); if(p)p.classList.add('active'); if(b)b.classList.add('active'); renderMemberV72(); try{closeSidebar()}catch(e){}}
  function closeMemberV72(){const p=q('#memberPanel'),b=q('#memberBackdrop'); if(p)p.classList.remove('active'); if(b)b.classList.remove('active')}
  function patchProjectTreeLongPress(){
    // Rebind explicit context/long press after every render so rename/move/copy stays alive.
    const tree=q('#projectTree'); if(!tree)return;
    qa('[data-room]').forEach(btn=>{btn.oncontextmenu=e=>{e.preventDefault(); const rid=btn.dataset.room; const r=(rooms||[]).find(x=>x.id===rid); openMenu(r?.name||'채팅방',[{label:'채팅방 이름 변경',action:()=>renameRoom(rid)},{label:'프로젝트로 이동',action:()=>moveRoom(rid)},{label:'프로젝트로 복사',action:()=>copyRoom(rid)},{label:'채팅방 삭제',danger:true,action:()=>deleteRoom(rid)}]);};});
  }
  function bindV72(){
    ensureTools(); const btn=q('#memberChatBtn'); if(btn)btn.onclick=openMemberV72; const close=q('#closeMemberBtn'); if(close)close.onclick=closeMemberV72; const back=q('#memberBackdrop'); if(back)back.onclick=closeMemberV72;
    patchProjectTreeLongPress();
  }
  const oldRenderAll=window.renderAll; if(typeof oldRenderAll==='function'){window.renderAll=function(){oldRenderAll.apply(this,arguments);setTimeout(bindV72,0)}}
  const oldRenderProjectTree=window.renderProjectTree; if(typeof oldRenderProjectTree==='function'){window.renderProjectTree=function(){oldRenderProjectTree.apply(this,arguments);setTimeout(bindV72,0)}}
  window.addEventListener('DOMContentLoaded',bindV72); window.addEventListener('load',bindV72); setTimeout(bindV72,500); setTimeout(bindV72,1500);
})();
</script>

<script id="stella-v75-patch">
(function(){
  function qs(s){return document.querySelector(s)}
  function qsa(s){return Array.from(document.querySelectorAll(s))}
  function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
  function byId(id){return document.getElementById(id)}

  /* 1) 사이드바 열기/닫기 안정화: 기존 패치와 충돌하지 않도록 최종 override */
  window.openSidebar=function(){
    const side=byId('sidebar'); const back=byId('sidebarBackdrop');
    if(side) side.classList.add('open');
    if(back) back.classList.add('active');
    document.body.classList.add('sidebar-open');
  };
  window.closeSidebar=function(){
    const side=byId('sidebar'); const back=byId('sidebarBackdrop');
    if(side) side.classList.remove('open');
    if(back) back.classList.remove('active');
    document.body.classList.remove('sidebar-open');
  };
  window.toggleSidebar=function(){
    const side=byId('sidebar');
    if(side && side.classList.contains('open')) window.closeSidebar();
    else window.openSidebar();
  };

  function bindSidebar(){
    const hamb=byId('hambBtn');
    if(hamb){
      hamb.onclick=function(e){e.preventDefault();e.stopPropagation();window.toggleSidebar();};
      hamb.textContent='☰';
      hamb.setAttribute('aria-label','메뉴 열기/닫기');
    }
    const back=byId('sidebarBackdrop');
    if(back){back.onclick=function(e){if(e.target===back)window.closeSidebar();};}
  }

  /* 2) 새 프로젝트/게시판 생성 보강 */
  function ensureBoardCategoryButton(){
    const tools=qs('.tools');
    if(!tools || byId('newBoardCategoryBtn')) return;
    const btn=document.createElement('button');
    btn.className='tool-btn';
    btn.type='button';
    btn.id='newBoardCategoryBtn';
    btn.textContent='▱ 새 게시글 카테고리';
    btn.onclick=function(){
      if(typeof createBoardCategory==='function') return createBoardCategory();
      const name=prompt('새 게시글 카테고리명');
      if(!name) return;
      try{
        posts.unshift({id:'post_'+Date.now(),owner:user.id,category:name.trim(),title:'새 게시글',body:'내용을 입력하세요.',createdAt:new Date().toISOString()});
        savePosts(); renderAll(); openBoard();
      }catch(e){alert('게시글 카테고리 생성 중 오류: '+(e.message||e));}
    };
    const openBoard=byId('openBoardBtn');
    if(openBoard && openBoard.parentNode) openBoard.parentNode.insertBefore(btn, openBoard.nextSibling);
    else tools.appendChild(btn);
  }

  function patchNewProject(){
    const b=byId('newProjectBtn');
    if(!b) return;
    b.textContent='▱ 새 채팅 카테고리';
    b.onclick=function(e){
      e.preventDefault();
      if(typeof createProject==='function') return createProject();
    };
  }

  /* 3) 롱프레스 메뉴 안정화: 폴더/채팅/게시글 삭제가 확실히 작동하도록 직접 위임 */
  let longTimer=null, longTarget=null, sx=0, sy=0;
  function clearLong(){ if(longTimer) clearTimeout(longTimer); longTimer=null; longTarget=null; }
  function showMenu(title, items){
    if(typeof openMenu==='function') return openMenu(title, items);
    const labels=items.map((x,i)=>`${i+1}. ${x.label}`).join('\n');
    const n=prompt(title+'\n\n'+labels+'\n\n번호 입력');
    const idx=Number(n)-1; if(items[idx]) items[idx].action();
  }
  function targetFromElement(el){
    const room=el.closest&&el.closest('[data-room]');
    if(room){
      const rid=room.dataset.room; const r=(window.rooms||[]).find(x=>x.id===rid);
      return {type:'room', id:rid, title:r?.name||room.textContent.trim()||'채팅방'};
    }
    const prj=el.closest&&el.closest('[data-project]');
    if(prj){
      const pid=prj.dataset.project;
      if(pid==='all'||pid==='none') return null;
      const p=(window.projects||projects||[]).find(x=>x.id===pid);
      return {type:'project', id:pid, title:p?.name||prj.textContent.trim()||'프로젝트'};
    }
    const post=el.closest&&el.closest('[data-post]');
    if(post){
      const p=(window.posts||posts||[]).find(x=>x.id===post.dataset.post);
      return {type:'post', id:post.dataset.post, title:p?.title||post.textContent.trim()||'게시글'};
    }
    const cat=el.closest&&el.closest('[data-boardcat]');
    if(cat){return {type:'cat', id:cat.dataset.boardcat, title:cat.dataset.boardcat||'카테고리'};}
    return null;
  }
  function openActionMenu(info){
    if(!info) return;
    if(info.type==='room'){
      showMenu(info.title,[
        {label:'채팅방 이름 변경',action:()=>typeof renameRoom==='function'&&renameRoom(info.id)},
        {label:'프로젝트로 이동',action:()=>typeof moveRoom==='function'&&moveRoom(info.id)},
        {label:'프로젝트로 복사',action:()=>typeof copyRoom==='function'&&copyRoom(info.id)},
        {label:'채팅방 삭제',danger:true,action:()=>typeof deleteRoom==='function'&&deleteRoom(info.id)}
      ]);
    }else if(info.type==='project'){
      showMenu(info.title,[
        {label:'프로젝트 이름 변경',action:()=>typeof renameProject==='function'&&renameProject(info.id)},
        {label:'프로젝트 삭제',danger:true,action:()=>typeof deleteProject==='function'&&deleteProject(info.id)}
      ]);
    }else if(info.type==='post'){
      showMenu(info.title,[
        {label:'게시글 이름 변경',action:()=>typeof renamePost==='function'&&renamePost(info.id)},
        {label:'게시글 삭제',danger:true,action:()=>typeof deletePost==='function'&&deletePost(info.id)}
      ]);
    }else if(info.type==='cat'){
      showMenu(info.title,[
        {label:'게시글 추가',action:()=>{ if(typeof openBoard==='function') openBoard(); const s=byId('postCategorySelect'); if(s) s.value=info.id; const t=byId('postTitle'); if(t) t.focus();}},
        {label:'카테고리 이름 변경',action:()=>typeof renameCategory==='function'&&renameCategory(info.id)},
        {label:'카테고리 삭제',danger:true,action:()=>typeof deleteCategory==='function'&&deleteCategory(info.id)}
      ]);
    }
  }
  function bindLongPressDelegation(){
    const roots=[byId('projectTree'), byId('boardTree')].filter(Boolean);
    roots.forEach(root=>{
      if(root.dataset.v75Long==='1') return;
      root.dataset.v75Long='1';
      root.addEventListener('pointerdown',function(e){
        const info=targetFromElement(e.target); if(!info) return;
        longTarget=info; sx=e.clientX; sy=e.clientY;
        longTimer=setTimeout(function(){openActionMenu(longTarget); clearLong();},620);
      },true);
      root.addEventListener('pointermove',function(e){ if(longTimer && (Math.abs(e.clientX-sx)>12 || Math.abs(e.clientY-sy)>12)) clearLong();},true);
      ['pointerup','pointercancel','pointerleave'].forEach(ev=>root.addEventListener(ev,clearLong,true));
      root.addEventListener('contextmenu',function(e){const info=targetFromElement(e.target); if(!info)return; e.preventDefault(); openActionMenu(info);},true);
    });
  }

  /* 4) 다운로드 버튼 중복 제거 */
  function removeDuplicateDownloadTools(){
    qsa('.row.ai .bubble').forEach(b=>{
      const tools=qsa('.download-tools', b);
      tools.forEach((t,i)=>{ if(i>0) t.remove(); });
      const labels=new Set();
      qsa('.download-tools .download-btn', b).forEach(btn=>{
        const k=btn.textContent.trim();
        if(labels.has(k)) btn.remove(); else labels.add(k);
      });
    });
  }

  function bindAll(){
    bindSidebar();
    ensureBoardCategoryButton();
    patchNewProject();
    bindLongPressDelegation();
    removeDuplicateDownloadTools();
  }

  /* 기존 renderAll 이후에도 다시 바인딩 */
  const oldRenderAll=window.renderAll;
  if(typeof oldRenderAll==='function' && !oldRenderAll.__v75){
    const wrapped=function(){ const ret=oldRenderAll.apply(this,arguments); setTimeout(bindAll,0); setTimeout(removeDuplicateDownloadTools,50); return ret; };
    wrapped.__v75=true; window.renderAll=wrapped;
  }
  const oldRenderMessages=window.renderMessages;
  if(typeof oldRenderMessages==='function' && !oldRenderMessages.__v75){
    const wrapped=function(){ const ret=oldRenderMessages.apply(this,arguments); setTimeout(removeDuplicateDownloadTools,0); return ret; };
    wrapped.__v75=true; window.renderMessages=wrapped;
  }
  window.addEventListener('DOMContentLoaded',bindAll);
  window.addEventListener('load',bindAll);
  window.addEventListener('pageshow',bindAll);
  setTimeout(bindAll,300); setTimeout(bindAll,900); setTimeout(bindAll,1600);
})();
</script>

</body>
</html>
