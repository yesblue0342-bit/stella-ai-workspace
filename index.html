<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Stella Workspace</title>
<meta name="description" content="Stella Workspace AI 작업공간" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{--bg:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--soft:#f8fafc;--soft2:#f1f5f9;--dark:#0f172a;--accent:#2563eb;--danger:#b91c1c}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:"Noto Serif KR",serif;background:var(--bg);color:var(--ink);overflow:hidden}button,input,textarea,select{font:inherit}button{cursor:pointer}button:disabled{opacity:.55;cursor:not-allowed}.app{height:100dvh;display:grid;grid-template-columns:320px 1fr;background:#fff}.sidebar{border-right:1px solid var(--line);background:#fbfbfc;display:flex;flex-direction:column;min-width:0;min-height:0}.side-top{padding:16px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:11px}.logo{width:42px;height:42px;border-radius:50%;background:var(--dark);color:#fff;display:grid;place-items:center;font-weight:900}.brand h1{font-size:1.24rem;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:.78rem}.side-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.side-btn,.mini-btn,.icon-btn{border:1px solid #d1d5db;background:#fff;color:var(--ink);border-radius:13px}.side-btn{padding:10px;text-align:left;font-weight:700}.side-btn:hover,.mini-btn:hover,.icon-btn:hover{background:#f3f4f6}.searchbox{margin-top:10px;display:flex;gap:8px}.searchbox input{width:100%;border:1px solid #d1d5db;border-radius:13px;padding:10px;background:#fff;outline:none}.section-title{padding:14px 16px 8px;color:var(--muted);font-size:.75rem;font-weight:900;letter-spacing:.04em}.tree,.chat-list{padding:0 8px 10px;overflow:auto}.tree{max-height:45%}.chat-list{flex:1}.row{width:100%;display:flex;align-items:center;gap:8px;border:0;background:transparent;border-radius:12px;padding:9px 8px;text-align:left;color:var(--ink)}.row:hover,.row.active{background:#eef2ff}.row .name{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.row small{color:var(--muted)}.row-menu{border:0;background:transparent;border-radius:8px;padding:3px 6px;color:#64748b}.row-menu:hover{background:#e5e7eb}.indent-1{padding-left:22px}.indent-2{padding-left:38px}.main{height:100dvh;display:flex;flex-direction:column;min-width:0}.topbar{height:68px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);padding:0 18px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px)}.top-left{display:flex;align-items:center;gap:10px;min-width:0}.title-wrap{min-width:0}.title-wrap h2{font-size:1.1rem;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title-wrap p{margin:2px 0 0;color:var(--muted);font-size:.78rem}.top-actions{display:flex;align-items:center;gap:8px}.icon-btn{width:40px;height:40px;display:grid;place-items:center}.mini-btn{padding:8px 10px;font-weight:800;font-size:.8rem}.hamb{display:grid}.messages{flex:1;overflow:auto;padding:28px 22px 18px;background:#fff}.msg{display:flex;width:min(920px,100%);margin:0 auto 18px}.msg.user{justify-content:flex-end}.avatar{width:32px;height:32px;border-radius:50%;background:var(--dark);color:#fff;display:grid;place-items:center;font-weight:900;margin-right:10px;flex:0 0 auto}.bubble{max-width:min(780px,84vw);line-height:1.78;white-space:pre-wrap;word-break:break-word}.msg.user .bubble{background:var(--dark);color:#fff;border-radius:20px 20px 6px 20px;padding:13px 16px}.msg.ai .bubble{padding:8px 4px}.bubble table{border-collapse:collapse;display:block;max-width:100%;overflow:auto;margin:10px 0}.bubble th,.bubble td{border:1px solid #d9dee7;padding:8px 10px}.bubble th{background:#f1f5f9}.attachments{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.filecard{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);border-radius:12px;padding:7px 9px;font-size:.8rem}.filecard img{width:48px;height:48px;border-radius:8px;object-fit:cover;display:block;margin-bottom:4px;background:#fff}.composer{border-top:1px solid var(--line);padding:10px 18px calc(14px + env(safe-area-inset-bottom));background:#fff}.chips{width:min(920px,100%);margin:0 auto 8px;display:flex;gap:8px;flex-wrap:wrap;max-height:72px;overflow:auto}.chip{border:1px solid #d1d5db;background:#f9fafb;border-radius:999px;padding:7px 10px;font-size:.78rem}.chip button{border:0;background:transparent;color:var(--muted);margin-left:5px}.model-row{width:min(920px,100%);margin:0 auto 8px;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.82rem}.model-row select{border:1px solid #d1d5db;border-radius:12px;background:#fff;color:var(--ink);padding:7px 10px;min-width:230px}.promptbar{width:min(920px,100%);margin:0 auto;display:flex;align-items:flex-end;gap:10px;border:1px solid #d1d5db;border-radius:24px;padding:10px;background:#fff;box-shadow:0 8px 24px rgba(15,23,42,.05)}.promptbar textarea{flex:1;border:0;outline:0;resize:none;min-height:42px;max-height:150px;line-height:1.6}.round{width:42px;height:42px;border:0;border-radius:50%;display:grid;place-items:center;flex:0 0 auto}.attach{background:#f3f4f6;color:#111827;font-size:1.35rem}.search-toggle{background:#f3f4f6;color:#111827;font-size:1.05rem}.search-toggle.on{background:#0f172a;color:#fff}.send{background:#0f172a;color:#fff;font-size:1.15rem}.empty{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted)}.empty b{display:block;color:var(--ink);font-size:2.1rem;margin-bottom:8px}.backdrop{display:none;position:fixed;inset:0;background:rgba(15,23,42,.32);z-index:20}.menu{position:fixed;z-index:50;min-width:180px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px rgba(15,23,42,.16);padding:6px;display:none}.menu button{width:100%;border:0;background:transparent;text-align:left;padding:9px 10px;border-radius:10px}.menu button:hover{background:#f1f5f9}.menu .danger{color:var(--danger)}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#0f172a;color:#fff;border-radius:999px;padding:10px 14px;font-size:.84rem;display:none;z-index:99}.modal{display:none;position:fixed;inset:0;z-index:70;place-items:center;background:rgba(15,23,42,.35);padding:20px}.modal-card{background:#fff;border-radius:20px;border:1px solid var(--line);box-shadow:0 24px 70px rgba(15,23,42,.22);padding:18px;width:min(420px,100%)}.modal-card h3{margin:0 0 12px}.modal-card input,.modal-card select{width:100%;border:1px solid #d1d5db;border-radius:13px;padding:11px;margin:7px 0}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}.download-tools{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px}.download-tools button{border:1px solid #cbd5e1;background:#fff;border-radius:10px;padding:7px 10px;font-size:.78rem;font-weight:800}.brand{position:relative}.sidebar-toggle{margin-left:auto;width:34px;height:34px;border:1px solid #d1d5db;background:#fff;border-radius:10px;display:grid;place-items:center;font-weight:900}.app.sidebar-collapsed{grid-template-columns:0 1fr}.app.sidebar-collapsed .sidebar{display:none}.msg.user .bubble{background:#fff!important;color:var(--ink)!important;border:1px solid #d1d5db!important;border-radius:20px 20px 6px 20px;padding:13px 16px;box-shadow:0 4px 16px rgba(15,23,42,.04)}.msg.user .filecard{border:1px solid #d1d5db;background:#f8fafc;color:var(--ink)}.md-h1{font-size:1.35rem;font-weight:900;margin:8px 0}.md-h2{font-size:1.18rem;font-weight:900;margin:7px 0}.md-quote{border-left:3px solid #cbd5e1;padding-left:10px;color:#475569}.drive-note{border:1px solid #dbeafe;background:#eff6ff;border-radius:12px;padding:8px 10px;margin:8px 0;color:#1e3a8a;font-size:.86rem}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:fixed;top:0;left:0;bottom:0;width:min(88vw,360px);z-index:30;transform:translateX(-105%);transition:.22s ease;box-shadow:18px 0 50px rgba(15,23,42,.15)}.sidebar.open{transform:translateX(0)}.backdrop.show{display:block}.hamb{display:grid}.topbar{height:64px;padding:0 12px}.top-actions .mini-btn{display:none}.messages{padding:18px 14px}.msg{margin-bottom:16px}.bubble{font-size:1.03rem;max-width:calc(100vw - 72px)}.msg.user .bubble{max-width:83vw}.composer{padding:9px 10px calc(11px + env(safe-area-inset-bottom))}.model-row{font-size:.86rem}.model-row select{min-width:0;max-width:78vw;flex:1;height:42px}.promptbar{border-radius:24px;padding:9px;box-shadow:none}.round{width:42px;height:42px}.side-actions{grid-template-columns:1fr}.tree{max-height:none}.title-wrap h2{max-width:62vw}.avatar{width:30px;height:30px}}
</style>
</head>
<body>
<div class="app">
  <aside id="sidebar" class="sidebar">
    <div class="side-top">
      <div class="brand"><div class="logo">S</div><div><h1>Stella Workspace</h1><p>AI 작업공간</p></div><button id="sideCloseBtn" class="sidebar-toggle" title="창 닫기/펼치기">×</button></div>
      <div class="side-actions"><button id="newChatBtn" class="side-btn">＋ 새 채팅</button><button id="newProjectBtn" class="side-btn">▱ 새 프로젝트</button></div>
      <div class="searchbox"><input id="workspaceSearch" placeholder="검색" /></div>
    </div>
    <div class="section-title">프로젝트</div>
    <div id="projectTree" class="tree"></div>
    <div class="section-title">채팅</div>
    <div id="chatList" class="chat-list"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="top-left"><button id="hambBtn" class="icon-btn hamb">☰</button><div class="title-wrap"><h2 id="activeTitle">새 채팅</h2><p id="activeSub">무엇이든 물어보세요.</p></div></div>
      <div class="top-actions"><button id="copyChatBtn" class="mini-btn">복사</button><button id="duplicateChatBtn" class="mini-btn">복제</button><button id="deleteChatBtn" class="mini-btn">삭제</button></div>
    </div>
    <div id="messages" class="messages"></div>
    <div class="composer">
      <div id="chips" class="chips"></div>
      <div class="model-row"><span>모델</span><select id="modelSelect"><optgroup label="OpenAI"><option value="gpt-4o" selected>ChatGPT / GPT-4o</option><option value="gpt-4.1">GPT-4.1</option><option value="gpt-4.1-mini">GPT-4.1 Mini</option><option value="gpt-4o-mini">GPT-4o Mini</option></optgroup><optgroup label="Anthropic"><option value="claude_sonnet-4.6">Claude Sonnet 4.6</option><option value="claude-opus-4-8">Claude Opus 4.8</option><option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option></optgroup><optgroup label="준비중"><option disabled>Gemini / Grok 준비중</option></optgroup></select></div>
      <form id="chatForm" class="promptbar"><button id="attachBtn" class="round attach" type="button">＋</button><button id="webBtn" class="round search-toggle" type="button" title="웹 검색">⌕</button><input id="fileInput" type="file" multiple accept=".txt,.csv,.json,.pdf,.docx,.pptx,.xlsx,.xls,.xlsm,.html,.htm,.md,.js,.css,.xml,.abap,.sql,image/*" style="display:none"><textarea id="chatInput" rows="1" placeholder="무엇이든 물어보세요."></textarea><button id="sendBtn" class="round send" type="submit">↑</button></form>
    </div>
  </main>
</div>
<div id="backdrop" class="backdrop"></div><div id="contextMenu" class="menu"></div><div id="toast" class="toast"></div>
<div id="modal" class="modal"><div class="modal-card"><h3 id="modalTitle">입력</h3><div id="modalBody"></div><div class="modal-actions"><button id="modalCancel" class="mini-btn">취소</button><button id="modalOk" class="mini-btn">확인</button></div></div></div>
<script>
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"}
const API_CHAT="/api/chat",API_CLAUDE="/api/claude",API_SEARCH="/api/search",API_DRIVE="/api/drive-search";
const SYSTEM_PROMPT=["Stella Workspace입니다.","한국어로 명확하고 실무적으로 답하세요.","첨부파일 내용이 있으면 반드시 그 내용을 우선 근거로 사용하세요.","표가 필요하면 마크다운 표로 정리하세요.","파일 생성 요청이면 완성 코드를 코드블록으로 제공합니다."].join("\n");
const K={projects:"stella_v60_projects",chats:"stella_v60_chats",activeProject:"stella_v60_active_project",activeChat:"stella_v60_active_chat"};
let projects=[],chats=[],activeProjectId="all",activeChatId=null,attachedFiles=[],webSearchOn=false,menuTarget=null;
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
function id(p){return p+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,7)}
function now(){return new Date().toISOString()}function read(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch{return f}}function write(k,v){localStorage.setItem(k,JSON.stringify(v))}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function toast(t){const e=$("#toast");e.textContent=t;e.style.display="block";clearTimeout(toast.t);toast.t=setTimeout(()=>e.style.display="none",1700)}
function save(){write(K.projects,projects);write(K.chats,chats);write(K.activeProject,activeProjectId);write(K.activeChat,activeChatId)}
function boot(){projects=read(K.projects,[]);chats=read(K.chats,[]);activeProjectId=read(K.activeProject,"all");activeChatId=read(K.activeChat,null);if(!chats.length)createChat("새 채팅",null,false);if(!activeChatId||!chats.some(c=>c.id===activeChatId))activeChatId=chats[0]?.id||null;renderAll();wire()}
function activeChat(){return chats.find(c=>c.id===activeChatId)}function projectName(pid){return projects.find(p=>p.id===pid)?.name||"미분류"}
function filteredChats(){const q=$("#workspaceSearch")?.value?.trim()?.toLowerCase()||"";let list=chats;if(activeProjectId==="none")list=list.filter(c=>!c.projectId);else if(activeProjectId!=="all")list=list.filter(c=>c.projectId===activeProjectId);if(q)list=list.filter(c=>(c.title||"").toLowerCase().includes(q)||(c.messages||[]).some(m=>String(m.content||"").toLowerCase().includes(q)));return list}
function createProject(name,parentId=null){name=name||prompt("새 프로젝트 이름");if(!name||!name.trim())return;const p={id:id("project"),name:name.trim(),parentId,createdAt:now(),updatedAt:now()};projects.unshift(p);activeProjectId=p.id;save();renderAll();toast("프로젝트 생성")}
function renameProject(pid){const p=projects.find(x=>x.id===pid);if(!p)return;const name=prompt("프로젝트 이름 변경",p.name);if(!name||!name.trim())return;p.name=name.trim();p.updatedAt=now();save();renderAll()}
function copyProject(pid){const p=projects.find(x=>x.id===pid);if(!p)return;const np={...p,id:id("project"),name:p.name+" 복사본",createdAt:now(),updatedAt:now()};const copied=chats.filter(c=>c.projectId===pid).map(c=>({...c,id:id("chat"),projectId:np.id,title:c.title+" 복사본",messages:(c.messages||[]).map(m=>({...m})),createdAt:now(),updatedAt:now()}));projects.unshift(np);chats=[...copied,...chats];activeProjectId=np.id;activeChatId=copied[0]?.id||activeChatId;save();renderAll()}
function deleteProject(pid){const p=projects.find(x=>x.id===pid);if(!p)return;if(!confirm(`프로젝트 "${p.name}" 삭제? 채팅은 미분류로 이동됩니다.`))return;projects=projects.filter(x=>x.id!==pid);projects.forEach(x=>{if(x.parentId===pid)x.parentId=null});chats.forEach(c=>{if(c.projectId===pid)c.projectId=null});if(activeProjectId===pid)activeProjectId="all";save();renderAll()}
function createChat(title="새 채팅",projectId=(projects.some(p=>p.id===activeProjectId)?activeProjectId:null),doRender=true){const c={id:id("chat"),title,projectId,messages:[{role:"assistant",content:"안녕하세요. Stella입니다. 무엇이든 물어보세요."}],createdAt:now(),updatedAt:now()};chats.unshift(c);activeChatId=c.id;if(projectId)activeProjectId=projectId;save();if(doRender)renderAll();return c}
function renameChat(cid){const c=chats.find(x=>x.id===cid);if(!c)return;const name=prompt("채팅 이름 변경",c.title);if(!name||!name.trim())return;c.title=name.trim();c.updatedAt=now();save();renderAll()}
function copyChatText(){const c=activeChat();if(!c)return;const text=c.messages.map(m=>(m.role==="assistant"?"Stella":"나")+":\n"+m.content).join("\n\n---\n\n");navigator.clipboard?.writeText(text).then(()=>toast("복사 완료")).catch(()=>{prompt("아래 내용을 복사하세요",text)})}
function duplicateChat(cid=activeChatId){const c=chats.find(x=>x.id===cid);if(!c)return;const nc={...c,id:id("chat"),title:c.title+" 복사본",messages:(c.messages||[]).map(m=>({...m})),createdAt:now(),updatedAt:now()};chats.unshift(nc);activeChatId=nc.id;activeProjectId=nc.projectId||"none";save();renderAll()}
function deleteChat(cid=activeChatId){const c=chats.find(x=>x.id===cid);if(!c)return;if(!confirm(`채팅 "${c.title}" 삭제?`))return;chats=chats.filter(x=>x.id!==cid);activeChatId=filteredChats()[0]?.id||chats[0]?.id||null;if(!chats.length)createChat("새 채팅",null,false);save();renderAll()}
function moveChat(cid,targetPid){const c=chats.find(x=>x.id===cid);if(!c)return;c.projectId=targetPid||null;c.updatedAt=now();activeProjectId=targetPid||"none";save();renderAll()}
function renderAll(){renderProjects();renderChats();renderMessages();const c=activeChat();$("#activeTitle").textContent=c?.title||"새 채팅";$("#activeSub").textContent=c?.projectId?projectName(c.projectId):"미분류"}
function children(pid){return projects.filter(p=>(p.parentId||null)===(pid||null))}
function renderProjectRows(pid=null,depth=0){return children(pid).map(p=>`<button class="row ${activeProjectId===p.id?'active':''} indent-${Math.min(depth,2)}" data-project="${p.id}"><span>▱</span><span class="name">${esc(p.name)}</span><small>${chats.filter(c=>c.projectId===p.id).length}</small><span class="row-menu" data-menu-project="${p.id}">⋯</span></button>${renderProjectRows(p.id,depth+1)}`).join("")}
function renderProjects(){const html=`<button class="row ${activeProjectId==='all'?'active':''}" data-project="all"><span>☷</span><span class="name">전체</span><small>${chats.length}</small></button><button class="row ${activeProjectId==='none'?'active':''}" data-project="none"><span>□</span><span class="name">미분류</span><small>${chats.filter(c=>!c.projectId).length}</small></button>`+renderProjectRows();$("#projectTree").innerHTML=html;$$("[data-project]").forEach(b=>b.onclick=e=>{if(e.target.dataset.menuProject)return;activeProjectId=b.dataset.project;save();renderAll();closeSide()});$$("[data-menu-project]").forEach(b=>b.onclick=e=>{e.stopPropagation();openProjectMenu(e,b.dataset.menuProject)})}
function renderChats(){const list=filteredChats();$("#chatList").innerHTML=list.length?list.map(c=>`<button class="row ${activeChatId===c.id?'active':''}" data-chat="${c.id}"><span>💬</span><span class="name">${esc(c.title)}</span><span class="row-menu" data-menu-chat="${c.id}">⋯</span></button>`).join(""):`<div class="empty"><div><b>비어 있음</b><span>새 채팅을 만드세요.</span></div></div>`;$$("[data-chat]").forEach(b=>b.onclick=e=>{if(e.target.dataset.menuChat)return;activeChatId=b.dataset.chat;save();renderAll();closeSide()});$$("[data-menu-chat]").forEach(b=>b.onclick=e=>{e.stopPropagation();openChatMenu(e,b.dataset.menuChat)})}
function renderMessages(){const c=activeChat();const box=$("#messages");box.innerHTML="";if(!c){box.innerHTML='<div class="empty"><div><b>Stella</b><span>새 채팅을 시작하세요.</span></div></div>';return}(c.messages||[]).forEach(m=>addMessageToDom(m.role,m.content,false,m.meta));box.scrollTop=box.scrollHeight}
function markdownToHtml(text){
let v=esc(text||"");
v=v.replace(/```([\w-]*)\n([\s\S]*?)```/g,(m,l,code)=>`<pre style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:10px;overflow:auto"><code>${esc(code)}</code></pre>`);
v=v.replace(/^### (.*)$/gm,'<div class="md-h2">$1</div>');
v=v.replace(/^## (.*)$/gm,'<div class="md-h2">$1</div>');
v=v.replace(/^# (.*)$/gm,'<div class="md-h1">$1</div>');
v=v.replace(/^\> (.*)$/gm,'<div class="md-quote">$1</div>');
v=v.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
v=v.replace(/\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
v=v.replace(/^\s*-\s+(.*)$/gm,'• $1');
v=v.replace(/\n/g,"<br>");
return v
}
function addDownloadTools(bubble,text){if(!/(다운로드|파일|코드|html|javascript|css|json|txt|엑셀|excel|csv|source|index\.html)/i.test((activeChat()?.messages||[]).slice(-2).map(m=>m.content).join(" ")))return;const tools=document.createElement("div");tools.className="download-tools";const btn=document.createElement("button");btn.textContent="TXT 다운로드";btn.onclick=()=>downloadFile("stella-answer.txt",text,"text/plain;charset=utf-8");tools.appendChild(btn);const re=/```([\w-]*)\n([\s\S]*?)```/g;let m,i=0;while((m=re.exec(text))){const lang=(m[1]||"txt").toLowerCase();const code=m[2];const ext=lang.includes("html")?"html":lang.includes("js")||lang.includes("javascript")?"js":lang.includes("css")?"css":lang.includes("json")?"json":"txt";const b=document.createElement("button");b.textContent=ext.toUpperCase()+" 다운로드";b.onclick=()=>downloadFile(ext==="html"?"index.html":`stella-${++i}.${ext}`,code,"text/plain;charset=utf-8");tools.appendChild(b)}bubble.prepend(tools)}
function addMessageToDom(role,content,persist=true,meta={}){const row=document.createElement("div");row.className="msg "+(role==="assistant"?"ai":"user");if(role==="assistant"){const av=document.createElement("div");av.className="avatar";av.textContent="S";row.appendChild(av)}const bubble=document.createElement("div");bubble.className="bubble";bubble.innerHTML=markdownToHtml(content||"");if(role==="assistant")addDownloadTools(bubble,content||"");if(meta?.attachments?.length){const at=document.createElement("div");at.className="attachments";meta.attachments.forEach(f=>{const card=document.createElement("div");card.className="filecard";if(f.dataUrl){const img=document.createElement("img");img.src=f.dataUrl;card.appendChild(img)}card.appendChild(document.createTextNode(f.name||"file"));at.appendChild(card)});bubble.appendChild(at)}row.appendChild(bubble);$("#messages").appendChild(row);$("#messages").scrollTop=$("#messages").scrollHeight;if(persist){const c=activeChat();c.messages.push({role,content,meta});if(role==="user"&&c.title==="새 채팅")c.title=content.slice(0,28)||"새 채팅";c.updatedAt=now();save();renderChats();$("#activeTitle").textContent=c.title}}
function renderChips(){const box=$("#chips");box.innerHTML="";attachedFiles.forEach((f,i)=>{const chip=document.createElement("span");chip.className="chip";chip.innerHTML=`첨부 ${esc(f.name||'file')} <button type="button">×</button>`;chip.querySelector("button").onclick=()=>{attachedFiles.splice(i,1);renderChips()};box.appendChild(chip)})}
async function fileText(file){const name=file.name||"file",lower=name.toLowerCase(),type=file.type||"";try{if(type.startsWith("image/")||/\.(png|jpg|jpeg|webp)$/i.test(lower)){const dataUrl=await readData(file);let text=`[이미지 첨부: ${name}]`;if(window.Tesseract){try{const r=await Tesseract.recognize(dataUrl,"kor+eng");if(r?.data?.text?.trim())text+=`\n[OCR]\n${r.data.text.trim()}`}catch(e){text+=`\nOCR 오류: ${e.message||e}`}}return{name,type,dataUrl,text}}if(lower.endsWith(".pdf")){const buf=await file.arrayBuffer();if(!window.pdfjsLib)return{name,type,text:"PDF.js 로드 실패"};const pdf=await pdfjsLib.getDocument({data:buf}).promise;let parts=[];for(let p=1;p<=Math.min(pdf.numPages,60);p++){const page=await pdf.getPage(p);const tc=await page.getTextContent();parts.push(`[PDF ${p}]\n`+tc.items.map(i=>i.str).join(" "))}return{name,type,text:parts.join("\n\n")}}if(/\.(xlsx|xls|xlsm|csv)$/i.test(lower)){if(lower.endsWith(".csv"))return{name,type,text:await file.text()};const wb=XLSX.read(await file.arrayBuffer(),{type:"array"});const parts=wb.SheetNames.slice(0,12).map(sn=>`[Sheet: ${sn}]\n`+XLSX.utils.sheet_to_csv(wb.Sheets[sn]));return{name,type,text:parts.join("\n\n")}}if(lower.endsWith(".docx")){const r=await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});return{name,type,text:r.value||"DOCX 텍스트 없음"}}if(lower.endsWith(".pptx")){const zip=await JSZip.loadAsync(await file.arrayBuffer());const names=Object.keys(zip.files).filter(n=>/^ppt\/slides\/slide\d+\.xml$/i.test(n)).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));let parts=[];for(const n of names.slice(0,80)){const xml=await zip.files[n].async("text");const doc=new DOMParser().parseFromString(xml,"application/xml");const texts=Array.from(doc.getElementsByTagName("a:t")).map(x=>x.textContent).filter(Boolean);if(texts.length)parts.push(`[${n}]\n`+texts.join("\n"))}return{name,type,text:parts.join("\n\n")||"PPTX 텍스트 없음"}}return{name,type,text:await file.text()}}catch(e){return{name,type,text:`파일 읽기 오류: ${e.message||e}`}}}
function readData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||""));r.onerror=()=>rej(r.error);r.readAsDataURL(file)})}
async function webSearch(q){if(!webSearchOn&&!/(검색|최신|뉴스|오늘|현재|실시간|날씨|주가|가격|google|naver|search|web)/i.test(q))return"";try{const r=await fetch(API_SEARCH+"?q="+encodeURIComponent(q),{headers:{"Cache-Control":"no-store"}});if(!r.ok)return"";const d=await r.json();const arr=d.results||d.items||[];if(!Array.isArray(arr)||!arr.length)return"";return"\n\n[웹 검색 결과]\n"+arr.slice(0,5).map((x,i)=>`${i+1}. ${x.title||x.name||"검색결과"}\n${x.snippet||x.description||""}\n${x.link||x.url||""}`).join("\n\n")}catch{return""}}

async function driveSearch(q){
if(!/#SAP\b/i.test(q))return"";
try{
const clean=q.replace(/#SAP\b/ig,"").trim()||q;
const r=await fetch(API_DRIVE+"?q="+encodeURIComponent(clean),{headers:{"Cache-Control":"no-store"}});
if(!r.ok)return"\n\n[Google Drive SAP 문서]\n/api/drive-search가 아직 준비되지 않았습니다. 추후 Google Drive API 연결 후 SAP 문서 검색이 활성화됩니다.";
const d=await r.json();
const arr=d.results||d.items||d.files||[];
if(!Array.isArray(arr)||!arr.length)return"\n\n[Google Drive SAP 문서]\n검색 결과가 없습니다.";
return"\n\n[Google Drive SAP 문서 검색 결과]\n"+arr.slice(0,5).map((x,i)=>`${i+1}. ${x.name||x.title||"문서"}\n${x.snippet||x.text||x.description||""}\n${x.webViewLink||x.link||x.url||""}`).join("\n\n")
}catch(e){
return"\n\n[Google Drive SAP 문서]\n검색 연동 대기 중입니다. /api/drive-search 추가 후 #SAP 검색이 활성화됩니다."
}
}
async function send(e){e?.preventDefault();const input=$("#chatInput");const msg=input.value.trim();if(!msg&&!attachedFiles.length)return;const files=[...attachedFiles];addMessageToDom("user",msg||"[첨부 파일]",true,{attachments:files});input.value="";attachedFiles=[];renderChips();$("#sendBtn").disabled=true;$("#sendBtn").textContent="…";try{const history=(activeChat()?.messages||[]).slice(-12).map(m=>({role:m.role,content:m.content}));const ft=files.map(f=>`\n\n[첨부파일: ${f.name}]\n${f.text||""}`).join("");const wt=await webSearch(msg);const dt=await driveSearch(msg);const finalMsg=msg+ft+wt+dt;const model=$("#modelSelect").value;const isClaude=/claude/i.test(model);const url=isClaude?API_CLAUDE:API_CHAT;const body=isClaude?{model,messages:history.concat([{role:"user",content:finalMsg}]),systemPrompt:SYSTEM_PROMPT,maxTokens:4096,temperature:.3}:{message:finalMsg,model,system:SYSTEM_PROMPT,history};const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json","Cache-Control":"no-store"},body:JSON.stringify(body)});const raw=await r.text();let d={};try{d=JSON.parse(raw)}catch{d={text:raw}}if(!r.ok)throw new Error(d.error?.message||d.error||d.message||raw||`HTTP ${r.status}`);addMessageToDom("assistant",d.text||d.answer||d.message||"응답 텍스트가 없습니다.",true)}catch(err){addMessageToDom("assistant","API 연결 오류: "+(err.message||err),true)}finally{$("#sendBtn").disabled=false;$("#sendBtn").textContent="↑"}}
function downloadFile(name,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(url)},1000)}
function openProjectMenu(e,pid){menuTarget={type:"project",id:pid};openMenu(e,[['하위 프로젝트 추가',()=>createProject('새 프로젝트',pid)],['이름 변경',()=>renameProject(pid)],['복사',()=>copyProject(pid)],['삭제',()=>deleteProject(pid),'danger']])}
function openChatMenu(e,cid){menuTarget={type:"chat",id:cid};const moveItems=projects.map(p=>[`이동: ${p.name}`,()=>moveChat(cid,p.id)]);openMenu(e,[['이름 변경',()=>renameChat(cid)],['복제',()=>duplicateChat(cid)],['미분류로 이동',()=>moveChat(cid,null)],...moveItems,['삭제',()=>deleteChat(cid),'danger']])}
function openMenu(e,items){const m=$("#contextMenu");m.innerHTML=items.map((it,i)=>`<button data-i="${i}" class="${it[2]||''}">${esc(it[0])}</button>`).join("");m.style.display="block";m.style.left=Math.min(e.clientX,innerWidth-200)+"px";m.style.top=Math.min(e.clientY,innerHeight-260)+"px";$$('#contextMenu button').forEach(b=>b.onclick=()=>{const fn=items[+b.dataset.i][1];m.style.display='none';fn()})}
function closeSide(){if(innerWidth<=900){$("#sidebar").classList.remove("open");$("#backdrop").classList.remove("show")}}

async function handlePaste(e){
const items=Array.from(e.clipboardData?.items||[]);
const imageItems=items.filter(it=>it.type&&it.type.startsWith("image/"));
if(!imageItems.length)return;
e.preventDefault();
toast("캡처 이미지 OCR 처리 중");
for(const it of imageItems){
const file=it.getAsFile();
if(file){
const named=new File([file],`capture-${Date.now()}.png`,{type:file.type||"image/png"});
attachedFiles.push(await fileText(named));
}
}
renderChips();
toast("캡처 OCR 첨부 완료")
}
function toggleSidebar(forceOpen=false){
const app=document.querySelector(".app");
if(innerWidth<=900){
if(forceOpen||!$("#sidebar").classList.contains("open")){$("#sidebar").classList.add("open");$("#backdrop").classList.add("show")}
else closeSide();
return
}
app.classList.toggle("sidebar-collapsed",!forceOpen&& !app.classList.contains("sidebar-collapsed") ? true : false);
if(forceOpen)app.classList.remove("sidebar-collapsed")
}
function wire(){if(wire.done)return;wire.done=true;$("#newProjectBtn").onclick=()=>createProject();$("#newChatBtn").onclick=()=>createChat();$("#copyChatBtn").onclick=copyChatText;$("#duplicateChatBtn").onclick=()=>duplicateChat();$("#deleteChatBtn").onclick=()=>deleteChat();$("#hambBtn").onclick=()=>toggleSidebar(true);$("#sideCloseBtn").onclick=()=>toggleSidebar(false);$("#backdrop").onclick=closeSide;$("#workspaceSearch").oninput=()=>{renderProjects();renderChats()};$("#webBtn").onclick=e=>{e.preventDefault();webSearchOn=!webSearchOn;$("#webBtn").classList.toggle("on",webSearchOn);toast(webSearchOn?"웹 검색 켜짐":"웹 검색 꺼짐")};$("#attachBtn").onclick=()=>$("#fileInput").click();$("#fileInput").onchange=async e=>{const files=Array.from(e.target.files||[]);if(!files.length)return;toast(`파일 ${files.length}개 읽는 중`);for(const f of files)attachedFiles.push(await fileText(f));e.target.value="";renderChips();toast("파일 첨부 완료")};$("#chatForm").onsubmit=send;$("#chatInput").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey)send(e)});$("#chatInput").addEventListener("input",e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,150)+"px"});$("#chatInput").addEventListener("paste",handlePaste);document.addEventListener("paste",e=>{if(document.activeElement!==$("#chatInput"))handlePaste(e)});document.addEventListener("click",e=>{if(!e.target.closest("#contextMenu")&&!e.target.closest(".row-menu"))$("#contextMenu").style.display="none"})}
boot();
</script>
