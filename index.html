<script>
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}
const API_URL='/api/chat';const ADMIN_EMAILS=['yesblue0342@naver.com','yesblue0342@gmail.com'];
const K={users:'stella_users_final_v82',session:'stella_session_final_v82',rooms:'stella_rooms_final_v82',projects:'stella_projects_final_v82',posts:'stella_posts_final_v82',exp:'stella_exp_final_v82',bexp:'stella_bexp_final_v82',member:'stella_member_final_v82',manage:'stella_manage_final_v82'};
let user=null,users=[],rooms=[],projects=[],posts=[],activeRoomId=null,activeProjectId=null,activeView='chat',files=[],authMode='login',activeMemberRoomId=null;
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}};const write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);const hash=p=>btoa(unescape(encodeURIComponent(String(p))));

/* persistent-login-fix */
function nowMs(){return Date.now()}
function saveSessionUser(u){write(K.session,{id:u.id,user:u,savedAt:nowMs()})}
function loadSessionUser(){const ss=read(K.session,null);if(!ss||!ss.id)return null;const list=allUsers();return list.find(u=>u.id===ss.id)||ss.user||null}
/* /persistent-login-fix */
function bootstrapAdmin(){users=allUsers();let changed=false;ADMIN_EMAILS.forEach((mail,idx)=>{if(!users.some(u=>String(u.email||'').toLowerCase()===mail)){users.push({id:idx?'yesblue0342_gmail':'admin',name:idx?'김경훈':'관리자',email:mail,birth:'1982-04-30',passwordHash:hash('admin1234'),role:'admin',createdAt:new Date().toISOString()});changed=true}});if(changed)saveUsers()}
function allUsers(){return read(K.users,[])}function saveUsers(){write(K.users,users)}function loadData(){users=allUsers();rooms=read(K.rooms,[]).filter(x=>x.owner===user.id);projects=read(K.projects,[]).filter(x=>x.owner===user.id);posts=read(K.posts,[]).filter(x=>x.owner===user.id)}
function saveRooms(){write(K.rooms,[...read(K.rooms,[]).filter(x=>x.owner!==user.id),...rooms])}function saveProjects(){write(K.projects,[...read(K.projects,[]).filter(x=>x.owner!==user.id),...projects])}function savePosts(){write(K.posts,[...read(K.posts,[]).filter(x=>x.owner!==user.id),...posts])}
function exp(){return new Set(read(K.exp,['all','none']))}function saveExp(s){write(K.exp,[...s])}function bexp(){return new Set(read(K.bexp,['기본']))}function saveBexp(s){write(K.bexp,[...s])}
function setAuthMode(m){authMode=m;$$('.signup-only').forEach(e=>e.classList.toggle('hidden',m!=='signup'));$('#loginTab').classList.toggle('active',m==='login');$('#signupTab').classList.toggle('active',m==='signup');$('#authSubmit').textContent=m==='login'?'로그인':'회원가입';$('#authMsg').textContent=''}
function initAuth(){bootstrapAdmin();users=allUsers();const f=loadSessionUser();if(f){user=f;saveSessionUser(user);showApp();return}$('#authModal').classList.add('active');$('#app').style.display='none'}
function showApp(){loadData();$('#authModal').classList.remove('active');$('#app').style.display='grid';$('#userName').textContent=user.name;$('#userEmail').textContent=user.email||user.id;if(!rooms.length)createRoom('새 채팅',false);if(!activeRoomId)activeRoomId=rooms[0]?.id;renderAll()}
async function handleAuth(e){e.preventDefault();users=allUsers();$('#authMsg').textContent='';const id=$('#authId').value.trim();const pw=$('#authPassword').value;if(!id||!pw){$('#authMsg').textContent='아이디 또는 이메일과 비밀번호를 입력해 주세요.';return}try{let res,data,loginEmail=id;if(authMode==='signup'){const name=$('#authName').value.trim();const email=$('#authEmail').value.trim().toLowerCase();const birth=$('#authBirth').value.trim();loginEmail=email||id;if(!name||!loginEmail){$('#authMsg').textContent='이름과 이메일을 입력해 주세요.';return}res=await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-store'},body:JSON.stringify({id,email:loginEmail,password:pw,name,birth})});}else{res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-store'},body:JSON.stringify({id,email:id,password:pw})});}const raw=await res.text();try{data=JSON.parse(raw)}catch{data={message:raw}}if(!res.ok||data.ok===false){$('#authMsg').textContent=data.message||data.error||'로그인/회원가입 처리 실패';return}const apiUser=data.user||{};const email=String(apiUser.email||loginEmail||id).toLowerCase();const localUser={id:String(apiUser.id||id),name:apiUser.name||email||id,email,birth:apiUser.birth||$('#authBirth').value.trim()||'',passwordHash:'',role:ADMIN_EMAILS.includes(email)?'admin':'user',createdAt:apiUser.created_at||new Date().toISOString()};users=allUsers().filter(u=>u.id!==localUser.id&&String(u.email||'').toLowerCase()!==email);users.push(localUser);saveUsers();user=localUser;saveSessionUser(user);showApp();}catch(err){$('#authMsg').textContent='회원 API 연결 오류: '+(err.message||err)}}
function forgotPassword(){users=allUsers();const id=prompt('아이디를 입력하세요.');if(!id)return;const u=users.find(x=>x.id===id.trim());if(!u)return alert('사용자를 찾을 수 없습니다. 관리자에게 문의하세요.\n관리자: yesblue0342@naver.com / yesblue0342@gmail.com');const name=prompt('가입자 이름'),email=prompt('가입 이메일'),birth=prompt('생년월일 예: 1982-04-30');if((name||'').trim()===u.name&&(email||'').trim().toLowerCase()===u.email&&(birth||'').trim()===u.birth){const np=prompt('새 비밀번호');if(np){u.passwordHash=hash(np);saveUsers();alert('비밀번호가 변경되었습니다.')}}else alert('본인 확인 정보가 맞지 않습니다. 관리자에게 문의하세요.')}function logout(){localStorage.removeItem(K.session);location.reload()}
function activeRoom(){return rooms.find(r=>r.id===activeRoomId)}function projectName(pid){return projects.find(p=>p.id===pid)?.name||'미분류'}function projectRooms(pid){return rooms.filter(r=>r.projectId===pid)}
function createRoom(name='새 채팅',select=true){const r={id:'r_'+uid(),owner:user.id,projectId:activeProjectId&&projects.some(p=>p.id===activeProjectId)?activeProjectId:null,name,messages:[{role:'ai',text:'안녕하세요. Stella입니다. 무엇이든 물어보세요.'}],createdAt:new Date().toISOString()};rooms.unshift(r);if(select){activeRoomId=r.id;activeView='chat'}saveRooms();renderAll();closeSidebar()}
function createProject(){const name=prompt('새 프로젝트 카테고리명');if(!name?.trim())return;const p={id:'p_'+uid(),owner:user.id,name:name.trim(),createdAt:new Date().toISOString()};projects.unshift(p);activeProjectId=p.id;const s=exp();s.add(p.id);saveExp(s);saveProjects();renderAll()}
function createBoardCategory(){const name=prompt('새 게시글 카테고리명');if(!name?.trim())return;posts.unshift({id:'post_'+uid(),owner:user.id,category:name.trim(),title:'새 게시글',body:'내용을 입력하세요.',createdAt:new Date().toISOString()});const s=bexp();s.add(name.trim());saveBexp(s);savePosts();renderAll();openBoard()}
function renderAll(){renderHeader();renderProjectTree();renderChatTree();renderBoardTree();renderMessages();renderPostSelect();renderPosts();renderChips();renderManage();$('#userName').textContent=user?.name||'사용자';$('#userEmail').textContent=user?.email||user?.id||''}
function renderHeader(){const r=activeRoom();$('#activeTitle').textContent=r?.name||'새 채팅';$('#activeSub').textContent=r?`${r.messages.length}개 메시지 · ${projectName(r.projectId)}`:'개인 작업공간'}
function renderProjectTree(){const s=exp();$('#projectCategoryTree').innerHTML=projects.length?projects.map(p=>{const list=projectRooms(p.id),open=s.has(p.id);return `<div class="tree-section ${open?'open':''}"><button class="tree-head ${activeProjectId===p.id?'active':''}" data-proj="${esc(p.id)}"><span class="circle-caret">${open?'−':'+'}</span><span class="folder">▱ ${esc(p.name)}</span><span class="count">${list.length}</span></button><div class="children">${list.length?list.map(r=>roomItem(r,p.name)).join(''):'<div class="empty">채팅방이 없습니다.</div>'}</div></div>`}).join(''):'<div class="empty">프로젝트 카테고리가 없습니다.</div>';$$('[data-proj]').forEach(b=>b.onclick=e=>{e.preventDefault();const id=b.dataset.proj;const st=exp();st.has(id)?st.delete(id):st.add(id);saveExp(st);activeProjectId=id;renderAll()});$$('[data-room]').forEach(bindRoomClick);bindLongPress($('#projectCategoryTree'),targetFromProject)}
function renderChatTree(){const s=exp();const sections=[{id:'all',name:'전체 채팅',rooms},{id:'none',name:'미분류',rooms:rooms.filter(r=>!r.projectId)}];$('#chatCategoryTree').innerHTML=sections.map(sec=>{const open=s.has(sec.id);return `<div class="tree-section ${open?'open':''}"><button class="tree-head ${activeProjectId===sec.id?'active':''}" data-chatcat="${sec.id}"><span class="circle-caret">${open?'−':'+'}</span><span class="folder">▱ ${esc(sec.name)}</span><span class="count">${sec.rooms.length}</span></button><div class="children">${sec.rooms.length?sec.rooms.map(r=>roomItem(r,sec.name)).join(''):'<div class="empty">채팅방이 없습니다.</div>'}</div></div>`}).join('');$$('[data-chatcat]').forEach(b=>b.onclick=e=>{e.preventDefault();const id=b.dataset.chatcat;const st=exp();st.has(id)?st.delete(id):st.add(id);saveExp(st);activeProjectId=id;renderAll()});$$('[data-room]').forEach(bindRoomClick);bindLongPress($('#chatCategoryTree'),targetFromProject)}
function roomItem(r,cat){return `<button class="item ${activeRoomId===r.id?'active':''}" data-room="${esc(r.id)}"><span class="item-title">${esc(r.name)}</span><span class="item-meta">${(r.messages||[]).length}개 메시지 · ${esc(cat)}</span></button>`}
function bindRoomClick(b){b.onclick=e=>{e.preventDefault();activeRoomId=b.dataset.room;activeView='chat';const r=activeRoom();activeProjectId=r?.projectId||'all';closeSidebar();renderAll()}}
function targetFromProject(el){const room=el.closest?.('[data-room]');if(room){const r=rooms.find(x=>x.id===room.dataset.room);return{type:'room',id:room.dataset.room,title:r?.name||'채팅방'}}const p=el.closest?.('[data-proj]');if(p){const pr=projects.find(x=>x.id===p.dataset.proj);return{type:'project',id:p.dataset.proj,title:pr?.name||'프로젝트'}}return null}
function renderBoardTree(){const st=bexp(),cats=[...new Set(['기본',...posts.map(p=>p.category||'기본')])];const q=($('#sideSearch').value||'').trim().toLowerCase();$('#boardTree').innerHTML=cats.map(c=>{let list=posts.filter(p=>(p.category||'기본')===c);if(q)list=list.filter(p=>(p.title+' '+p.body+' '+c).toLowerCase().includes(q));const open=st.has(c);return `<div class="tree-section ${open?'open':''}"><button class="tree-head" data-bcat="${esc(c)}"><span class="circle-caret">${open?'−':'+'}</span><span class="folder">▱ ${esc(c)}</span><span class="count">${list.length}</span></button><div class="children">${list.length?list.map(p=>`<button class="item" data-post="${esc(p.id)}"><span class="item-title">${esc(p.title)}</span><span class="item-meta">게시글 · ${esc(c)}</span></button>`).join(''):'<div class="empty">게시글이 없습니다.</div>'}</div></div>`}).join('');$$('[data-bcat]').forEach(b=>b.onclick=e=>{e.preventDefault();const c=b.dataset.bcat;const s=bexp();s.has(c)?s.delete(c):s.add(c);saveBexp(s);renderBoardTree()});$$('[data-post]').forEach(b=>b.onclick=e=>{e.preventDefault();openBoard();setTimeout(()=>document.querySelector(`[data-post-card="${b.dataset.post}"]`)?.scrollIntoView({behavior:'smooth',block:'center'}),80);closeSidebar()});bindLongPress($('#boardTree'),targetFromBoard)}
function targetFromBoard(el){const post=el.closest?.('[data-post]');if(post){const p=posts.find(x=>x.id===post.dataset.post);return{type:'post',id:post.dataset.post,title:p?.title||'게시글'}}const cat=el.closest?.('[data-bcat]');if(cat)return{type:'cat',id:cat.dataset.bcat,title:cat.dataset.bcat};return null}
function openMenu(title,items){const mb=$('#menuBackdrop'),m=$('#bottomMenu');m.innerHTML=`<div class="menu-title">${esc(title)}</div>`+items.map((it,i)=>`<button class="menu-item ${it.danger?'danger':''}" data-mi="${i}">${esc(it.label)}</button>`).join('')+`<button class="menu-item" data-cancel>취소</button>`;m.querySelectorAll('[data-mi]').forEach(b=>b.onclick=()=>{mb.classList.remove('active');items[Number(b.dataset.mi)].action()});m.querySelector('[data-cancel]').onclick=()=>mb.classList.remove('active');mb.classList.add('active')}
function bindLongPress(root,resolver){if(!root||root.dataset.lp==='1')return;root.dataset.lp='1';let t=null,info=null,sx=0,sy=0;const clear=()=>{if(t)clearTimeout(t);t=null;info=null};root.addEventListener('pointerdown',e=>{info=resolver(e.target);if(!info)return;sx=e.clientX;sy=e.clientY;t=setTimeout(()=>{openAction(info);clear()},620)},true);root.addEventListener('pointermove',e=>{if(t&&(Math.abs(e.clientX-sx)>12||Math.abs(e.clientY-sy)>12))clear()},true);['pointerup','pointercancel','pointerleave'].forEach(ev=>root.addEventListener(ev,clear,true));root.addEventListener('contextmenu',e=>{const i=resolver(e.target);if(!i)return;e.preventDefault();openAction(i)},true)}
function openAction(i){if(i.type==='room')openMenu(i.title,[{label:'채팅방 이름 변경',action:()=>renameRoom(i.id)},{label:'프로젝트로 이동',action:()=>moveRoom(i.id)},{label:'프로젝트로 복사',action:()=>copyRoom(i.id)},{label:'채팅방 삭제',danger:true,action:()=>deleteRoom(i.id)}]);if(i.type==='project')openMenu(i.title,[{label:'프로젝트 이름 변경',action:()=>renameProject(i.id)},{label:'프로젝트 삭제',danger:true,action:()=>deleteProject(i.id)}]);if(i.type==='post')openMenu(i.title,[{label:'게시글 이름 변경',action:()=>renamePost(i.id)},{label:'게시글 삭제',danger:true,action:()=>deletePost(i.id)}]);if(i.type==='cat')openMenu(i.title,[{label:'게시글 추가',action:()=>{openBoard();$('#postCategorySelect').value=i.id;$('#postTitle').focus()}},{label:'카테고리 이름 변경',action:()=>renameCategory(i.id)},{label:'카테고리 삭제',danger:true,action:()=>deleteCategory(i.id)}])}

function formatSearchReferences(results){if(!Array.isArray(results)||!results.length)return'';return '\n\n참고 검색 결과\n'+results.slice(0,5).map(function(r,i){return '['+(i+1)+'] '+(r.title||'제목 없음')+'\n'+(r.link||'')+'\n'+(r.snippet||'')}).join('\n\n')}
function initEvents(){ensureModelOptions();$('#loginTab').onclick=()=>setAuthMode('login');$('#signupTab').onclick=()=>setAuthMode('signup');$('#authForm').onsubmit=handleAuth;$('#forgotBtn').onclick=forgotPassword;$('#logoutBtn').onclick=logout;$('#memberChatBtn').onclick=openMember;$('#newChatBtn').onclick=()=>createRoom('새 채팅');$('#openBoardBtn').onclick=openBoard;$('#newProjectBtn').onclick=createProject;$('#newBoardCategoryBtn').onclick=createBoardCategory;$('#manageHead').onclick=()=>{write(K.manage,!read(K.manage,false));renderManage()};let menuLock=false;$('#hambBtn').onclick=e=>{e.preventDefault();if(menuLock)return;menuLock=true;toggleSidebar();setTimeout(()=>menuLock=false,250)};$('#sidebarBackdrop').onclick=e=>{if(e.target===$('#sidebarBackdrop'))closeSidebar()};$('#menuBackdrop').onclick=e=>{if(e.target===$('#menuBackdrop'))$('#menuBackdrop').classList.remove('active')};$('#closeBoardBtn').onclick=closeBoard;$('#boardBackdrop').onclick=closeBoard;$('#closeMemberBtn').onclick=closeMember;$('#memberBackdrop').onclick=closeMember;$('#roomTxtBtn').onclick=()=>downloadText((activeRoom()?.name||'chat')+'.txt',roomText(),'text/plain;charset=utf-8');$('#roomMdBtn').onclick=()=>downloadText((activeRoom()?.name||'chat')+'.md',roomText(),'text/markdown;charset=utf-8');$('#deleteRoomTopBtn').onclick=()=>activeRoomId&&deleteRoom(activeRoomId);$('#chatForm').onsubmit=send;$('#attachBtn').onclick=()=>$('#fileInput').click();$('#fileInput').onchange=e=>{processFiles(e.target.files);e.target.value=''};$('#chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(e)}});$('#chatInput').addEventListener('input',e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,140)+'px'});$('#chatInput').addEventListener('paste',async e=>{const items=[...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/'));if(!items.length)return;e.preventDefault();await processFiles(items.map(i=>i.getAsFile()).filter(Boolean).map(f=>new File([f],`capture-${Date.now()}.png`,{type:f.type||'image/png'})))});$('#messages').addEventListener('dragover',e=>{e.preventDefault();$('#messages').classList.add('drag-over')});$('#messages').addEventListener('dragleave',()=>$('#messages').classList.remove('drag-over'));$('#messages').addEventListener('drop',async e=>{e.preventDefault();$('#messages').classList.remove('drag-over');await processFiles(e.dataTransfer.files)});$('#sideSearch').addEventListener('input',()=>{renderBoardTree()});$('#sideSearchBtn')?.addEventListener('click',()=>{renderBoardTree();openSidebar();});$('#sideSearchBtn')?.addEventListener('click',()=>{renderBoardTree();openSidebar();});$('#boardForm').onsubmit=e=>{e.preventDefault();const nc=$('#postNewCategory').value.trim(),cat=nc||$('#postCategorySelect').value||'기본';posts.unshift({id:'post_'+uid(),owner:user.id,category:cat,title:$('#postTitle').value.trim(),body:$('#postBody').value.trim(),createdAt:new Date().toISOString()});$('#boardForm').reset();const s=bexp();s.add(cat);saveBexp(s);savePosts();renderAll()}}
function syncSidebarLayout(){const app=$('#app'),s=$('#sidebar'),b=$('#sidebarBackdrop');if(isMobileView()){app?.classList.remove('sidebar-collapsed');s?.classList.remove('open');b?.classList.remove('active');document.body.classList.remove('sidebar-open')}else{b?.classList.remove('active');s?.classList.remove('open');document.body.classList.remove('sidebar-open')}}




/* stella-rich-answer-download-override */
function lastUserPrompt(){const r=activeRoom&&activeRoom();const arr=(r&&r.messages)||[];for(let i=arr.length-1;i>=0;i--){if(arr[i].role==='user')return String(arr[i].text||'')}const el=document.querySelector('#chatInput');return String((el&&el.value)||'')}
function wantsDownload(){return /(다운로드|엑셀|excel|xlsx|word|docx|ppt|pptx|파워포인트|txt|텍스트|markdown|md|파일로|첨부파일로|저장)/i.test(lastUserPrompt())}
function mdEscapeHtml(x){return String(x==null?'':x).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function parseMarkdownTables(text){const lines=String(text||'').split('\n');const blocks=[];let i=0;while(i<lines.length){if(/^\s*\|.+\|\s*$/.test(lines[i]||'')&&i+1<lines.length&&/^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[i+1]||'')){const start=i;let rows=[lines[i]];i+=2;while(i<lines.length&&/^\s*\|.+\|\s*$/.test(lines[i]||'')){rows.push(lines[i]);i++}blocks.push({start:start,end:i,rows:rows})}else{i++}}return blocks}
function splitTableRow(line){let t=String(line||'').trim();if(t.startsWith('|'))t=t.slice(1);if(t.endsWith('|'))t=t.slice(0,-1);return t.split('|').map(function(x){return x.trim()})}
function tableRowsFromText(text){const blocks=parseMarkdownTables(text);if(blocks[0])return blocks[0].rows.map(splitTableRow);return []}
function renderMarkdownLite(container,text){const src=String(text||'');const blocks=parseMarkdownTables(src);let pos=0;function addParas(chunk){chunk.split(/\n{2,}/).map(function(x){return x.trim()}).filter(Boolean).forEach(function(part){if(/^###\s+/.test(part)){const h=document.createElement('h3');h.textContent=part.replace(/^###\s+/,'');container.appendChild(h);return}if(/^##\s+/.test(part)){const h=document.createElement('h2');h.textContent=part.replace(/^##\s+/,'');container.appendChild(h);return}const p=document.createElement('p');p.textContent=part;container.appendChild(p)})}blocks.forEach(function(b){addParas(src.split('\n').slice(pos,b.start).join('\n'));const table=document.createElement('table');const rows=b.rows.map(splitTableRow);rows.forEach(function(r,idx){const tr=document.createElement('tr');r.forEach(function(cell){const el=document.createElement(idx===0?'th':'td');el.textContent=cell;tr.appendChild(el)});table.appendChild(tr)});container.appendChild(table);pos=b.end});addParas(src.split('\n').slice(pos).join('\n'))}
function downloadBlobFile(name,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(function(){a.remove();URL.revokeObjectURL(url)},1000)}
function downloadXlsxFromText(name,text){const rows=tableRowsFromText(text);if(window.XLSX&&rows.length){const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Stella');XLSX.writeFile(wb,name);return}downloadBlobFile(name.replace(/\.xlsx$/,'.csv'),String(text||''),'text/csv;charset=utf-8')}
function downloadDocFromText(name,text){const html='<!doctype html><html><head><meta charset="utf-8"></head><body style="font-family:Arial, sans-serif;line-height:1.7;white-space:pre-wrap">'+mdEscapeHtml(text)+'</body></html>';downloadBlobFile(name,html,'application/msword;charset=utf-8')}
function downloadPptFromText(name,text){const html='<!doctype html><html><head><meta charset="utf-8"></head><body><section style="font-family:Arial, sans-serif;font-size:24px;line-height:1.6;white-space:pre-wrap">'+mdEscapeHtml(text)+'</section></body></html>';downloadBlobFile(name,html,'application/vnd.ms-powerpoint;charset=utf-8')}
function renderAnswer(el,text){const stamp=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);if(wantsDownload()){const tools=document.createElement('div');tools.className='download-tools';tools.append(btn('TXT',function(){downloadBlobFile('stella-answer-'+stamp+'.txt',text,'text/plain;charset=utf-8')}));tools.append(btn('Excel',function(){downloadXlsxFromText('stella-answer-'+stamp+'.xlsx',text)}));tools.append(btn('Word',function(){downloadDocFromText('stella-answer-'+stamp+'.doc',text)}));tools.append(btn('PPT',function(){downloadPptFromText('stella-answer-'+stamp+'.ppt',text)}));tools.append(btn('Markdown',function(){downloadBlobFile('stella-answer-'+stamp+'.md',text,'text/markdown;charset=utf-8')}));el.appendChild(tools)}renderMarkdownLite(el,text)}
